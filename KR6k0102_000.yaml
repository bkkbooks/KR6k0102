body:
  text: 佛説梵網經順硃敘德玉自丙申年得戒於澄江和尚後即參大隨禪學而律部不暇研實虗聲焉爾也及從雙桂先師得法南遊抵華山律堂見其威儀攸攝心恧面愧無已欲依學以贖前咎而又恨識浪漂流二三友人牽制至行腳事訖還渝始拈先法戒二師香以華嚴新創清規未整雖草草露布禪律並行亦有虗無實遂禁足于季而關三載日課華嚴萬佛并楞伽梵網等經惟梵網上卷求句讀且難況得義得味依法修行乎蜀無律師律體律學其來久矣乃展三昧和尚直解諦究之年餘少有進益但其中文理浩瀚引證攸長膚學者實難趣入非悟戒體廣學多聞細心于經論律部者亦不識三昧和尚之深心也今此順硃雖就正文順硃填墨亦從直解中截出間或別出己意亦不敢杜撰外三昧和尚法眼也玉豈借斯以沽名哉實欲雪心澡身以贖荒戒之咎并令膚學者稍識戒體三十心十地根本戒用十重四十八輕端倪戒師有據戒用有體戒學有本以黽勉躬行證悟自性本有金剛寶戒也藁成俾慈雲仙上座抄録時康熙二十年辛酉歲菊月念日也華巖德玉敘
