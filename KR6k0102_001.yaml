body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯蜀渝華巖季而關聖可德玉順硃慈雲寺價南慧仙謄録菩薩心地品之上初釋經題目佛者梵語佛陀華言覺覺有自覺覺他覺滿三義何謂自覺以凡夫背覺照合塵勞不能自覺惟如來從凡夫發心持佛淨戒離心意識參出凡聖路學悟自性真空了惑業虗妄故名自覺何謂覺他以二乘厭生死取涅槃不能覺他惟如來證平等智得法性空運無緣慈入魔佛界廣化衆生離苦得樂故名覺他何謂覺滿以菩薩起大悲度衆生覺行未圓惟如來心色俱離根本智顯五住盡二死亡三覺圓萬德備故名曰覺滿如來具足十號今舉一號則十號齊彰此佛即娑婆世界能說法之主也說者即所說之法義也佛說者乃覺皇親口所宣非菩薩聲聞之所能說故也梵網者世尊不離菩提樹而升四禪天觀諸大梵天王網羅幢因為說無量世界猶如網孔一一世界各各不同別異無量佛教門亦復如是梵網喻也即喻以表法也無量網孔喻無量世界無量衆生心無量佛教門無量菩薩差別階級無量諸佛受用境界以此一喻而攝多義故從喻立題也經者梵語修多羅華言契經上契諸佛之理合道而言下契衆生之機逗根而說故曰契經又經者線也徑也湧泉也繩墨也此皆隨義立名總不出貫攝常法四字貫者貫串諸佛之旨趣攝者攝持所化之機宜常者古今不變法者凡聖同軌佛說梵網四字乃所詮之義經之一字乃能詮之文能所合目為題故名佛說梵網經二釋譯人名姚秦三藏法師鳩摩羅什奉詔譯姚秦者秦國之主姓姚名興乃後秦非符秦也三藏者即經藏律藏論藏法師者謂此師學通三藏以一心常住不變之經三業體淨無為之律核定是非邪正之論以是自師以是師人就德彰名故名三藏法師鳩摩羅什者華言童壽謂師童年而有耆德故云童壽什者謂善識此方文字知識本龜茲國人後秦弘始三年入長安譯經論九十八部梵網最第一師位證賢聖者南山感應傳云七佛已來譯經之師也奉詔者奉秦王之詔命而翻譯此經也譯者易也易梵國之語為華夏之言華梵竝舉合目為題故云鳩摩羅什奉詔譯三釋經品題菩薩心地品之上菩薩者梵語菩提薩埵華言覺有情西域好廣此方喜略惟存菩薩義含提埵乃上弘下化之人也心地者即三十心十地也又指法而言即衆生本元心地迷之者輪回六凡悟之者直入四聖諸佛證此菩薩修此衆生迷此如來愍念興慈運悲往來三界八千返秪為發明一切衆生本有心地惟欲衆生依此心地稟受金剛光明寶戒為本修因扣己而求莫向別討故名心地品者類也衆類相從之義此經一大部一百一十二卷六十一品菩薩心地品正當第十此一品之文分為上下二卷上明菩薩理智觀行修證階級即三十心十地也下明菩薩心地戒法輕重開遮止作持犯即五十八戒也卷有上下之分此卷居上故曰品之上四正解經文爾時釋迦牟尼佛在第四禪地中摩醯首羅天王宮與無量大梵天王不可說不可說菩薩衆說蓮華臺藏世界盧舍那佛所說心地法門品爾時者即無量天人菩薩集會之時也釋迦牟尼佛者此標能化之主也梵語釋迦牟尼義翻能仁寂默以能仁表姓德寂默顯理致又能仁不住涅槃寂默不住生死又仁忍也以聞善不即喜聞惡不即怒能含忍于善惡也又于無生法忍可忍證故云忍也在第四禪地中者標所住之處也在者住也第者次第謂三界共九地欲界為一地名五趣雜居地色界有四地初禪名離生喜樂地二禪名定生喜樂地三禪名離喜妙樂地四禪名捨念清靜地無色界有四地一空無邊處地二識無邊處地三無所有處地四非非想處地此當色界第四禪捨念清靜地九地之中乃摩醯首羅天王所住之處亦名有頂天又名色究竟天法雲地菩薩多寄住于此處說法摩醯首羅華言大自在又云威靈或云三目此天為三界尊極之至輔行記云色界天王三目八臂騎白牛執白拂有大威力居菩薩住處能知三界雨滴之數統攝大千世界于色界中此天獨尊即統諸大梵天王之主也佛欲顯此心地道戒甚深祕密最尊最貴故在此大梵天王宮中之內庭而說也與無量等者此標聽法之衆也無量大梵天王者以一釋迦應千百億釋迦標千百億世界而千百億世界中之梵王同時集會也不可說不可說菩薩衆者言法會聽衆非是算數所能知之皆是大根器衆也說蓮華臺藏世界者指受法之處也盧舍那佛所說者明授法之人也說法有宗傳法有本也梵語盧舍那此云淨滿言諸惡淨盡衆德悉滿此即圓滿報身佛下卷廣明其義心地法門品者心地品解見上文法者軌持之義門者通達之義謂依法修行直至佛地所謂十方婆伽梵一路涅槃門有大陀羅尼門不二法門宗師云入此門來莫存知解等是也故曰法門此一節乃初化佛說法敘說心地法門品之由致也是時釋迦身放慧光所照從此天王宮乃至蓮華臺藏世界是時者是釋迦佛與衆說毗盧佛所說心地法門品由致之時也釋迦解見上身放慧光所照者身即全身放乃顯露慧者如如智慧光者果德光明此個全光非獨諸佛有之一切衆生具有皆因無明障慧而不證得故世尊以大方便垂示此光無非發明人人本有心地戒光俾其自己修持自己悟證矣所照者承前起後言全光所照之處也從此天王宮乃至蓮華臺藏世界者示全光所照處情與無情盡被此全身慧光一光所攝也此飾乃二放光現瑞敘發起之緣也其中一切世界一切衆生各各相視歡喜快樂而未能知此光光何因何緣皆生疑念無量天人亦生疑念其中一切等者總舉依正二報即指天宮華藏之兩間凡光所照處一切世界所有一切衆生莫不各各相視其光歡喜快樂也類數無量故名一切衆法相生故名衆生此光昔無于今忽有各既睹光咸護饒益故曰歡喜快樂而未能知此光等者寶光雖放塵相未空肉眼凡夫徒被其光故未能知此光何因何緣而證得又未能知此光何因何緣而放之豈惟博地凡夫皆生疑念即有身光之無量天人心慧昏蒙于佛身光莫知所出亦生疑念所謂不離當處常湛然覓即知君不可見也此節乃三覩光生疑敘明發問之端也以上總敘人天不達佛光因緣之所以竟爾時衆中玄通華光主菩薩從大莊嚴華光明三昧起以佛神力放金剛白雲色光光照一切世界爾時者即人天生疑作念之時也衆中等者此舉衆明當機也此菩薩是華嚴海會不可說不可說衆中當機首領大菩薩也佛放此光甚深難測非具大智慧者不能曉了唯此菩薩具大行華智慧明妙可通此光為衆中作唱導之主以德彰名故云玄通華光主菩薩從大莊嚴華光明三昧起者從自也大廣備之義莊嚴法身果海有三義一六度萬行二一切智慧三第一義諦其中華乃行華即福德莊嚴光明乃智慧即智慧莊嚴三昧乃正定即第一義諦莊嚴此三廣備故名大莊嚴此菩薩住是定中即自是定而起故云從大莊嚴華光明三昧起也以佛神力等者謂此菩薩請問大法必仗如來神力加被方能發起智問以佛神力故始能放金剛堅貴白雲淨智如幻之色光也光照一切世界者顯此光之迹周遍圓融而無障礙也此一節乃四玄主集問中有二初起定放光光照一切以攝衆也是中一切菩薩皆來集會與共同心異口問此光光為何等相是中者是一切世界之中也一切菩薩者即一切世界中之大菩薩也皆來集會者因光明所照不約而同共會此處也與共同心者因光悚動同示一疑而問也異口者人各有身口隨身異也問此光光為何等相者即問釋迦如來全身所放之慧光也此光即果中境界前衆生未發菩薩心秪疑因緣故曰何因何緣此諸菩薩是因中人只問果中之事故曰光為何等相何因何緣即下釋迦請問舍那云一切衆生為何因緣得成菩薩十地道等文之案光為何等相即下請問當成佛果為何等相之案此一節乃二集衆發問也自首至此序分竟下明正宗分是時釋迦即擎接此世界大衆還至蓮華臺藏世界百萬億紫金剛光明宮中見盧舍那佛坐百萬億蓮華赫赫光明座上是時者即此人天大衆諸菩薩請問之時也釋迦是能化之迹佛即擎接此世界大衆者乃所化之生也在上曰擎在下曰接即擎接此光光所照一切世界中生疑集會有根性之大衆也言還至者謂此釋迦與諸菩薩一切衆生元從華藏世界舍那本迹心地戒中一光流出今復還歸本體故蓮華臺等者即舍那本迹之處蓮華臺藏世界詳在後文億有四億百億千百億百萬億萬萬億此乃四億中第三百萬億也紫金剛光明表菩提智境宮中表涅槃理境謂理因智明智繇理發以理冥智以智契理理智圓融法報無礙報化圓融迹本不二也見盧舍那佛者釋迦旋歸本界覿面相覩親見本師法身智身境界所謂今日始見娘生面也坐百萬億蓮華赫赫光明座上者即舍那所坐之座座以蓮華者蓮之開敷表權實雙彰也赫赫者光焰熾盛貌光明者智慧之照用相此如來於因地中以大智慧破惑證真故感果中報德住此蓮華赫赫光明之座自安安人也俱名百萬億者即千釋迦千百億釋迦之光明蓮華圍繞舍那宮座故云百萬億赫赫光明蓮華之座此明三身圓會之相華嚴廣明百萬億此正宗分初明心地道有四初化佛代請亦有二初攝生還本敘攝用歸體生佛無差之義也時釋迦及諸大衆一時禮敬盧舍那佛足下已釋迦佛言此世界中地及虗空一切衆生為何因緣得成菩薩十地道當成佛果為何等相如佛性本源品中廣問一切菩薩種子時釋迦至釋迦佛言敘請法之儀則表三業䖍誠也一時乃一念生敬之時意業䖍誠也禮佛足身業䖍誠也釋迦佛言口業䖍誠也諸佛請法尚具此儀餘請法者可知也此世界中者即此娑婆世界之中也地及虗空者地即人間虗空即天上一切衆生者即釋迦如來擎接人間天上一切世界中覩光生疑根熟之衆生也為何因緣得成菩薩十地道者因緣即因行道即佛果意謂一切衆生發菩提心返妄歸真欲修佛道畢竟以何因行方至佛果耶此是第一問即前天人疑何因何緣之意當成佛果為何等相者意謂當成佛果之時畢竟又是何等境界耶此是第二問即上華光主放光集衆同心異口問此光光為何等相之意此是略問如佛性本源品中廣問一切菩薩種子佛性本源品即大部六十一品之一品在彼品中廣明成佛真因種子佛性即菩提心乃本覺義在衆生分中名佛性非衆生分中名曰法性今舉在因故名佛性菩薩種子即因地心也此第二正請決疑也此化佛代問竟爾時盧舍那佛即大歡喜現虗空光體性本源成佛常住法身三昧示諸大衆爾時者即釋迦請問之時也即大歡喜者謂此心地法門能令衆生離苦得樂正是佛之本懷故大歡喜也現虗空光體性者光即本體性分中之智光此光充遍十方而無來往流通三世而不變遷遐邇古今一切世界諸有色法應物而現于其中間覔一光相如芥子許不可得就如虗空一般故曰虗空光體性也本源成佛常住法身三昧者本者根本源者淵源言此體性乃是諸佛菩薩成佛道之根本淵源常而不改住而不動無作無為法身正定正受之三昧也示諸大衆者即以此本源正定示諸大衆令其悟入自己本有智慧光明金剛寶戒一得永得永無退失也此舍那酬答也答有三初總答心地二廣答釋名三結答問義初總答有四初顯示定相二誡聽思修三自陳因行四舉自果相此初示定相也是諸佛子諦聽善思修行是諸佛子者佛為慈父紹佛曰子諦聽等者即聞思修三慧諦審也聽者領也謂諸佛子大衆若不審諦誠信而聽則所聞之法心不相應心法既不相應心慧妙行何繇而發故先誡聽也善思修行者若不如聽而思聽則無益不如思而修思亦徒勞所謂如人數他寶自無半錢分于法不修行多聞亦如是故復誡思修也此是舍那如來詔告現前大衆即總答中二誡聽思修也我已百阿僧祗劫修行心地以之為因初捨凡夫成等正覺我已百阿僧祗等者我即舍那已者業已經歷之謂也阿僧祗梵語此云無數劫梵語劫波此云分別時節言我舍那業已經過百無數劫之時節修行此三十心十地用之以為因緣從始發心初捨凡夫于其中間歷此劫數之久實非妄誕之人一朝一夕微因微緣小功小行一知半解無明煩惱貪嗔我慢一毫未除而言頓超佛道者也雖然初捨凡夫即成等正覺者乃是衆生受佛戒即入諸佛位久受勤苦乃可得成也瓔珞經謂一切諸佛不經三大阿僧祗劫得成無上菩提無有是處故所以道先悟毗盧性海後行普賢行門良有以也此總答中三陳自因行也乃答化佛一切衆生何因何緣得成菩薩十地道之問號為盧舍那佛住蓮華臺藏世界海號者名也盧舍那解見上即報身佛名也住居也蓮華臺藏世界海者華嚴經云有二十重華藏世界海皆在無邊妙華光香水海中此世界乃是毗盧遮那如來往昔于此世界中微塵數劫修菩薩行時親近微塵數佛之所嚴淨今感果住此也而此娑婆華藏世界正當第十三重有十三佛剎微塵數世界圍繞即毗盧遮那如來出現之處梵語毗盧遮那華言遍一切處即法身佛名也梵語盧舍那華言種種光明遍照遍一切遍照二經名異體同法即報報即法也法身毗盧遮那佛住蓮華藏莊嚴世界海即報身盧舍那佛住蓮華臺藏世界海也海有包含深廣映攝一切之義即千釋迦千百億釋迦之依報正報無不從此華藏世界盧舍那佛心海中流出海具真如生滅二門故云海也此總答中四舉自果相也果相中有總明果相別明果相二義此乃初總明果相也問何等因即最初悟此心地中光明金剛寶戒為因問何等緣即依法修行三十心十地法門為緣問何等果即成等正覺為果問何等相即號為盧舍那佛住蓮華臺藏世界海依正二報為相也此總答因果二問竟其臺周遍有千葉一葉一世界為千世界我化為千釋迦據千世界後就一葉世界復有百億須彌山百億日月百億四天下百億南閻浮提百億菩薩釋迦坐百億菩提樹下各說汝所問菩提薩埵心地其餘九百九十九釋迦各各現千百億釋迦亦復如是其臺即大香水海中之一大蓮華華中有一蓮臺臺中有一佛佛即舍那本迹之佛乃正報中之報身佛也臺即舍那所居之華臺乃本迹佛身依報之國土也其臺周遍等者即本華臺周匝有千葉圍繞而每一葉為一世界故成千世界此顯本迹依報又現為迹佛依報之世界也我化為千釋迦等者我即舍那自稱非凡外之我此顯本迹佛身又化迹佛之身而現于迹依世界中之教主此一一世界中佛皆舍那所化之身故曰我化為千釋迦據千世界後就一下顯迹依土又化為迹迹佛身依報之國土也後就一葉等者即千葉中拈取最後一葉而例言之此一迹華又現為百億之華每一一華為一世界故有百億世界每一一世界中有一一須彌故有百億須彌山梵語須彌此云妙高以衆寶所成出過諸山故每一一須彌山有一一日月繞須彌盧故有百億日月每一一日月一日一夜遊四天下故有百億四天下每一一四天下有一一南閻浮提故有百億南閻浮提梵語閻浮此云勝金以樹流金汁河出金沙故百億菩薩釋迦者此又顯迹佛之身而又顯迹迹之佛身即千釋迦一一化現百億釋迦為當機故云百億菩薩釋迦坐百億等此總結顯如來婆心示現受生出家成道轉法輪度衆生義一一釋迦皆示現八相成道二始同時皆不離菩提樹而升忉利乃至梵天皆說舍那所傳心地法門皆放身光鼓動人天故曰坐百億菩提樹下各說汝所問菩提薩埵心地也其餘九百等者上拈千華中一華示現千佛中一佛示現其餘九百九十九釋迦又作云何其一葉一佛既如是示現則餘九百九十九釋迦之依正亦皆各各示現乃至請問心地法門亦復如是無二無別也此二別明果相也果相中有二初從體起用二攝用歸體此乃初從體起用也上總示果相明依正體此別明果相明依正用千華上佛是吾化身千百億釋迦是千釋迦化身吾以為本源名為盧舍那佛此舍那知凡小不能通達即體之用而謂實有本迹應迹之分故言千百億釋迦是千釋迦之化身千釋迦是舍那之化身也上其臺等是從體起用即即體之用此明攝用歸體即即用之體正明體不離用用不離體體用不二故曰吾以為本源名為盧舍那佛此二攝用歸體也爾時蓮華臺藏座上盧舍那佛廣答告千釋迦千百億釋迦所問心地法品此二廣答釋名爾時者當爾發明本迹遍現攝用歸體之時也廣答者對上略答而言上只略答我已百劫修行心地又恐法衆不知是何心地故標牒請詞下詳答之也諸佛當知堅信忍中十發趣心向果一捨心二戒心三忍心四進心五定心六慧心七願心八護心九喜心十頂心諸佛即千佛千百億佛諸迹佛也當知者是本佛召告諸迹佛應當知此十發趣中十心之名位也堅信忍中十發趣心向果者堅即堅實信即信心忍即安忍三賢十聖等妙別經分為六位各具性觀慧堅忍五法每一法隨六位分為六種此十住位中性即習種性觀即住觀慧即聞慧堅即信堅忍即信忍以二法合言名堅信忍也中者言此堅信忍中有十種人俱發上弘下化廣大之心趣向佛海無能退轉故云堅信忍中十發趣心向果也何名十心一捨心捨即施捨無所吝惜之義二戒心戒即戒律滅惡生善之義三忍心忍即忍可安忍不動之義四進心進即精進趨向無退之義五定心定即禪定不昏不散之義六慧心慧即智慧照了無礙之義七願心願即願樂上求下化之義八護心護即護持善能防隄之義九喜心喜即歡喜離苦得樂之義十頂心頂即人頂無過于上尊貴之義此二釋心地相中初明十住相也諸佛當知從是十發趣心入堅法忍中十長養心向果一慈心二悲心三喜心四捨心五施心六好語心七益心八同心九定心十慧心從是句承前入堅句起後堅法忍等者法者知諸法空假立諸法以化衆生即假法也此十行位中性即性種性觀即行觀慧即思慧堅即法堅忍即法忍以二法合言故名堅法忍也此位以前十住真理深入玄妙菩提妙行依理而起運四無量之心行四攝法饒益衆生長養聖胎成就聖德向佛果海故云十長養心向菩提果也何名十長養心一慈心愛念衆生之義二悲心愍念衆生之義三喜心慶他得樂之義四捨心周給無吝之義五施心普慧無惜之義六好語心所說皆善之義七利益心勝行化生之義八同心隱同攝化之義九定心印持無亂之義十慧心照徹無礙之義此二明十行相也諸佛當知從是十長養心入堅修忍中十金剛心向果一信心二念心三回向心四達心五直心六不退心七大乘心八無相心九慧心十不壞心從是句結前入堅句起後堅修忍等者修增修也此十金剛位中性即道種性觀即向觀慧即修慧堅即修堅忍即修忍二義合言名堅修忍也此十向位即解行發心也前十住心由信滿而入此十向心由行滿而入以是菩薩于第一阿僧祗劫將欲滿故即於真如法中深解現前所修離相於是心心實相念念真如行行圓融修金剛三昧定集一切行法門深入理觀轉更增明入佛果海故云從是十長養心入堅修忍中十金剛心向果也何名十回向心一信心但信自心決定成佛永無疑執故二念心念念不失一切諸佛正智故三回向心回不住也向不退也于無上菩提不住不退故四達心達即通達照徹無礙內外清淨故五直心直即正直直照平等入無生智故六不退心不退入凡夫地進道無已故七大乘心以智乘行乘任載任用廣度衆生入佛海故八無相心以般若波羅蜜照了妄想解脫無二故九慧心慧即如如慧以智慧觀照了無量法界入一切法無集無受故十不壞心八魔不壞入佛威神出沒自在故於此十心圓滿二空理顯感諸佛加被得摩頂三昧證入虗空平等總持法門即入十地也此三明十回向也此上三賢觀行名相竟下明十地相諸佛當知從是十金剛心入堅聖忍中十地向果一體性平等地二體性善慧地三體性光明地四體性爾炎地五體性慧照地六體性華光地七體性滿足地八體性佛吼地九體性華嚴地十體性入佛界地從是一句結前入堅聖等起後謂前三賢修習聖行功德圓足得入平等地總持法門自此稱聖故云從是十金剛心入堅聖忍中十地向果也此十地位中性即正覺性觀即地觀慧即無相慧堅即德堅忍即正忍二義合言故名堅聖忍也此即證發心謂證真如法故何名十地一體性平等地謂此菩薩證入諸佛法身平等大慧真實法門攝受衆生其慧平等故二體性善慧地謂此菩薩善修法身平等大慧清淨明達一切善根故三體性光明地謂此菩薩證發無邊妙慧光明以三昧解了智能知一切三世諸佛法門入神通光明故四體性爾炎地謂此菩薩以智慧𦦨燒煩惱薪以入善權方便教化一切衆生能使見佛體性故五體性慧照地謂此菩薩以十力智照知善惡有無二性起一切功德行轉不可說不可說法門故六體性華光地謂此菩薩以大智行之華一時開敷十神通明智品現身示衆種種變化百千萬劫說不可窮盡故七體性滿足地謂此菩薩具足十八聖人智品於一切國土中隨諸衆生心行示現作佛成道轉法輪故八體性佛吼地謂此菩薩入法王位三昧其智如佛而以法樂施一切衆生為大法師破壞四魔法身具足說法無畏如大獅子吼故九體性華嚴地謂此菩薩得佛華嚴善能守護法身以佛威儀如來三昧出入百億四天下一時成佛轉法輪一念中一時示現如是事故十體性入佛界地謂此菩薩以護一切種智得入金剛三昧具足十功德品具足不可說法門三昧門陀羅尼門非下地所及惟佛佛無量身心口意可盡其源故此四明十地相也瓔珞經云以銅銀金琉璃摩尼水晶之六輪對住行向地等妙之六位俱詳直解茲不煩引此十聖地觀行斷證初地斷上品惑證下品智自二地至七地斷中品惑證中品智從八地至十地斷下品惑證上品智此即轉前五識相應心品成成所作智轉第六識相應心品成妙觀察智轉第七識相應心品成平等性智轉第八識相應心品成大圓鏡智四智圓明三身圓現所謂大圓無垢同時現普照十方塵剎中以上答釋心地名相竟向下結答以勸修也是四十法門品我先為菩薩時修入佛果之根源是四十法門品者總舉心地之軌則也我先為菩薩者此舉果明因也修入佛果之根源者此舉因明果也若非勝因不得勝果若非勝果焉顯勝因此乃自指根源以為衆生修入榜樣此三結答問意也意中有二初舉法陳因二作勸修證此初舉法陳因也如是一切衆生入發趣長養金剛十地證當成果無為無相大滿常住十力十八不共行法身智身滿足如是二字承上自己成佛根源在斯而一切衆生亦當如是即今如我往昔行菩薩道修入發趣長養金剛十地四十賢聖之行為因地心得今證當成果無為無相大滿常住法身智身滿足之相好也無為無相即顯法身大滿常住即顯報身十力十八不共行即顯法身法身等者言證此無為無相當成法身之果證此大滿常住當成智身之果證此十力十八不共行當成三十二相八十種好千百億化身充滿具足之果故云法身智身滿足也此意中二作勸證修也十力者一知是處非處智力二知過現未來業報智力三知諸禪解脫三昧智力四知諸相勝劣根智力五知種種解智力亦名欲力六智種種界智力亦名性力七知一切至處道智力八知宿命無漏智力九知天眼無礙智力十知永斷諸習氣漏盡智力十八不共法者一身無失二口無失三意無失四無不定心五無異想心六無不知捨心七欲無減八念無減九精進無減十智慧無減十一解脫無減十二解脫知見無減十三身業隨智慧行十四口業隨智慧行十五意業隨智慧行十六知過去無礙十七知現在無礙十八知未來無礙此十八行云不共者以是諸佛自覺聖智境界非權小菩薩所共更非凡夫境界可知故云不共爾時蓮華臺藏世界盧舍那佛赫赫大光明座上千華上佛千百億佛一切世界佛爾時者即舍那如來舉因明果以勸修之時也蓮華臺等及千百億佛解見前言一切世界佛者是千百億之釋迦佛展轉化化無量無盡之智慧佛居一切世界中說法利生以表從心地戒法中出生無量無盡智慧佛也下卷文云微塵菩薩衆由是成正覺者此也此三華光請釋也請釋有二初總標報化二別明當機此總標報化也是座中有一菩薩名華光王大智明菩薩從座而立白盧舍那佛言世尊佛上略開十發趣十長養十金剛十地名相其一一義中未可解了惟願說之惟願說之妙極金剛寶藏一切智門如來百觀品中已明是座中有一菩薩者是千佛座中之果位菩薩也名華光等者前云玄通華光主此云華光王大智明正顯此心地戒法非具大智慧者不能通問謂斷惑證真必以智慧為首故也從座而立身業之誠白盧舍那佛言世尊口業之誠身口如如心契實相意業之誠也佛上略開四十法門名相名相雖多以義論之則名相為略故曰略開其中一一義理必廣修斷觀智未曾解了必請詳明故曰惟願說之惟願說之重敘請意以表請法之誠切也妙極即妙覺果海金剛即堅利之智謂若至果海非金剛智不能此智一起諸物不能壞而能壞諸物一切雜染諸惡種子斷盡無餘故云妙極金剛此智具足一切功德故云寶藏為一切賢聖修斷方便觀智根本故云一切智門如來下引證以明此處文義在大部內如來百觀品中已更詳明矣此請釋中二別明當機也此一節文總承前義而來自從是時釋迦身放慧光人天生疑玄通光主放光聚衆請問光相釋迦擎衆至舍那所代前二問請決其疑舍那領答從凡至聖即以心地為因當成佛果果中境界一一發明又恐大衆雖問心地為因不知是何心地故又廣開名相為三十心十地既有如是之名如是之相必有如是之義若不發明義趣將使行者莫知趨向執相迷心執事迷理故華光王菩薩請解其義正謂涅槃心易曉差別智難明也爾時盧舍那佛言千佛諦聽汝先言云何義者發趣中此牒大智明菩薩請釋其義誡聽許說十住進修地位觀行之義也此四舍那酬釋有四初明十住義二明十行義三明十向義四明十地義十住中又有二初總標牒問二別解其義此初總標牒問也下別解其義有十第一捨心位捨者即檀波羅蜜也別經名發心住百千法門以檀為首者何蓋博地凡夫以執著我法不捨故輪回諸趣今欲趨佛道者必以財捨法捨竭盡捨三捨為先漸漸從外及內以至內外俱捨捨亦復捨如是之人名為肉身菩薩乃可入道自利因此檀度廣攝衆生亦易從化而利他也若佛子一切捨國土城邑田宅金銀明珠男女己身有為諸物一切捨無為無相我人知見假會合成主者造作我見十二因緣無合無散無受者十二入十八界五陰一切一合相無我我所相假成諸法若內一切法外一切法不捨不受菩薩爾時名如假會觀現前故捨心入空三昧若佛子者標其能修行捨之人一切捨者標其所修當捨之法何為當一切捨耶國土城邑等者言天子之國土宰官之城邑庶民之田宅自天子至下庶民咸有金銀明珠男女外而器界及自己內而根身皆有為諸物一切悉所當捨者若有人乞寶位官位城邑國土而生尊貴之心乞安養田宅使用金銀明珠而作護惜之念乞奴婢男女己身而起情愛之想悉無一毫捨心者又豈能滿檀波羅蜜以莊嚴無上菩提哉故所以修行此捨心位菩薩貴一切捨也何為能一切捨耶此位菩薩以空觀假法照破世間有為皆悉無為有相皆悉無相有我有人情之所知目之所見皆悉是假因假緣會合而成主者以造作我人知見故耳此位菩薩一一照破故能一切捨也至于三世因果十二因緣皆悉無為無相以因緣和合虗妄有生因緣離散虗妄有滅緣會而生法體本來不生緣盡而滅法體本來不滅不生不滅誰合誰散耶故云無合無散也既無生滅合散亦無受彼生滅合散者故云無受者也現在十二入之六根六塵十八界之根塵識五陰之色受想行識皆悉是假無為無相一切諸法空無所有心佛衆生三無差別故云一切一合相也既一切一合相誰為我相誰為我所相而起我人知見誰為虗妄假法合成主者及一切諸法耶至若十二因緣三科五蘊內一切法若國邑男女外一切法此菩薩皆悉一一照破故能一切捨也如是行捨內不見有我為能捨之人外不見有物為所捨之法中不見有受施者以此三輪體空故云不捨不受也菩薩爾時下謂菩薩修是捨觀正當三輪體空之時名如假會幻化觀照現前故而令捨心證入真空正受三昧得大利益也十二因緣詳三地假會觀詳直解不煩引此初釋捨心位也第二戒心位戒即尸羅波羅蜜也別經名治地住謂此位菩薩常隨空心行諸法門以嚴戒品戒總有三聚十無盡戒別則三千八萬無量戒也若佛子戒非非戒無受者十善戒無師說法欺盜乃至邪見無集者慈良清直正實正見捨喜等是十戒體性制止八倒一切性離一道清淨若佛子者標能行持大戒之人戒者標所當行持之法非非戒等者小乘人以有戒相可持拘束于戒自救不了故名非戒魔外分別有無有即妄有無即滅無以虗妄斷滅心行持惡戒不惟無益而反自損故云非非戒也此位菩薩行持大乘金剛寶戒豈受此等樣戒耶故云無受者也十善戒者善淨也即小乘十種淨戒小乘人不達戒性本空執守拘束不能究竟明了也無師說法欺盜者即魔外等人我慢貢高不秉受真正師承而傳戒法或妄號法王未得謂得未證謂證而欺或偷聽說戒僞習律本夜聚曉散而盜乃至執無戒可持而說淫怒癡皆為梵行惡罵捶打無非佛事竝執有戒而持牛狗等戒不食烟火逈別于人以為淨戒如此等輩俱是邪見自迷迷人師及弟子俱陷惡道此位菩薩豈更集此等樣非非戒也耶故曰無集者也慈良等者此當位菩薩從信滿入住以來修習空觀素所秉性慈愍而不殺良善而不偷淨清而不淫直言而不妄正實明慧而不酤正見廣大而不說四衆過不自讚毀他不謗三寶捨施而不慳喜樂而不嗔素性所秉如此非庸小所能及也等者是八種體性而含十重大戒正見攝三故云等也是十戒體性等者言如是八種十戒本體性分正是防微杜漸之根本所以裁制禁止凡夫四榮外道四枯之八種顛倒也凡夫四榮乃無常計常無樂計樂無我計我無淨計淨執有而生常見輩也外道四枯常計無常樂計無樂我計無我淨計無淨執無而生斷見輩也是十戒體性制止諸倒者俾其一切性離耳一切性離者是使非非戒性十善性無師性欺性盜性邪見性離也如是諸性既離則此慈良清直等之十戒體性一道光明金剛寶戒清淨而無染污也此二釋戒心位也第三忍心位忍即羼提波羅蜜也別經名修行住謂能修行忍力長養衆善根故忍者謂于逆順諸境安然自如乃即造道之強力也若佛子忍有無相慧體性一切空空忍一切處忍名無生行忍一切處得名如苦忍無量行一一名忍無受無打無刀杖嗔心皆如如無一一諦一相無無相有無有相非非心相緣無緣相立住動止我人縛解一切法如忍相不可得若佛子者標其能行忍之人忍者標其所當忍之法也有無相等者無相慧即空慧體即本體性即性分也言此位菩薩行持此個忍法之時有此無相空慧體性以觀照一切忍也云何為一切忍耶一切空空忍者一切空色界四禪依空而住諸空乃超出形聲之外是修無相慧法者之所當忍者也菩薩能于此空而又空不見有空相可得忍可忍證故名曰一切空空忍也一切處忍等者一切處即無色界空無邊處識無邊處無所有處非非想處此四空處乃超出形聲色相之外是修無相慧法者之所難忍者也菩薩能于此諸處忍可忍證一切空盡直證無生是名無生行忍也一切處得名如苦忍者言一切空一切處是人所難忍者于此難忍能忍與忍諸毒害苦惱者一樣是能耐怨忍受可得名如苦忍也無量行一一名忍者無量行即十信三十心十地十重四十八諸戒行竝百千法門無量妙義此菩薩以無相慧觀照于一一法中能忍可忍證故得一一名忍也無受等者謂此位菩薩修無相慧了達三輪體空內不見有能受打之我相外不見有打我之人相中不見有刀杖所受所打之衆生相于此三輪之中覔一毫嗔心相如芥子許不可得而無壽者相如是四相如如皆空無有故云無受打刀杖嗔心皆如如也無一一諦一相者言此菩薩修無相慧觀照察世出世間俗諦真諦悉皆無相無相即是實相實相即是一相故云無一一諦一相也直解分別此上諸忍為六忍引千臂經為證甚詳無無相者言此菩薩修無相慧行六忍空法其實體性無相可得竝此無相亦無之也故云無無相有無有相三句謂此位菩薩修空觀時唯有此無有相以空之也修假觀時唯非此非心相以假之也修中觀時唯緣此無緣相以中之也又觀空時無假無中而不空觀假時無空無中而不假觀中時無空無假而不中三即一一即三也立住等者立即站立住即住坐動即行動止即臥止四威儀也我即我相人即人相縛即凡夫衆生相解即聖人壽者相此菩薩修此三觀空慧體性現前時四威儀相四相相一切法相皆如諸忍無無相一般求其如忍相亦不可得也此三釋忍心位也第四進心位進即毗黎耶波羅蜜也別經名生貴住謂生在佛家種性清淨也梵語毗黎耶此云精進謂精而不雜進而不退即于上三法勤䇿不懈乃即智行無間之功力也若佛子若四威儀一切時行伏空假會法性登無生山而見一切有無如有如無天地青黃赤白一切入乃至三寶智性一切信進道空無生無作無慧起空入世諦法亦無二相續空心通達進分善根若四威儀等者言若佛子行此毗黎耶波羅蜜時于行住坐臥之際晝夜六時之間無少間歇惟降伏此心于空觀中此行伏空也復假此空觀之理融會一切法性此即行伏假也以此空觀假觀之理雙伏互融直陟中道最高之頂此即行伏中也而見等者精進菩薩行伏忍法時心如明鏡照徹世出世間有為無為一切諸法如觀掌中見有之時有非是有因無故有故名如有見無之時無非是無因有故無故名如無何謂如有天之三光風雲雷雨地之山河飛潛動植咸有青黃赤白五色一切入處悉皆虗幻不實誠然非有故云如有也何謂如無乃至佛法僧三寶之智慧體性一切賢聖誠信進修之道雖然空雖然無生雖然無作如是智性信進道三解脫悉皆真實不虗灼然非無故云如無也無慧等者言此菩薩于四威儀一切時中惟以此無生慧眼觀察起空入一切世諦法中咸皆渾化融通世法佛法總無差別故云亦無二也此時惟行伏空心現前相續相連綿綿不已通而無阻達而無礙分分精進增長善根畢竟本壯枝榮華果敷實也此四釋進心位也第五定心位定即禪波羅蜜也別經名具足方便住謂即多習無量善根力故若佛子寂滅無相無相無量行無量心三昧凡夫聖人無不入三昧體性相應一切以定力故我人作者受者一切縛見性是障因緣散風動心不寂而滅空空八倒無緣假靜慧觀一切假會念念寂滅一切三界果罪性皆繇定滅而生一切善若佛子者標能修行入定之人寂滅者標其所當定之法也梵語禪那此云寂滅亦云靜慮亦云寂靜謂根境如如不即不離若鏡現相故云寂滅也無相無相者上無相是說能定之心無相下無相是說所定之法亦無相也上指人下指境亦可無量行無量心等者言一行定則行行皆定一心定則心心亦定無量行無量心無有一行一心不入此正定三昧者到茲境界有何凡解可捨有何聖解可取哉無有一凡一聖不入此正定三昧者其本體性分如是法爾如然也斷斷乎未有不相應此正定三昧者也一切以定力故至不寂而滅作一句讀言此正定三昧如大冶紅爐一切我見人見作者見受者見起一切等縛而生六十二見種種性咸是障道因緣散亂境風鼓動心海如是等法到來如片雪點紅爐不假銷鎔而自化故云不寂而滅也空空八倒等者上空空榮四倒下空空枯四倒以定力故榮倒枯倒皆無緣而起也假靜慧觀者假靜觀而空榮假慧觀而空枯以定力故一切假會之法念念相應與寂滅三昧同一體性無二無別也至于一切欲界色界無色界因果罪福種性咸入其中不寂而滅不鎔而化以斯之故而生長一切行向善法也此釋定心位也第六慧心位慧即般若波羅蜜也別經名正心住梵語般若此云智慧謂智能照境慧能了境于境分明無惑能轉物也若佛子空慧非無緣知體名心分別一切法假名主者與道通同取果行因入聖捨凡滅罪起福縛解盡是體性功用一切見常樂我淨煩惱慧性不明故以慧為首修不可說觀慧入中道一諦其無明障慧非相非來非緣非罪非八倒無生滅慧光明𦦨為照樂虗方便轉變神通以智體性所為慧用故若佛子是能修慧之人空慧是所當修之法也非無緣等者言此個真空妙慧非是無緣而生又非即緣而生是即本有空慧靈明知體名之為心不假方便故也分別一切等者此個知體能分別一切諸法當體本空假名主者無實體性咸與至道通同一味無二無別故云假名主者與道通同也取果等者取果謂取三賢十聖等妙佛以之為果行因謂行三十心十地十重四十八輕以之為因俾其入聖而增進修捨凡而不退墮滅一切罪起一切福縛法解法俱是體性功用所謂從凡夫中來者用其識心從聖性中來者用其智慧識智元無二體惟在用之有殊耳一切見等者言凡情聖解罪福縛解一切見因何而有蓋由不知如來真常真樂真我真淨之四德而起八倒見因倒見而生種種煩想障蔽慧性不得明了故也此位菩薩能斷除一切倒見煩惱者蓋以智慧為前茅為先導續修習之以不可說觀慧為助法法頭頭皆有二諦細審細察互觀互融俾入中道第一義諦之中則其煩惱無明倒見障慧悉皆照破無有實體而非相無有動轉而非來無有合散而非緣無有因果而非罪無有榮枯而非八倒無生無滅純一空慧智光靈明徹𦦨其所為慧照之用如日之處虗空言此位菩薩舉心動念折旋俯仰無所往而非智慧能起種種方便展轉變化運御神通妙用無比使諸有情離一切暗總無他法惟以平等智中本體性分設施所作所為純以空慧為用故也此六釋慧心位也第七願心位願即願波羅蜜也別經名不退住入于無生畢竟空界故若佛子願願大求一切求以果行因故願心連願心連相續百劫得佛滅罪求求至心無生空一願觀觀入定照無量見縛以求心故解脫無量妙行以求心成菩提無量功德以求為本初發求心中間修道行滿願故佛果便成觀一諦中道非陰非界非沒生見見非解慧是願體性一切行本源若佛子是能修願波羅蜜之人願者是所修願波羅蜜之法也願者願要乃即發諸大願成佛利生也願大求即上求佛果一切求即下化衆生以果者以上求成佛道自利為果行因者以下行化衆生利他為因故字結上二求以此之故也願心連等者承上以果行因之願心來重言者言常念念不忘心心無間相連相續百劫修行難行能行難為能為難忍能忍難捨能捨如是百劫修行始能得見本佛滅無量罪也求求等者上求即上大求下求即上一切求至心即願心連意無生空一願者即百劫修行無生空法而得成佛度生一願滿足也觀觀入定照者上觀即空觀下觀即假觀定即禪定照即慧照也空觀是禪定體禪定是空觀用假觀是慧照體慧照是假觀用又禪定是空觀體空觀是禪定用慧照是假觀體假觀是慧照用互攝互入一而二二而一也無量見縛皆以發上求下化之大願求心故而始得解脫無量妙行亦以是求求至心故得成就阿耨菩提無量恆沙稱心功德亦以求心故而為根本也此下勸其必行如是求心非是空發願樂之心而不即行願樂之行故必初發求心而始覺中間修道而漸次覺行滿願滿故而究竟覺三覺果滿萬德周圓方得成佛果稱兩足尊也以中道第一義諦慧觀照之于其中間無五蘊而非陰無根塵識而非界非沒非生能見所見一切皆非其分別解慧俱是願求本體性分一切行向根本源頭也此釋七願心位也第八護心位護即力波羅蜜也別經名童真住謂不生邪倒破菩提心故若佛子護三寶護一切行功德使外道八倒惡邪見不嬈正信滅我縛見縛無生照達二諦觀心現前以護根本無相護護空無作無相以心慧連慧連入無生空道智道皆明光明光護觀入空假分分幻化幻化所起如無如無法體集散不可護觀法亦爾若佛子標能行力波羅蜜之人護三寶是標所當護之法也三寶即佛法僧佛者覺照義法者軌持義僧者和合義此三寶是佛子之所當護者云何護三寶耶護一切下至護根本皆護三寶之義一切行即賢聖所行心地中所含六度萬行功德即聖賢所修功勳所集福德仁王經云以護佛果護十地行亦同此意外道多種凡不達心地道戒向外馳求俱名外道八倒惡邪見等是于三寶不惟無益而反有損者能護三寶之人自使此輩恭敬供養且不暇安有毀謗正法嬈害正信之理凡有我縛見縛者到此見相皈依覩德人容而惡意銷殞我人諸見盡皆解脫也行護者惟用無生智理照了通徹真俗二諦了真諦不空徹俗諦不有不空則不斷不有則不常二諦圓融互攝無礙惟此慧觀之心顯現于前以護斯三寶正信根本三寶根本既牢固菩薩智慧華果何所愁而不榮實耶護三寶義止此無相下至亦爾皆護行功德之義無相即實相慧也上護護此人下護護此法也空解脫無作解脫無相解脫咸人所當護行功德法也以心等者言以此空心俾無相慧相續相連無少間斷直入無生空道無餘涅槃理果無生智道無上菩提智果中理智互融圓明發照皆明光明光巨細不遺而無惑矣護觀等者承上護心入道來言此護心觀理從此而復起觀照觀入于空即遣真相觀入于假即遣俗相真相俗相既空既假則此空假分中空假分分分同于幻化也則此幻化所起復從何滅于此求起相且不可得求滅相又安可得哉故曰如無如無也此上即護行功德義法體二句單結護法觀也言此上護解脫入道護觀入空假既如無如無矣此個法體向何處捉摸集耶散耶皆不可得而護也不可護中與麼護耳觀法體既然觀法亦復如是此八釋護心位也第九喜心位喜即方便波羅蜜也別經名法王子住謂從佛正教而生于解當紹佛位故若佛子見他人得樂常生喜悅及一切物假空照寂而不入有為不無寂然大樂無合有受而化有法而見云假法性平等一觀心心行多聞一切佛行功德無相喜智心心生念而靜照樂心緣一切法若佛子者言能行方便之人見一切他人得樂有此喜境于己應常生喜悅有此喜心也常生者何此菩薩從久遠劫來發菩提心元為令諸衆生離苦得樂今見得樂之人適其所願故常生喜心也及一切物者言此菩薩喜心廣大不唯見人樂而生喜心凡見一切有情物類得樂亦常生喜心也此上三句標所當喜之法也假空照寂等者假照即正慧空寂即正定定慧真境細滿纖塵大充法界于有為無為無不含攝寧有出入哉故曰不入灼然該遍故曰不無空理寂然渾一大樂境界矣合者配也侔也此個境界得之者如啞人喫蜜說向人不得不與萬法為侶者此也誰為合誰當合唯吾自偶諧耳豈不大樂耶故曰大樂無合也有受等者言有喜受之心變化不留有喜法之境顯見透徹即此喜心喜境純一樂地也云假者謂受心法境當體如如無實體性故云假也法性句即云假義言如是法性本來平等以一慧觀照之觀諸法之相云假觀諸法之性本真在聖不增在凡不減平等不二既觀諸法體性平等而法身之理果尚未究竟當心心發起大行而行之始乃多聞一切諸佛妙行果海三十二相八十種好圓滿功德也無相喜智二句承上言謂此菩薩思行諸佛功德本乎無相契此無相之理以為喜心如空合空不相妨礙復以此喜智起行長養永承無失心心相續存乎念中常靜常樂照契喜心不一不二緣一切已得法樂未得法樂之衆生令其同證無相喜中寂然大樂無合之道也此釋九喜心位也第十頂心位頂即智波羅蜜也別經名灌頂住謂觀空無相得無生心法水灌頂故若佛子是人最上智滅無我輪見疑身一切瞋等如頂觀連觀連如頂法界中因果如如一道最勝上如頂如人頂非非身見六十二見五陰生滅神我主人動轉屈伸無受無行可捉縛者是人爾時入內空值道心心衆生不見緣不見非緣住頂三昧寂滅定發行趣道性實我人常見八倒生緣不二法門不受八難幻化果畢竟不受惟一衆生去來坐立修行滅罪除十惡生十善入道正人正智正行菩薩達觀現前不受六道果必不退佛種性生生入佛家不離正信上十天光品廣說是人即修行頂智之人也最上智即是頂智言無我輪五利五鈍使等非此上上大智豈能滅之哉無者空也我者我見也輪者輪回也衆生以不識我見本空所以輪回諸趣起我見邊見身見見取戒取貪瞋癡慢疑等也是人既以此上智滅盡我輪諸使則當體全空是一如頂大空妙智慧觀相續相連綿綿不止照此觀連空心亦復如頂竝十方十法界之中若因若果皆悉如如一道無二無別也是故此智而為最上最勝頂智高超物表如頂之象焉如人頂者人身惟頂最尊喻此菩薩頂心觀智離身離意無根無塵高顯而無上也上明最上智非非身見下至捉縛者明滅無我輪等也上非能遣觀智也下非所遣惑業也言此頂智一明粗細等惑無所不滅非身見外道可捉可縛亦非六十二種斷常邪見可捉可縛亦非五蘊妄身妄心和合因緣可捉可縛亦非神我主諦動轉屈伸種種計量種種幻相可捉可縛其頂心智觀滅除情見如千年暗室一燈破盡豈是此等諸見有受有行可捉可縛也耶是人爾時等者是人是當位之人爾時者乃入觀之時也言此當位菩薩入智觀內一切皆空外山河內身心無所不空惟道獨存以值道故遠離諸妄心心平等廣度有情總不見有能緣之心及所緣之境不但無能所緣之度生相亦無非能所緣之理智相故云不見緣不見非緣也既心境雙泯智理全空即得安住最勝頂心三昧寂滅之正定矣發行等者言二乘住定著定不肯饒益有情菩薩雖住是頂智定而不貪著能從智定中發起慈悲喜捨廣大之心修行妙行趨向佛道體性真實猶如金剛不為魔外所侵害四相我人斷常諸見榮枯八倒生滅因緣于此真實不二法門之中永無受行滅盡無餘即八難幻化異熟業果亦畢竟不受其報所謂因窮果喪故也惟一衆生等者此衆生即得頂智大心衆生初賢十住雖滿未入十行猶近衆生但超一切衆生之上孤孤逈逈已是獨尊故曰惟一衆生也又此菩薩十住智滿利生心切垂慈接引外示威儀與諸衆生無二無別一般去來一般坐臥動止一般修行趣道滅罪求福除去十惡生長十善一般求入道中作端正人得端正智行端正行但頭頭法法以身先之作個榜樣故也此時菩薩頂智明妙達觀現前雖現六道衆生形儀而實實確確決定不受六道衆生果報亦決定不復退佛種性中生畢竟在佛種性中生生入佛家紹佛真子直至佛界不離此個端正實信也上十天光品者上即在此心地品之上天光品是六十一品中之一品廣說者言此猶略彼品所說較茲更多也此釋十頂心位也八難即地獄畜生餓鬼盲聾瘖啞世智辨聰佛前佛後北俱盧洲無想天也盧舍那佛言千佛諦聽汝先問長養十心者此牒問誡聽許說十行修進地位觀行之義此二明十行義二初標牒問辭二正解其義此初標牒問辭也下別解其義有十第一慈心位慈即慈無量心也別經名歡喜行謂入法界不為邪動故也若佛子常行慈心生樂因己於無我智中樂相應觀入法受想行識色等大法中無生無住無滅如幻如化如如無二故一切修行成法輪化被一切能生正信不由魔教亦能使一切衆生得慈樂果非實非善惡果解空體性三昧若佛子常行慈心等者前十住位人發心修行十度為彼自利則以檀為首此則修行十行接物利人故常行慈心以慈當先慈有三種一有情緣慈觀一切衆生如一子故二觀法緣慈觀一切法因緣生滅了無自性故三無緣大慈言無心攀緣一切衆生一切衆生自然獲益故菩薩常修行此三慈心以利濟衆生令其離苦得樂生長此樂因已于無我根本智法中樂求一念相應慧觀入法受想行識色等大法中上法字即意根所對法塵也色等等字含聲香味觸四塵此超略言耳云何大法即天地青黃赤白充遍法界豈不教做大法一塵既爾六塵亦然色五蘊既爾諸五蘊亦然咸以一念相應慧觀入此等大法之中如火燒薪而生相無明住相無明滅相無明當下水銷瓦解矣念念相應如幻如化無實體性觀如法如相應色等咸皆無二等無差別也上即有情緣慈義一切修行等者所謂一切修行種種妙行成就無上法輪者無非教化蔭被一切衆生生入佛家長養正信不由外道邪魔所教自能離一切苦也即法緣慈義亦能使一切等者言不但使能生正信不為魔苦所壞而已亦復能使一切衆生自悟無上菩提覺心證無餘涅槃理境得起空利物之慈三昧真實樂果也即無緣大慈義非實等者言此慈樂果不是權小之實法小果亦非人天善惡有漏因果是何等果耶此慈樂果者乃是一念相應智解如如無二空理平等正受體性三昧自樂樂人之慈樂果也此初釋慈心位也第二悲心位悲即悲無量心也別經名饒益行謂常化衆生使得法利故若佛子以悲空空無相悲緣行道自滅一切苦於一切衆生無量苦中生智不殺生緣不殺法緣不著我緣故常行不殺不盜不淫而一切衆生不惱發菩提心者於空見一切法如實相種性行中生道智心於六親六怨親怨三品中與上樂智上怨緣中九品得樂果空現時自身他一切衆生平等一樂起大悲若佛子以悲者以字有力言悲心菩薩雖能拔苦又非得大堅固力者不能故云以悲也空空等者言此悲非衆生情愛之悲乃菩薩空空無相大悲任運往來以大悲緣故行菩薩道示現自滅一切苦惱之相而於一切衆生無量苦惱緣中生長無量方便智慧也不殺生等者即自滅一切苦義生法我三緣合方成殺業缺一決定不成持不殺戒者但空一緣而三緣俱空但常行不殺滅苦而不盜不淫亦如是滅苦也而一切衆等者即苦中生智義言此菩薩如是滅苦前倡後襲自感動一切衆生亦不殺不盜不淫滅諸苦惱而發菩提心生一切智也此上拔苦竟於空見等者言菩薩能于真空實相理中照徹一切諸法皆如實相情與無情無一法而不具茲真空實相由迷而不悟故于衆生種子性分中發生悲緣行道無量方便智心于父母兄弟姊妹六親六怨若親若怨下怨緣三品之中與上三品樂智上上品怨緣中與下下九品得樂果城東老母雖誓不見佛而無害佛之心下怨緣也見佛避入室中四壁皆佛以兩手遮眼十指皆佛與上樂智也調達推山壓佛上怨緣也在地獄中如受三禪天樂九品得樂果也中品與樂不言而可知此上與樂竟空現時等者言此悲緣智道實相真空顯現之時自身離苦得樂令他一切衆生身俱亦離苦得樂以平等一味慈樂果與之而令人人起拔苦與樂大悲心智也此釋二悲心位也第三喜心位喜即喜無量心也別經名無違逆行謂常修善法謙下恭敬故也若佛子悅喜無生心時種性體相道智空空喜心不著我所出沒三世因果無集一切有入空觀行成等喜一切衆生起空入道捨惡知識求善知識示我好道使諸衆生入佛法家法中常起歡喜入佛位中復是諸衆生入正信捨邪見背六道苦故喜若佛子悅喜等者悅是自己暢悅喜是見人喜歡無生心者無相心也無相即是實相也言當此喜時種子性分本體相狀皆如實相空無所有渾圇是一個大空道理空而又空的喜心也不著等者言我且空誰為我所而生執著故曰不著我所也菩薩此時或出或沒于過去現在未來三世十方中善因善果惡因惡果咸無有受安有集者識界色界欲界一切有入無所不空三界衆生以執著故不得此個空觀喜心此菩薩以不著故于一切處凡有所入此空觀行不假用心而自成就也等喜等者言空觀既成于冤于親平等普度廣化一切衆生衆生不解起行空觀而此菩薩示現起空衆生不解入道而此菩薩示現入道衆生不解捨邪見惡知識而此菩薩示現捨惡知識衆生不解求真善知識開示于我妙好正道而此菩薩示現求善知識示我妙道者何總欲使諸衆生入生佛法之家不生邪外之家入生佛法之法中不生權小之法中也常起等者言不特如斯而已菩薩無量悲心有甚休歇之處故心心念念常起自喜喜人歡心入諸佛位之中上合諸佛同一慈力復還仍舊是和諸衆生一樣形儀下合衆生同一瞻仰仍舊如同衆生皈三寶而入正信脫樊籠而捨邪見違背六道諸苦而趣向四聖真樂也以是之故而菩薩心意滿足故生歡喜也此三釋喜心位也第四捨心位捨即捨無量行也別經名無屈撓行謂行大精進行能令一切得至究竟之涅槃故若佛子常生捨心無造無相空法中如虗空於善惡有見無見罪福二中平等一照非人非我所心而自他體性不可得為大捨及自身肉手足男女國城如幻如化水流燈𦦨一切捨而無生心常修其捨若佛子常生等者言此菩薩從無窮劫發心而行捨行以利人故云常生捨心也無造即無能造捨之人無相即無所捨之法及受捨者如是三輪體空法中究竟如虗空空無所有也既能捨所捨皆如虗空則善惡之二因有無之二見罪福之二報于此二法之中以平等慧觀一道照察之亦究竟如虗空空無所有也人相我相我心我所心而自他之衆生相等于其中間求其體性如針鋒許不可得亦究竟如虗空空無所有也如此生心如此觀照方得名為大捨也即我空義及自身等者至于自己內財寶之身肉手足外財寶之國城男女以平等觀照之皆如幻如化無實體性內外之財不可得如水流如燈𦦨無實體性自他之財亦不可得故當一切捨也即法空義而無生心者無生心即無造無相三輪體空之實相心也常修其捨者言此菩薩捨心廣大永遠而無懈歇也此釋四捨心位也第五施心位施即施攝法也別經名無癡亂行謂不為無明之所失亂故若佛子能以施心被一切衆生身施口施意施財施法施教導一切衆生內身外身國城男女田宅皆如如相乃至無念財物受者施者亦內亦外無合無散無心行化達理達施一切相現在行若佛子能以施等者能以施心即能被之心教被一切衆生即所被之心機身施即以身擔荷執勞負役乃至捨頭目髓腦身肉手足口施即口無雌黃出言善熟乃至歡喜讚歎說誠實語意施即心無嗔恨貪癡嫉妬乃至常懷恭敬現柔和相財施即國城妻子珍寶田宅資生業等法施即權實方便大小諸乘因緣譬喻教化引導一切慳吝衆生令其達法達施知內身五蘊外身四大七寶國城男女田宅等物當體全空咸如如相無法可施乃至無財物可念無受施之人無施財之我三輪空相亦皆如如亦內之六根亦外之六塵無因緣可生可合無因緣可滅可散無心行可行無衆生可化無心可行名為達理無生可化名為達施既能達理又能達施何妨一切內施外施現在前行而決無留礙也此釋五施心位也第六好語心位好語即愛語攝法也別經名善現行謂生生常于佛國土中生故若佛子入體性愛語三昧第一義諦法語義一切實語言皆順一語調和一切衆生心無嗔無諍一切法空智無緣常生愛心行順佛意亦順一切他人以聖法語教諸衆生常行如心發起善根若佛子入體性等者愛語乃是極慈極悲至親至切叮寧教誡和順語也言此柔軟好語非凡小情見偏執之語乃即依從如來體性愛語三昧正定所生語也如來有五語一真語二實語三如語四不誑語五不異語此文雖三中該備五義諦法語即真語一切實語統不誑語皆順一語即如語不異語也言此佛子既以第一義諦而生語言凡發示言詞無不真實而必不欺不誑皆順一語終不二語人能恆修此五語為因當感如來廣長舌果也調和等者調和即上諸語為能調一切衆生心為所調無瞋即意和無諍即言和衆生多種心口多別此菩薩難調能調皆使意言平和而無瞋無諍也一切法空等者言此菩薩恆以第一義諦照了諸法皆空此個空智充遍情與無情一切諸法而不假誘進之無緣大慈亦遍一切諸法雖此空智無緣而菩薩恆順衆生調護保愛衆生之心無時暫憩凡其所行上合三世諸佛之心同一慈力亦下合一切衆生之心同一悲仰也以聖法等者言此菩薩教導衆生別無他法惟以聖諦第一義法語竝五語誡誨調攝一切衆生常行如心俾無嗔諍開發生起一切善根永為菩提道種也此六釋好語心也第七益心位益即利行攝也別經名無著行行謂於我我所一切皆空故若佛子利益心時以實智體性廣行智道集一切明𦦨法門集觀行七財前人得利益故受身命而入利益三昧現一切身一切口一切意而震動大世界一切所為所作他人入法種空種道種中得益得樂現形六道無量苦惱之事不以為患但益人為利若佛子利益等者實智即自證本有如如智體性即此智本體性分智道即利生之權智也言若佛子行此利行攝時必依本有實智體性方能廣行智道之權智也集一切等者即廣行智道義明𦦨法門即是種種智慧因緣譬喻無量方便法門所謂開方便門示真實相者此也觀行即空假中之三觀行七財即信戒聞捨慧慚愧之七財如是一切智道皆廣行而所當集者也前人得利等者言當現前行益之人以得此一切智道利益故始能和光同塵示受衆生一般四大五蘊身命而入茲利益正定三昧示現一切神通身輪一切教誡口輪一切記心意輪饒益一切衆生使未發心者令其發心已發心者令其增長由此三輪神用故三千大千世界六反震動也六種震動即動起涌震吼擊是也一切所為等者言凡是一切所施為一切所作用咸使他人入此觀行七財法種中明𦦨法門空種中廣行智道道種中得大利益得大安樂也現形等者言上現身口意不知是何等身形又于何處示現謂即于天道人道阿修羅道餓鬼道地獄道畜生道一一示現如是等形也天道有五衰相現苦惱事人間有生老病死苦惱事修羅有嗔心諍鬬苦惱事地獄有寒酸楚痛苦惱事鬼神有沉幽愁歎苦惱事鳥獸有懷獝狘悲苦惱事故云無量苦惱事不以為患者言此菩薩隱聖顯凡屈尊就卑得得要如此以好事與他人令他得益得樂以苦事自向己不以為患但專饒益他人以為利益耳此釋七益心位也第八同心位同即同事攝也別經名難得行謂成就難得善根故若佛子以道性智同空無生法中以無我智同生無二空同源境諸法如相常生常住常滅世法相續流轉無量而能現無量形身色心等業入諸六道一切事同空同無生我同無物而分身散形故入同法三昧若佛子以道等者以用也道覺也佛也道性覺性佛性一也此智有名無相故可同入空無生法理中也言菩薩善用此智契同此理理智圓融具清淨身也以無我等者無我智即是寂滅智衆生執認四大五蘊以為實我輪回諸趣此菩薩以寂滅智照契此有生之軀四大非有五蘊本空無滅無生生滅不二即具圓滿身也空同等者言道性空無生空無我空生空則萬派一源千差一境矣更有何法而不如哉此世出世間諸法既如如相則具千百億化身也常生等者言四空既明三身圓顯何妨生常同生住常同住滅常同滅耶世法相續等者言雖同世諦法中生生相續流浪輪轉無窮無盡而此菩薩亦于其中能現無窮無盡形狀身體色相心行等業入諸六道在天同天在人同人乃至在畜同畜應以此身得度者即現此身而為說法一切事同者何也為空同無生而理如我同無物而法如也理如則其身雖分而未嘗分法如則其形雖散而未嘗散也以何緣故而能顯如是神通作大佛事耶蓋入同法三昧故而能作是大佛事也此釋同心位也第九定心位定即勝定行也別經名善法行謂乃說法授人成佛之軌則故若佛子復從定心觀慧證空心心諍緣於我所法識界色界中而不動轉逆順出沒故常入百三昧十禪支以一念智作是見一切我人若內若外衆生種子皆無合散集成起作而不可得若佛子復從等者言此佛子復從自己大寂定心中自觀本有妙慧自證本有真空心心相續唯靜是緣于我所法唯見空相識界色界等者識界即四空天色界即四禪天此先從識界色界而不言欲界者何此位菩薩久修梵行證法界身從法界來全體全界俱皆空相故入識界四空色界四禪而不動搖不轉變也逆順等者菩薩從三界外沒自非非想出從非非想沒自無所有出從無所有沒乃至自初禪出為順此自三界外而入三界內也從初禪沒自二禪出二禪沒乃至非非想出為逆此自內而外也以菩薩法身觀自上而下為順以欲界衆生分段身觀自下而上亦順也此言菩薩心心靜緣之益出沒自在逆行順行天莫測也以此之故常心心入大寂定百八三昧中在識界而不動搖常心心入十禪支內在色界而不轉變也以一念等者言以一念相應智慧起見照徹欲界一切我人若內根若外塵衆生識性無明種子無不了了明明皆無生合無滅散無集收無成懷無起止無造作一切皆空如幻如化而不可得亦不動搖不轉變也十禪支即覺觀喜樂定靜捨念慧不苦不樂也此釋定心位也第十慧心位慧即勝慧行也別經名真實行謂二諦非如亦非非相故若佛子作慧見心觀諸邪見結患等縛無決定體性順忍空同故非陰非界非入非衆生非一我非因果非三世法慧性起光光一𦦨明明見虗無受其慧方便生長養心是心入起空空道發無生心上千海眼王品已說心百法明門若佛子作慧等者作起也言佛子起此慧見能照觀智以觀諸邪見結患等縛而破其所惑也此菩薩于諸魔外執常執斷六十二諸邪見十使八難諸結患一一照破如空華如水月無決定體性何以故以順忍觀慧照之與虗空同體故也既空同故則五蘊空而非陰根塵識空而非界六根六塵空而非入衆生空而非衆生一我空而非一我罪福空而非因果過現未空而非三世法法頭頭純一法慧空性相續而起陰光界光法慧性光一𦦨通徹陰明界明法慧性明朗見無疑陰虗界虗法慧性虗而無能受所受也其慧等者言其慧觀中種種巧妙方便生長養心成就慧身不由他悟故也是心等者心即長養心入即證入起即發起空空即是所證人空法空二空真理道即中道言是長養心證入發起二空慧見中道義中惟發此無生心任駕慈航普運衆生咸登般若彼岸故也上千海眼王品中已說此十心百法明門一一廣明其義此釋十慧心位也盧舍那佛言千佛諦聽汝先言金剛種子有十心此本源佛告當機千釋迦化佛誡其當詳審而聽許詳說金剛義也汝先言者乃牒問其詞金剛種子有十心者許細分其義有如是問必有如是答也別經名十回向回即回轉向即趣向謂起大悲心度諸有情回轉十住十行善法向于三處一真如實際是所證二無上菩提是所求三一切衆生是所度以能回之心及所回善行向彼萬類圓滿梵行等入法界也此三明十向義二初總標牒問二別解其義此總標牒問也下別解其義有十第一信心位信即信心回向也別經名救護衆生離衆生相回向謂以前所修證十行神通化度衆生而無能度之相所度之生度而無度故也若佛子信者一切行以信為首衆德根本不起外道邪見心諸見名著結有造業必不受入空無為法中三相無無無生無生無住住無滅滅無有一切法空世諦第一義諦智盡滅異空色空細心心空細心心心空故信信寂滅無體性和合亦無依然主者我人名用三界假我我無得集相故名無相信若佛子標人信者標法也一切行即十住乃至妙覺諸萬行以信為首等者信即正信言此正信不特十金剛中為當先第一自十信始已剋萬行之先為第一所以道信為道源功德母長養一切諸善根一切菩薩智慧花果皆從此正信中出故云一切行以信為首衆德根本也不起至不受正表其信之正處邪豈能勝正哉一切九十六種外道六十二邪見種種等心諸見諸名諸著諸有諸造諸業亦畢竟不受如揚塵順風焉耳矣入空等者以不起不受故一切法空以一切法空故始能證入此空無為法中此空即真空無為法即空理入者證入真空無為空理之中也三相至一切法空正表正信空理三相即生相住相滅相無無者因正信堅實得入空無為法中則此三相亦空無有無有亦無有故云無無也無生下極言無無之理上無生是言空盡世間情與無情一切法之空理無生下無生是言能入空無生空理之觀智亦當無生故云無生無生也無住住無滅滅之正信觀智亦復如是一生住滅法既無無則或百或千以及一切何法不無無耶無有一切法空者言一切法空亦無有也此竭盡無餘之義世諦等者世諦即俗諦世間法也第一義諦即真諦出世間法也言俗諦真諦世出世間觀智到此亦竭盡無餘矣滅異空者即滅欲界諸見及諸業之粗惑空也色空者即滅色界無生生無住住無滅滅之細惑空也細心心空者即滅識界無有一切法空世諦智盡真諦智盡理障盡智障盡之塵沙細惑空也因此細惑心心空之心亦復空故則此能信之心智及所信之理境不假銷除而自寂滅本體性分亦寂滅無有也以無體性故誰為能信誰為所信誰和誰合以相依倚耶然而三界中凡立主宰者有我有人有名有用皆是三界中假我假人假名假用也于我中求得求集求相了不可得人中名中用中又有得集相可得歟如此則方名為無體相之正信也此釋初信心位也第二念心位念即念心回向也別經名不壞回向謂離衆生相是可壞壞其可壞遠離諸離名不壞回向也若佛子作念六念常覺乃至常施第一義諦空無著無解生住滅相不動不到去來而於諸業受者一合相回向入法界智慧慧相乘乘乘寂滅𦦨𦦨無常光光無無生生不起轉易空道變前轉後變轉化化化轉轉變同時同住𦦨𦦨一相生滅一時已變未變變變化亦得一受亦如是若佛子作念等者念明記不忘也言若當位佛子作念時作何等念謂作六種念耳何為六念一念佛常覺即念佛也二念法三念僧四念戒五念天六念施乃至略中四念此但兩頭常施即念施也常念第一義諦中道空理不見有凡法可縛故無著不見有聖解可解故無解既無著無解則雖生而無生相雖住而無住相雖滅而無滅相既無三相誰當動到去來既不動不到無去無來而于諸業受者滙合融通而為一合相回向證入法界空智理中也慧慧相乘者上慧即常念第一義諦破俗之真慧下慧即起空證入法界之理慧乘即輪乘之義言此真慧理慧念念度生入法界如輪乘之無止也乘乘寂滅者上乘即常念第一義諦度俗之真乘下乘即起空度衆生證入法界之理乘寂滅即不動不到無去無來之義言此真乘理乘本來空寂無轉而轉轉而無轉也𦦨𦦨無常者𦦨即慧𦦨𦦨𦦨即慧慧也無常無定處也言此慧𦦨慧𦦨不入法界不離法界往返度生無定居于一處也光光無無者光即智乘之智光光光即智智也無無破惑證真之義言此智光智光照破三界衆生粗細等惑本空而無所離照徹法界空無所有而無所入離而不離不離而離入而不入不入而入故云光光無無也生生不起者言既光光無無即乃生生而不生起而不起無動到去來而轉易空道回向入法界也轉即回易即向轉生向無生轉凡向聖轉煩惱向菩提如是轉如是易故能變前轉後等也變前轉後者變即變易六識也前即前五也轉即環轉七識也後即八識也變前者變易照了前五識當體元空也轉後者環轉旋歸後八識本性清淨也變轉化化者既前五識當體本空化為成所作智則變易照了之六識亦與之俱化而為妙觀察智也既後八識本性清淨化為大圓鏡智則環轉旋歸之七識亦與之俱化而為平等性智也故云變轉化化也化轉轉變者言前後二智本不動搖如空如鏡其所以能轉能化此二識證入本智者誰之力歟皆七六能轉能變之力也七依八起六從五生生與俱生故同時滅與俱滅故同住𦦨𦦨等者𦦨𦦨即轉識成智之慧𦦨上𦦨指前後下𦦨指變轉言四識既成四智也五八慧𦦨與六七慧𦦨了無二相生與偕生而無生滅與偕滅而無滅咸同一時無生無滅也已變等者已變即過去未變即未來變變即現在化者即證入之義言既同時一證則三世十方諸法無所不證亦得一者言過去未來現在善惡因果亦無所往而不得一合相回向證入法界智中者受亦如是者前言諸業受者一合相回向入法界亦與此得一一般也此釋二念心位也第三回向心位回向心即深心回向也別經名等一切諸佛回向謂所向本覺之性湛然常住而能覺之智齊于佛覺故也若佛子深心者第一義空於實法空智照有實諦業道相續因緣中道名為實諦假名諸法我人主者名為世諦於此二有諦深深入空而無去來幻化受果而無受故深深心解脫若佛子深心等者深心深非淺深之深乃最深之深故名深心也第一義空者即一真法界大空理於實法空智者即一真法界大空智以法界智入法界理理智圓融法界無礙即以法界理智而起慧照照有實諦有即俗諦實即真諦然此真諦非離俗諦之外別有乃即業道相續無明老死十二因緣于此生滅因緣以空智照之令契合本來不生不滅中道之理名為實諦經云因緣所生法我說即是空亦名為假名亦名中道義即此也假名諸法等者言假立名言號一切法名我名人名為主者故名為世諦也菩薩于此二有諦諦審諦照深深證入大空法界空理之中而不見有有不見有實無去無來而示去來如幻如化而示幻化無因果罪福而示受果何以故而本無所受故以無受故而此個深深心始得解脫也又聲聞觀四諦法證人空理名淺解脫緣覺觀俗諦法證法空理名深解脫菩薩以法界智觀空假不二真俗互融深之又深故云深深心解脫也此釋三深心位也第四達心位達即達心回向也別經名至一切處回向謂前能覺之智無處不遍既齊佛覺則所證真如之理如佛不異故也若佛子達照者忍順一切實性性性無縛無解無礙法達義達辭達教化達三世因果衆生根行如如不合不散無實用無用無名用用用一切空空空照達空名為通達一切法空空空如如相不可得若佛子達照者達即通達照即照徹謂通達事理照徹無礙故忍順等者忍即忍可忍證順即隨順無違謂忍證法界空理隨順法界空性忍順了達一切世出世間諸法本體實性與法界空理空性無二無別也性性等者言一實性既爾一切性性實性皆然與空性空理亦無二無別無凡情可縛無聖解可解也無礙等者言能忍順性性無縛無解即得四無礙智云何無礙智若于法上達照之時忍順觀諸法相四大本空如幻如化了無實體此法無礙智也于法性理上達照時忍順觀諸法性分充遍十虗本來真實不妄不虗無性可得此義無礙智也于法句法性句上達照時忍順諦思諸法性理遠離文字不墮名言說而無說無說而說此辭無礙智也于法于理于諸言辭自既通了復以此通了他人教化衆生忍順樂說不生疲厭此樂說無礙智也三世等者言四無礙既證則過現未三世十法界善惡因果其中衆生利根鈍根種種行業皆悉如如不遷不變如法界理不見有生云何有合不見有滅云何有散故云三世等不合不散也無實等者言既不合不散則無實體既無實體必無實用既無實用必無名用既無實用復無名用一切世出世間諸法性分義理詎不空乎還以此名空實空二空性理照了通達真空實性契會無疑與法界空無二無別如此方得名為照了通達一切法空者也空空如如等者空空即法界智如如即法界理言此空智空理中求其空空之相不可得求其如如之相亦不可得也此釋四達心位也第五直心位直即直心回向也別經名無盡功德藏回向謂前至一切處是世界等一切佛是如來然如來則一切世界之如來世界即一切如來之世界世界如來互入無礙功德無盡故也若佛子直者直照取緣神我入無生智無明神我空空中空空空理心在有在無而不壞道種子無漏中道一觀而教化一切十方衆生轉一切衆生皆薩婆若安直直性直行於空三界生者結縛而不受若佛子直者等者乃即正直照了諸物公而無私直而不屈之義謂證入中道法界理智而起觀照直照諸法自在體性一切平等無委曲相是為直者之直照也取緣神我等者取即貪取緣即因緣神我即六識分別之我六識名神我者以二乘人不知七八二識而依六根意識分別前塵一一明白似乎無礙故名神我也因八藏識微細難測七識依八而起夙染夙淨又依六識而生現染現淨以舊送新以新送舊互傳互送相續無已又名傳送又名相續皆不可測故也此言直照無他直取二乘攀緣六識依前塵分別昭昭靈靈似神似通之我一照照破本無貪取因緣可生可滅當體全空證入無生理智中耳無明神我空者言前無明緣行以至苦惱貫三世而為因緣起生見滅見之神我入此無生智中諸有盡空此空有也空中空者言空盡諸有之空入此無生智中空亦盡空此空無也空空理心等者言此個空有之理心竝空無之理心在有不滯有有空而不壞有在無不證無無空而不壞無何以故蓋此空空之理即是菩提道性金剛種子一切有無詎能壞之耶故云空空等不壞道種子也無漏等者無漏即不壞義言既不壞即不為一切有無等之所滲漏不漏于有即得空觀不漏于無即得假觀于空于假不即不離故名曰無漏中道平等一觀也而以此理教化一切十方執有執無衆生離有離無一齊回轉證入薩婆若空智平等慧海直證斯空空直道不被物轉能轉物不為人轉能轉人也何以故菩薩皆以直性而行直行不與法縛不求法脫不厭生死不愛涅槃無所罣礙猶如虗空所謂不如三界見于三界故云于空等而不受也此釋直心位也第六不退心位不退即不退心回向也別經名入一切平等善根回向謂于諸佛地起萬行因顯證一乘寂滅之道行從理起故云隨順平等能生道果故云善根也一名隨順堅固一切善根回向若佛子不退心者不入一切凡夫地不起新長養諸見亦復不起集因相似我人入三界業亦行空而不住退解脫於第一中道一合行故不行退本際無二故而不念退空生觀智如如相續乘乘心入不二常空生心一道一淨為不退一道一照若佛子不退等者言此位佛子修行不退心中道觀智者有三一不退入凡夫地凡夫非白地凡夫乃十信位大心凡夫指修十住空觀牢固故不退入于信位凡夫地也二不起新長養諸見言修行十行假觀守舊不遷惟長養六度萬行豈更新長養諸凡夫外道邪見哉故云不起諸見也三亦不復起集因相似我人言菩薩自一信二念至本不退位修行中道觀智唯此一觀力行進趨心心不二豈復更起集業因緣相似神我主人等見哉故云亦不復起集因相似我人也入三界等至退解脫即不入凡夫地義言此菩薩空觀純熟入識界識界業空入色界色界業空入欲界欲界業空以亦行此空觀之故而所以不于住中退入信位初離凡夫之解脫道也于第一等至不行退即不起新見義言此菩薩先修空觀以遣有次修假觀以遣無修空不即空亦不離空修假不即假亦不離假不無不有不即不離是名中道第一義觀蓋三觀互融一合行故也故所以不長諸見而不行退也本際等至念退即不起集因等之義言此菩薩于三世盡三世本際于十方盡十方本際念念充遍𭰞合中道智觀無二無別故所以不起集因而不念退也空生觀智如如者空生觀智即能行空觀之本智如如是所證入法界之觀理此不住退之益也相續乘乘者相續即中道合行念念相續乘乘即行行相乘此不行退之益也心入不二者言心心念念無缺無餘綿綿不斷流入不二法中此不念退之益也常空生心結前行空無間之義一道結前中道一合之義一淨結前本際清淨不二之義其為不退心者三蓋以此也一道一照者言此菩薩之所以為不退者唯以中道第一義觀一智照了之故得不退也此釋六不退心位也第七大乘心位大乘即大乘心回向也別經名隨順一切衆生回向謂既修真因善根成就則知十方衆生皆我本性性既平等故能成就一切衆生善根無有遺失亦無高下故也若佛子獨大乘心者解解一空故一切行心名一乘乘一空智智乘行乘乘智心心任載任用任載任一切衆生度三界河結縛河生滅河行者坐乘任用載用智乘趣入佛海故一切衆生未得空智運用不名為大乘但名乘得度苦海若佛子獨大乘心等者獨者孤獨無侶大者大而無外乘者運載轉輪為義揀非聲聞辟支佛乘亦非初捨凡夫大心菩薩住行位乘乃是回向終心廣度衆生中道大乘也解解一空故者正釋獨大乘義上解是能解法界之廣大智下解是所解法界之廣大理以智契理二俱平等了無能所故云解解一空故也一切行心名一乘者謂以此法界理智而起一切行心一切行即法界行一切心即法界心如此廣大方名一切行心為一乘也乘一空智者言此一乘所以運用解解一空之理智也智乘者空智理乘也行乘者即空法界行乘也乘智心心者言行乘之心與智乘之心互行互用方得名為大乘以法界行而任載以法界智而任用也任載者何以此行乘任載一切凡夫出恩愛河超欲界色界無色界永離分段生死苦故也任載一切外道出諸邪見等河遠離執縛得解脫故也任載二乘出取緣神我分別知見等河遠離生死苦海超變易故也行者坐乘言度生者不居于此不住于彼不住于中但默坐乘中不生懈倦之心而已任用者何任荷載用等法界智以廣化利益一切衆生直超入佛海故也一切衆生等者言一切得度三界結縛生滅等河衆生未曾得此等法界空智紹佛任用以廣利有情不得名之為大乘但名為行乘僅能得度三河出苦海以自利不能利他也行不離智智不離行智行竝行始能廣利方得名為中道觀智大乘也此釋七大乘心位也第八無相心位無相心即無相回向也別經名真如相回向離妄曰真不異曰如謂一切法性本真如不即不離二俱無著則真如相現也若佛子無相心者妄想解脫照般若波羅蜜無二一切結業三世法如如一諦而行於無生空自知得成佛一切佛是我等師一切賢聖是我同學皆同無生空故名無相心若佛子無相等者言此位佛子無妄想及解脫之分別心也妄想乃生死法即有也解脫乃涅槃法即無也照覺照也言凡夫妄想本空肯覺照之時一念回觀如同本得智慧即是妄想妄想即是智慧無二無別也二乘解脫住著涅槃惟專自利若肯覺照發起利他之心則智慧即是解脫道解脫道即是智慧咸亦無二無別也一切結等者言一切衆生結使業繫過現未來因果得非妄想法乎如如不二中道一觀諦理得非解脫法乎而菩薩常行于無生空慧寧非照般若波羅蜜無二乎自知等者言此菩薩般若觀行如淨圓妙鏡照徹三世十方瞞他一點不得自己曉了現前當來決定成佛知一切諸佛是我本源師知一切三賢十聖皆是我同學伴侶何以知然我行此無生空諸佛諸賢聖亦皆同行此無生空以自利利他故而知也無生空即般若空慧般若空慧即無相心故名無相心也此釋八無相心位也第九慧心位慧即慧心回向也別經名無著無縛解脫回向謂真如之相現前則智慧明了十界依正等法互攝圓融自在無礙故若佛子如如慧者無量法界無集無受生生生煩惱而不縛一切法門一切賢所行道一切聖所觀法所有亦如是一切佛教化方便法我皆集在心中外道一切論邪定功用幻化魔說佛說皆分別入二諦處非一非二非有陰界入是慧光明光明照性入一切法若佛子如如等者如如即法界理慧即法界智以理契智以智契理故名如如慧也無量言極其多法界非一乃至無量言此如如慧遍一切處故也無集等者言菩薩起智利生入一切法界示集因而無集示受生滅而無受生生生世世示現諸煩惱業而不能繫縛者何以故如如理智圓融周遍之故而不能縛也一切等者言至于一切法門一切賢所行住行向道一切聖所觀地地法凡其所有一切等法亦如是而不能縛也一切佛等者言不特賢聖法不能縛即盡十方三世一切佛教化開導一切衆生巧妙方便法我皆集在我如如慧心之中亦無妨礙也外道等者言豈但諸佛法無礙即外道一切雜典戲論法一切邪定盲煉功用一切種種不實幻化法若魔說若佛說我皆以無分別如如智慧分別入二諦非真非俗中道諦中俾邪定正定魔說佛說咸圓融渾化為如如慧心也非一等者言灼然有邪有正有魔有佛故非一至如如慧中邪正魔佛等見亦不鎔而化故非二既一二俱非則三科一切法咸非有亦不鎔而化皆是慧心光明逢一切昏有而愈增慧𦦨故所以此慧光明本體照性照了入一切諸法之時一切諸法亦是智慧光明也此釋九慧心位也第十不壞心位不壞即不壞心回向也別經名等法界無量回向謂所證性德真如之理圓滿成就含攝遍周其量無外十界差別之相了不可得故若佛子不壞心者入聖地智近解脫位得道正門明菩提心伏忍順空八魔不壞衆聖摩頂諸佛勸發入摩頂三昧放身光光照十方佛土入佛威神出沒自在動大千界與平等地心無二無別而非中觀知道以三昧力故光中見佛無量國土現為說法爾時即得頂三昧證虗空平等地總持法門聖行滿足心心行空空空慧中道無相照故一切相滅得金剛三昧門入一切行門入虗空平等地如佛華經中廣說若佛子等者言此位佛子得不壞心者非只一法其義有六故而得不壞心也一入聖地智者謂住行向三十心名賢地上菩薩名聖菩薩到此十向滿足宜登初地入聖地智慧也二近解脫位者謂初地始離解脫分別障三賢向滿近于初地故名近解脫位也三得道正門者以初歡喜菩薩得正修得門路一超直入如來覺地此向滿菩薩將入初地故云得道正門也四明菩提心者梵語菩提華言覺菩提覺心有五種一十信菩薩名發菩提心二三賢菩薩能降伏其心名伏菩提心三初地至七地菩薩與般若慧相應名明菩提心四八九十地菩薩真得無生法忍遠離三界名為出到菩提心五等妙菩薩坐于道場成等正覺名為證菩提心此十向終心將登聖地正當三位明菩提心也五伏忍順空者忍有五忍三賢名伏忍初二三地名信忍四五六地名順忍七八九地名無生忍十地等妙名寂滅忍此三賢向滿居伏忍頂異相無明現行不起能隨順無生空慧故云伏忍順空也六八魔不壞者八魔一色二受三想四行五識共名五蘊魔六煩惱魔七死魔八天魔是為八魔也言不壞者由此菩薩得此六種大法故所以魔不能壞也衆聖等者言以是魔無能壞故感衆聖摩頂安慰其心諸佛勸發增進其行以衆聖諸佛加被故得入摩頂三昧自解全身放光光明照達十方佛剎即能入佛威神形儀如佛于諸佛剎中若出若沒或顯或隱自在無礙以佛神力一時震動大千世界與虗空平等地心無二無別而非行向菩薩中觀智道之比何以故以得諸佛三昧加被力故所以能光中見一切佛能于無量佛國土中現化無量身廣利有情而為說法當爾之時即實得頂三昧而能實證虗空平等歡喜地得妙湛總持法門也總謂總一切法持乃持無量義也聖行等者言所以證此地者一切如來聖行功德悉皆圓滿具足一切住行向諸心心行到此悉空且道因何而得聖行滿因何而得賢行空耶以諸佛空空復空空之大空慧中道智觀無相慧照力故而得聖行滿足一切行相滅盡無餘而得心心行空也得金剛等者言以是行相障礙滅盡故即得金剛不壞三昧正受法門一時現前能入十地一切行門一時具足一齊而行方才證入虗空平等地也如佛華經之中其說更廣此但略說焉耳此釋第十不壞心位也盧舍那佛言千佛諦聽汝先問地者有何義此能說報佛召告當機化佛宜詳審諦聽汝先所問十地二義我今一一次第為汝詳答十地之義也此四釋十地又有三一總標問辭二別解文義三結讚法門此總標問辭也下二別解其義有十第一體性平等地華嚴疏云十地菩薩斷十種障證十真如體性實無差別乃隨勝德假立十種雖初地中已達一切而所證如猶未圓滿令圓滿故地地建立又初地中雖離分別我法二執是以遠離第六粗惑猶有第七微細俱生我法二執而未空盡第六分別二執自初信發心時修生空觀至七信位已斷分別我執而隨入法空觀歷三賢位至初地時分別法執亦即斷矣第七俱生二執自初地位恆住雙空觀中至七地後心方捨能藏所藏乃至八地初心即得無功用行是則俱生我執現行永伏即捨執藏俱生法執間起至等覺後心金剛喻定現在前時一剎那間生相無明異熟種子方始斷盡而無餘也其云十地斷十種障證十真如者何如初地斷一種異生性障此障乃從凡夫分別我執現行所起故名異生性障竝斷二種愚執一執著我法愚二惡趣雜染愚謂此三法能障初地此地菩薩自從賢位初證理性始獲法味證二空理今二空觀現前便能永斷愚障既斷能益自他生大歡喜名歡喜地其所證真如名偏行真如以能遍行染淨法故菩薩位寄轉輪聖王廣修慈悲等法而化導衆生故華嚴經云歡喜地菩薩於十波羅蜜中檀波羅蜜最勝餘非不修但隨力隨分若子佛菩提薩埵入平等慧體性地真實法化一切行華光滿足四天果乘用任化無方理化神通十力十號十八不共法住佛淨土無量大願辨才無畏一切論一切行我皆得入若佛子標人菩提薩埵顯德入平等體性地總標顯德位也梵語菩提薩埵華言覺有情言乃上求佛道下度衆生之人也入平等慧體性地者入即證入平等即法身理慧乃空慧言此菩薩斷障證真故即得證入如來平等法身空慧本體性分地中也別經名歡喜地菩薩智同佛智理齊佛理徹見大道盡佛境界而得法喜登于初地故名歡喜也真實法化者真即不妄實即不虗法即理法化即開化言以不妄不虗真實平等之理開化誘導衆生也一切行華光滿足者一切行即萬行華即因華光即智光言此菩薩萬行因華智光果海悉皆圓滿具足也四天果乘用者四天即四天下果即轉輪王果乘即象馬寶乘用即御用也言此菩薩華光滿足得轉輪王果又得七寶惠施象馬寶乘御用遊歷一日一夜可周四天下也在化無方者任意惠施常行周濟隨方設化無有定所也理化神通者言作善衆生則順理而化俾其增修應攝受者而攝受之作惡衆生則用大威神力去除驕慢應折伏者而折伏之也十力等者十力詳五地十號詳十地十八不共詳七地淨土有三一常寂光土法身佛所依理土也二實報莊嚴土即報身佛自受用土又他受用土即向滿菩薩所宜居處也三變化土應身佛所以利生隨機應感方便土也此地菩薩所住即他受用土言此菩薩于如來十智力如來十號如來十八不共行法一一法中無不通了一齊而行住如來實報莊嚴淨土以攝利衆生也無量等者無量即四無量心也大願即十大願也辨才即四無礙智也無畏即五無畏一不活畏二惡名畏三怖死畏四惡道畏五大衆威德畏一切論即四明五明一切諸論一切行即十地等覺妙行言此菩薩二空理明于四無量心十大行願四無礙辨才教化衆生離五怖畏一切論法一切行法我一一皆得證入之也生出佛家坐佛性地一切障礙凡夫因果畢竟不受大樂歡喜從一佛土入無量佛土從一劫入無量劫不可說法為可說法反照見一切法逆順見一切法常入二諦而在第一義中以一智知十地次第一一事示衆生而常心心中道以一智知一切佛土殊品及佛所說法而身心不變以一智知十二因緣十惡種性而常住善道以一切智見有無二相以一智知入十禪支行三十七道而現一切色身六道以一切智知十方色色分分了起入受色報而心心無縛生出佛家者不生凡夫外道權小之家但佛降生同時一家中生也又或繼佛而生紹法王位形儀如佛為佛真子故云生出佛家也坐佛性地者謂此菩薩得證真如境界其所坐止之處與佛性地無二無別也一切等者言一切異生性障凡夫有漏善惡因果到此永離亦畢竟不復更受其報也大樂歡喜者既永離一切障礙即得出世間心未曾有法故所以大樂歡喜也從一佛土入無量佛土者身無礙也從一劫入無量劫者意無礙也不可說法為可說法者口無礙也言此菩薩離障得通神通輪記持輪說法輪三輪無礙有如此者也反照等者言此菩薩三輪無礙或示回光反照之理令一切衆生悟法界性見一切法也得示逆行境界令一切衆生悟法界性見一切法也得示順境界令一切衆生悟法界性見一切法也得無可無不可者所謂道逆行順行天莫測也常入等者言菩薩何所據而能如是耶謂常入俗諦而不滯有常入真諦而不沉空既不滯有又不沉空入在何處而入在二諦之處第一義中道理智諦中耳下六智即此常入之義以一智知十等者一惟以此一智能知一地二地乃至十地先後次第斷障證真一一事不錯不謬示導衆生令其進修而常心心中道無間無歇也二惟以此一智能知一切十方諸佛剎土淨穢勝劣殊品及諸佛教化衆生所說法門而常身心不遷不改也三惟以此一智能知十二因緣生滅因果身三口四意三十惡種子性分而常住十種妙善戒法道中也四惟以一切智能見徹有非是有因無故有無非是無因有故無原無有相原無無相故也五惟以此一智能知出入覺觀喜樂一心淨捨念慧不苦不樂十禪支觀行四念處四正勤四如意足五根五力七菩提八正道三十七品助道而示現一切種種分段色身六道之中應以何身得度者即現何身而為說法也六惟以一切智能知十方色無色界分分變易生滅了起入受四禪四空一般色報而心心空慧無著無縛往返無礙也光光照一切是故無生信忍空慧常現在前從一地二地乃至佛界其中間一切法門一時而行故略出平等地功德海藏行願如海一滴毛頭許事光光照一切等者光光即前六智光照一切即前知地知品知緣見相知禪道知色色起智利生等一切也以是之故所以無生信忍無生空慧不斷不續常常現在前行也以是現前故從一地法門二地法門乃至佛界地法門于其中間一切地地法門俱皆一時而能盡行不假餘力也略出等者言此大槩略出平等地㱔少功德海藏行願譬如以一毛蘸取大海中水之一滴許事耳第二體性善慧地此地菩薩斷一種邪行障此障即所知障中俱生一分法執誤犯三業所起故名之也竝斷二種愚執一者微細誤犯愚二者種種業趣愚此之三法能障二地斷此愚障方登二地菩薩今得增上尸羅波羅蜜多性戒具足遠離誤犯愚障既斷故名離垢地以所證真如名最勝真如此真如性具無邊德於一切法最為殊勝故菩薩位寄忉利天王假修十善等法化導衆生於十波羅蜜中尸羅波羅密最勝餘非不修但隨力隨分若佛子菩提薩埵善慧體性地清淨明達一切善根所謂慈悲喜捨慧一切功德本從觀入大空慧方便道智中見諸衆生無非苦諦皆有識心三惡道刀杖一切苦惱緣中生識名為苦諦三苦相者如者如身初覺從刀杖身色陰二緣中生覺為行苦緣次意地覺緣身覺所緣得刀杖及身瘡腫等法故覺苦苦緣重故苦苦次受行覺二心緣向身色陰壞瘡中生苦覺故名為壞苦緣是以三覺次第生三心故為苦苦苦若佛子三句標顯名德位也入平等善慧地者謂善能修行清淨明了法身平等大慧故名善慧地也別經名離垢地謂由淨佛境界明了諸法異性而入于同若見有同即非離垢同性亦滅斯為離垢也清淨明達等者清淨即體性離垢明達即善慧照了言其垢盡光現明了通達一切善根故何為一切善根耶所謂慈悲喜捨慧五觀為一切衆善功德之根本也一切功德本即六度萬行功德咸以此四無量心智慧觀照以為根本故觀照雖五一慧總攝今以慈觀而為首者慈能與樂故也諸佛菩薩所得菩提本欲與衆生共樂奈何衆生現居苦中必須離苦方得其樂故以慈觀而起悲觀先拔其苦以諸衆生離苦菩薩本願亦足故次之以喜觀自慶慶人雖云得喜亦不住喜故次之以捨觀捨一切貪著行捨俱生我法非慧無繇故以慧觀融通咸遍法界此五慧觀所以為衆德根本也從觀入大空等者大空慧即甚深無相大空般若方便即善巧方便道智即菩提道智言如是四無量心乃是從此大空般若巧妙方便菩提道智之中所起見諸三界二十五有四生十二類衆生無非火宅中苦諦也皆有識心者言菩薩起悲拔苦諦思此苦從何而有耶觀是三界一切衆生皆有妄想識心以識未空分別取捨作諸惡業墮在地獄餓鬼畜生三惡道中受諸苦惱姑就三惡道中舉畜生類受刀杖苦一法以例地獄餓鬼一切苦惱逼迫生識由是緣中生識識心未空之故而生苦諦也三苦相者言苦諦中有三種苦相一行苦相二苦苦相三壞苦相也一行苦者四相遷流無常不定不得自在為行苦相二苦苦者身為苦本因身得刀杖苦而意地生煩惱苦苦上加苦為苦苦相三壞苦者風刀解體耳聾眼瞶四肢不隨為壞苦相是則名為三苦相也如者只如也承前起後之意言既有三苦相必有三苦覺有三苦覺必有三苦緣只如三苦覺與緣又從何而有耶一如身初覺等者言只如身乍先起覺之時從何起覺蓋從刀杖色陰緣及身色陰緣二緣中生起此覺二緣互起識念不停故名為行苦緣也二次意地覺等者言意地覺能緣竝身覺所緣得刀杖斫打等法及身受打斫生瘡腫等法之故身覺苦意地覺亦苦二覺而生二苦故名覺苦苦緣也重故苦苦者迭解苦苦之義言身覺刀杖而生痛苦意地覺而生惱苦苦上加苦誠然不輕故云重故苦苦也三次受行覺等者言受行苦緣心覺苦苦緣心二緣心緣向自身色陰見得四大欲離于瘡腫壞相中而生苦覺故名為壞苦緣也是以三覺次第生三心故者一根覺生覺刀杖之心二意地覺生覺根覺之心三壞苦覺生覺行覺苦苦覺之二心以是三覺次第而生三心三心俱苦故名苦苦苦也一切有心衆生見是三苦起無量苦惱因緣故我今是中入教化道三昧現一切色身於六道中十種辨才說諸法門一切有心衆生者此總舉三界十二類之衆生所謂有心者皆當作佛是也見是三苦等者言此等衆生皆由不能了達此苦幻妄非實見是三苦乃起無量苦惱因緣而反造諸惡業以致生生死死死死生生如旋火輪無有休息故我菩薩于是衆生無量苦惱緣中興慈運悲起同事攝入教化道三昧現一切色身于六道之中而以十種巧妙無礙辨才說諸知苦斷集修道證滅種種法門也謂苦識苦緣刀杖緣具苦識行身瘡腫發壞內外觸中或具不具具二緣中生識識作識受觸識名為苦識行二緣故心心緣色心觸觸惱受煩毒時為苦苦心緣識初在根覺緣名為苦覺心作心受觸識覺觸未受煩毒時是名行苦逼迮生覺如斫石火於身心念念生滅身散壞轉變化識入壞緣緣集散心苦心惱受念後緣染著心心不捨是為壞苦三界一切苦諦謂苦識等者言云何知苦耶謂令知苦識知苦緣知刀杖緣知具苦識行知身瘡腫發壞知此等苦因苦緣苦花苦果之苦相令但有心者知苦生厭而發菩提心也內外觸中等者內即根外即塵或具者或因三緣而具或不具者單根不立獨境不生云何具識故云不具也言內根身外塵境互觸之中或根境相觸而具識或根境不相觸而不具識其所以具識畢竟從何而有蓋畢竟具內身苦本緣外刀杖苦境塵緣二種緣中而生此觸識觸識即五識也二緣中既生五識則意識同時而起分別前照後了為造業主故還是六識作之還是六識受之耳其所謂苦識者就是此觸識名為苦識行蓋具二種緣而生識故也心心緣色等者心心即六識心念念緣前刀杖身二色陰相觸生瘡腫苦境故心觸苦境苦境觸心而生煩惱正當受此煩惱毒痛之時身得瘡腫之苦心生煩惱之苦身苦心苦是為苦苦也心緣識等者以六識心緣前觸識此五種觸識最初在五根覺刀杖緣觸身心覺其苦故名為苦覺也心作心受者言還是六識心貪取前塵分別影事造作業苦心自領受無相代謝也觸識覺觸者明前五識不造業但此觸識僅能了境覺觸也未受等者言此心未曾深受煩毒之時只有隨念而無計度但只為第六行苦一種引發之緣是故觸識亦名為行苦而實非也僅能覺觸耳逼迮生覺等者言造業者為第六心由前五識緣現前逆順影子一剎那間流入意地逼迮生覺心受煩毒譬如石中之火旋斫旋出于身心中遷流不停念念生滅故云逼迮生覺等也已上敘明五不造惟第六也身散壞等者是命盡時四大各離轉變化者是聰明轉變化為聾聵四肢不隨五根五塵五識一時將盡惟此造業六識念念入此瘡腫臭爛緣中緣集想此身少而壯壯而老何等輕健緣散想到此時節惟見此病死苦衰頽敗壞散滅之相不由他心地下心心相續生苦生惱受念後有異熟因緣貪緣純熟而染著餓鬼嗔緣純熟而染著修羅癡緣純熟而染著地獄隨所熟而染心心念念顧惜不捨是則名為壞苦也如此三苦為衆苦之本而三界衆生未得解脫故云三界一切苦諦此說知苦法門也復觀無明集無量心作一切業相續相連集因集因名為集諦復觀等者言云何斷集耶言復觀者返推其因此苦從何而有謂依無明幻妄所起故有此苦無明即不明也以是真如不守自性一念妄動生起三細不了前境增長六粗故曰無明因有無明遂集無量種種妄想攀緣之心造作一切諸惡業緣招引苦果相續相連過去之因成現在果現在之因招未來果如是集因集因以集三界因果是則名為集諦言此無明集因是一切有心者之所當斷者此說斷集法門也正見解脫空空智道心心名以智道道諦正見等者言云何修道耶謂上既知苦即是正見斷集即是解脫矣何更別求正見解脫哉具正見則苦空具解脫則集空苦空集空即是具足無上大空慧之智道也能以此空慧心心相續念念相連不復更受三界苦果集因等報即此是則名為增修智道也以用也增修之意道諦者結束上文乃道諦也此說修道法門也盡有果報盡有因清淨一照體性妙智寂滅一諦盡有等者言云何證滅耶有字正應上皆有識心一切有心衆生二有字因果不忘為有以欲界色界無色界見思等惑流轉三界不能出離一切諸苦故名為有而以正知正見修行聖道不起貪嗔癡慢疑不起身邊諸邪見盡三界二十五有見思塵沙等惑苦果苦因唯以此清淨大空慧一一照了之如揚塵順風體性妙智悉同寂滅無餘蘊矣是則名為寂滅一諦也此說證滅法門也慧品具足名根一切慧性起空入觀是初善根慧品等者二根字正應前一切善根根字一切功德本本字言此大空慧品具足慈悲喜捨無量功德品一切皆依大空慧品以為根本也一切慧性等者一切即四無量等言慈悲喜捨一切慧性亦皆依大空慧中起空而入智觀現身六道利益苦惱衆生說示四諦法門使諸衆生知苦斷集修道證滅是名初善根也第二觀捨一切貪著行一切平等空捨無緣而觀諸法空際一相我觀一切十方地土皆吾昔身所用故土四大海水是吾故水一切劫火是吾昔身故所用火一切風輪是吾故所用氣我今入此地中法身滿足捨吾故身畢竟不受四大分段不淨故身是為捨品具足第二等者言既解觀苦斷集修道證真恐人貪著寂滅之樂不捨故復勸觀捨也且道所捨者是何物耶此捨非捨凡夫妄想貪愛執著惡行非捨外道諸邪見非捨二乘諸因緣乃捨正知正見寂滅等觀諸行毋使貪著令其一切平等空即平等空亦捨無緣可捨捨亦復捨而觀世出世諸法空際之處無相可得無相可捨故云一相也我觀一切等者言所以我觀一切地土是我昔身所用舊骨肉四大海水是我昔身所用舊血脉一切劫火是我昔身所用舊暖氣一切風輪是我昔身所用舊呼吸我今既證入此離垢地得證真如無相法身圓滿具足乃捨吾之故身永斷邪障畢竟不復更受四大分段不淨雜染故身以不受故是為捨品具足此第二觀捨善根也第三次觀於所化一切衆生與人天樂十地樂離十惡畏樂得妙華三昧樂乃至佛樂如是觀者慈品具足第三等者謂此菩薩說法利生必隨機宜而與之樂故次觀于所化一切衆生種種根性如求人天樂者則與三皈五戒十善令其生人天中受勝妙樂如求菩薩乘者則與六度四攝令其得證十地之樂如求離十惡畏樂者衆生往昔以造不淨三業必墮三途怖畏之中反此十惡令修十善得生人天受十善樂也得妙華三昧等者言令此菩薩得聖人妙道萬行因華三昧正定乘此智定證十地果故得妙華三昧之樂乃至令得佛果無餘涅槃究竟之樂如是觀者是為慈品具足離惡畏悲具足五樂喜具足此第三觀慈善根也菩薩爾時住是地中無癡無貪無瞋入平等一諦智一切行本遊佛一切世界現化無量法身如一切衆生天華品說菩薩當爾之時住是二地中慧品具足故無癡相捨品具足故無貪相慈悲喜具足故無瞋相以無貪瞋癡故所以證入平等大空慧品一諦聖智是以平等一諦理智而為一切萬行根本以是智行雙運而能遊佛一切世界承事諸佛亦能現化無量法身攝受無量衆生也此處所說文義如大部中一切衆生天華品中說一樣第三體性光明地此地菩薩斷一種暗鈍障此即所知障中俱生法執一分暗鈍所起令聞思修總持妙慧不現在前故名之也竝斷二種愚執一者欲貪愚二者陀羅尼愚此之三法能障三地斷此愚障方登三地今此菩薩以聞持陀羅尼三慧現前便能永斷愚障既斷故名發光地所證真如名勝流真如謂此真如令所流教法極為最勝故菩薩位寄夜摩天王假修十善等法化導衆生於十波羅蜜中忍波羅蜜最勝其餘非不修但隨力隨分若佛子菩提薩埵光明體性地以三昧解了智知三世一切佛法門十二法品名味句重誦記別直語偈不請說律戒譬喻佛界昔事方正未曾有談說是法體性名一切義別是名味句中說一切有為法分分受生初入識胎四大增長色心名六住於根中起實覺未別苦樂名觸識又覺苦樂識名三受連連覺著受無窮以欲我見戒取善惡有識初名生識終名死是十品現在苦因緣果觀是行相中道我久已離故無自體性若佛子三句標顯名德位也光明體性地者謂此菩薩成就勝定大法總持能發無邊智慧光明故云體性光明地別經名發光地謂同異情見之垢既淨則本覺之慧光明開發故名發光也以三昧解了等者三昧即甚深那伽大定謂從此甚深大定發起大智慧光始能解會了知三世十方一切諸佛方便化導法門也十二法品等者十二數也法軌則也品類也名即名言名身也味即義味文身也句即章句句身也言佛佛出世必說此十二法門軌則品類經律論三藏中若事理若因果若權實若顯密無一名言一義味一章句無不備攝此十二部法門該括無遺也何名十二一曰重梵語秪夜華言應頌亦云重頌以長行文義不盡重說偈頌以被後機也二曰誦梵語修多羅華言契經上契諸佛理下契衆生機只有長行而無偈頌者彌陀心經等是也三曰記別梵語和伽羅華言授記如來授記諸大菩薩聲聞弟子來世作佛劫國莊嚴是也四曰直語偈梵語伽陀華言諷誦亦名孤起不應長行直說偈句如金剛明空品等是也五曰不請說梵語優陀那華言自說無人發問乃佛以他心智觀機應時而自宣說如佛頂經彌陀經等是也六曰律戒梵語尸陀羅華言因緣蓋戒律多屬因緣有問有說有持犯得失之事竝制戒緣起一切根本緣起善惡因緣果報等是也七曰譬喻即比況的意思諸有智者要以譬喻而得開解是也八曰佛界梵語闍羅伽華言本生謂如來說諸菩薩本因地受生之事及自說本因地中受生之事如涅槃經云比丘當知我于過去作獐作鹿作熊乃至作太子作金輪王等是也九曰昔事梵語伊章目多伽華言本事如來說諸菩薩弟子因地為求菩提道法所行苦行之事如採果汲水捨薪設食布髮掩泥身為牀座然燈求偈割肉捨身乃至為金輪王捨頭千顆等是也十曰方正梵語毗佛略華言大方廣大即體大方即相大廣即用大謂諸如來所說大乘方等經典其意猶如虗空廣博包含無所不致是也十一曰未曾有梵語阿浮達磨華言未曾有亦名希有謂佛初生手指天地足跡蓮華光照十方地搖六震如是希有之事見聞稱奇咸言希有也十二曰談說梵語優婆提舍華言論議謂諸經中凡有問答辨論諸法義者皆名論議如法華經智積菩薩與文殊師利論說妙法者是也已上十二部法門名相也是法體等者言是十二法門品體性本同實無差異因衆生有一切心故用一切法因此之故便有一切名一切義一切差別是名味句中故有如此差別說也一切有等者言所謂有差別者無非發明一切衆生迷理成事迷智成識一切生滅有為諸法分分受生之義欲令衆生知真本有識妄元無故也何謂分分受生耶初入識胎者此初分受生也即行緣識義蓋由過去煩惱障覆本性不了法界真如之理名為無明以無明故妄作不善惡行相續而行故名為行以無明與行二因緣故行緣識也無明與行是過去因今文中十品皆現在因緣也識初入胎一剎那間染愛為種納想成胎名曰凝滑故名初入識胎也四大增長色心者此二分受生也即識緣名色義言識在胎染父母精血三緣和合漸漸增長而成身形遂有名心色質一七二七名胞至五七日名為形位生諸根形手足故名四大增長色心也名六住者此三分受生也即名色緣六入義謂從名色已後至六七日名髮毛爪齒位至七七日名為具根形位六根開張有入六塵之用乃妄心依止處故名六住也於根中起實覺未別苦樂名觸識者此四分受生也即六入緣觸義此即出胎後乃至三四歲時六根對於六塵起無知實覺而未能分別知苦知樂故此實覺名為觸識也又覺苦樂識名三受者此五分受生也即觸緣受義謂後五六歲至十二三歲時因六塵觸六根即能領受如對苦境即覺是苦而有苦受樂境即覺是樂而有樂受不苦不樂境即覺是不苦不樂而有不苦不樂之受故名三受也上五支是現在果連連覺著受無窮者此六分受生也即受緣愛義謂從十四五歲至十八九歲時連連起心貪染欲境雖云貪愛而未廣求亦只名受但連連覺心染著其受已無窮盡也以欲我見戒取者此七分受生也即愛緣取義謂從二十歲由有諸欲助發愛性種種取捨執我報人深生貪取由貪引取而生嗔癡慢疑身見邊見邪見見取戒取十使煩惱故名以欲我見戒取也善惡有者此八分受生也即取緣有義謂因六識馳求諸境起造善惡集三有之因牽引阿賴耶受當生三有之果故名善惡有也此愛取有三支是現在因識初名生者此九分受生也即有緣生義謂既有現在所造善惡業因必受來世善惡業果故使賴耶隨善惡業六道受生此識最先投胎故云識初名生也識終名死者此十分受生也即生緣老死義謂從來世受生已後五蘊身相熟已還壞一期命盡此識最後而捨故云識終名死也而此生死二法雖曰來世之果乃約現在而言實該三世生滅去來分分受生之義是十品現在苦因緣果者此句總結上文謂以無明與行是過去因由過去因感現在果今只所言現在因果不言過去二因者何以果該因佛欲現前諸人識現前苦果苦因毋使再造有漏苦因永滅當來苦果也觀是行相等者謂觀一切衆生生滅行相之中實無生滅去來種種行相于迷悟中求之實不可得況我于久遠劫來受持十二法品于此有為諸法分分受生之中我實久離久已證入中道理智之中無生無滅無去無來而無自體性也入光明神通總持辨才心心行空而十方佛土中現劫化轉化百劫千劫國土中養神通禮敬佛前咨受法言復現六道身一音中說無量法品而衆生各自分分得聞心所欲之法苦空無常無我一諦之音國土不同身心別化是妙華光明地中略開一毛頭許如法品解觀法門千三昧品說入光明等者言此菩薩解了持是十二法品名味句久離是十品苦因緣行相果故得證入是光明體性地中得身通具足游戲神通三昧得口通具足總持陀羅尼無礙辨才得意通心心行是空慧而更干十方佛剎之中現劫化轉化百劫千劫增長記持輪國土中養神通禮敬佛前增長神通輪咨受法言增長說法輪復于天道現天人道現人乃至畜生道現畜生身以一言音中說無量法品而使六道衆生各自分分得聞各心所喜之法咸使得解苦空無常無我一諦之音所謂圓音一演異類等解者此也苦空無常無我即身受心法四念處也觀受是苦者言衆生顛倒以苦為樂故令衆生觀受是苦而得寂滅真樂也觀身是空者言內身外身皆攬父母精血積聚四大而成其身從頭至足悉皆不淨衆生顛倒執之為淨故令衆生觀身是空而證常住真空也觀心無常者即六識心謂此心性流動念念生滅皆悉無常衆生顛倒計以為心故令衆生觀心無常而證常住真心也觀法無我者謂一切善法惡法衆生顛倒妄認諸法有我故令衆生觀法無我而證無生真我也一諦之音者謂苦空等四法實從此一諦音中之所演出惟此一事實餘二則非真也國土不同身心別化者言此菩薩所入國土勝劣淨穢種種不同而菩薩能現身心亦隨勝劣淨穢種種不同分形攝化別化者應以何身得度即現何身說法乃同事攝也是妙華光等者謂是此妙華光明地中無邊功德行願海藏不可言說此中但略開一毛頭許猶一毛蘸大海中一滴耳若廣說者如大部中如法品解觀法門千三昧品二文中所說第四體性爾𦦨地此地菩薩斷一種微細煩惱現行障此即所知障中俱生一分微細無明之惑現起故名之也又斷二種愚執一者等至愛愚二者法愛愚斷此愚障方登𦦨慧地謂此菩薩初入證智善修三十七品菩提分法能起𦦨慧智火燒一切根本煩惱及隨煩惱之薪便能永斷愚障既斷智火最勝故名𦦨慧地所證真如名無攝受真如謂此真如無我執等所依取故菩薩位寄兜率天王假修三乘等法化導衆生于十波羅蜜中精進波羅蜜最勝其餘非不修行但隨力隨分若佛子菩提薩埵體性地中爾真𦦨俗不斷不常即生即住即滅一世一時一有種異異現異故因緣中道非一非二非善非惡非凡非佛故佛界凡界一一是名為世諦其智道觀無一無二玄道定品所謂說佛心行初覺定因信覺思覺靜覺上覺念覺慧覺觀覺猗覺樂覺捨覺是品品方便道心心入定果爾即也𦦨明也若佛子三句標顯名德位也體性等者言此地本體性分之中本具此雙照平等慧理照了一切諸法對待故名體性爾𦦨地別經名𦦨慧地謂慧明無極則佛覺圓滿覺滿則慧光發𦦨如大火聚爍破一切情見故名𦦨慧也爾真𦦨俗等者乃明雙照之義言即真明俗其俗即真明俗即真其俗不俗其俗即真而真真相續故真不斷其俗不俗而俗俗皆𦦨故俗不常既真真不斷俗俗不常則爾真𦦨生爾真𦦨住爾真𦦨滅而皆即也既生住滅即則無邊剎海同一世十世古今同一時真俗生滅同一有也更何差別之有哉種異等者其所以有差別者無他因衆生種子有能熏所熏之異而有差別故也既熏種有異而菩薩利生不得不現異法而有真諦俗諦之名究竟因緣生滅際中道二諦處是何境界如大火聚煩惱入中愈增慧𦦨是一是二是善是惡是凡是聖無一不是慧𦦨故佛境界凡境界一一世出世法咸皆名為世諦而齊增慧𦦨也其智道等者言此三昧智火薪逢增𦦨中道觀慧一照無遺故所以無一無二無善無惡無凡無佛也玄道定品者言既智道觀中無一無二云何又有定品種種差別耶玄道即上智道定品即七覺定品此多三品共十定品言此十支定品是智道中因異而現也所謂說佛心行者言此諸品道乃是佛心佛行所謂說此異法者對諸衆生能熏所熏之異而示現斯差別十定法門究竟佛心佛行定理中實無異也初覺定因者謂佛菩薩最初悟入覺道之時覺悟自己最初覺心原來本定凡夫以迷故不定我今既悟始覺有本以為正因故名初覺定因也一信覺者信最初覺心原自本定不從人得一信永信永無退轉也二思覺者言雖所信本定若不思修終成虗信故當思惟修習也三靜覺者言雖善思修若無靜定之力所持恐成亂思故次之以靜覺也四上覺者然以定力印持于靜覺中若無精進之力恐墮無記故次之以上覺也五念覺者言既精勤不懈更當念茲在茲而不忘失故次之以念覺也六慧覺者然雖念心不妄必加慧心照境始得分明不惑故次之以慧覺也七觀覺者然雖慧照之境無惑屬粗必須更加微細觀察始能入理證真故次之以觀覺也八猗覺者由觀入理滅妄證真方得身心輕安故次之以猗覺也九樂覺者言既體相調和意地暢適必俾身心悅樂故次之以樂覺也十捨覺者以是樂體不倒悅心不亂而得正見解脫故次之以捨覺也此十覺支合言則七覺以念合思以觀合慧以猗合靜此雖品品不同皆智道觀中十方便道能令行人心心念念證入定果故也是人住定中𦦨𦦨見法行空若起念定入生心定生愛順道法化生名法樂忍住忍證忍寂滅忍故諸佛於入光光華三昧中現無量佛以手摩頂一音說法百千起發而不出定住定味樂定著定貪定一劫千劫中住定見佛蓮華坐說百法門是人供養聽法一劫住定時諸佛光中摩頂發起定品出相進相去向相故不沒不退不墮不住頂三昧法上樂忍永盡無餘自爾真至無二乃明慧𦦨雙照之義也自玄道至定果乃明定因覺品方便道有定因自有心心入定之果也自是人住至無餘乃正明定果也是人住定等者言是當位之人因修道品得住定中因定力故定中發起智慧光𦦨𦦨𦦨照徹十覺諸法行一一皆空若起念等者言若從定中才起一念之時莫令此念別緣亦只還以此定中乍起之念仍舊定入生念之心情念盡處當究其盡之所以如人常在家愁甚麼家中事不辦者此也定生等者言既念從定起還從定入起念入念咸是深定豈不于深定而生愛樂順適心耶故能于深定道法中化生名之為法樂忍也住忍者安住于忍而不動也證忍者深證此忍而不轉也寂滅忍者寂滅于忍而不起也故十方諸佛于此入智光慧光妙華三昧正定中現示無量佛身親手摩頂安慰其心一音說法啓發其志而此菩薩以甚深定力故不動不轉不起而不出定何以故以菩薩住此定而不起玩味好樂此定而不厭持守此定而不移貪愛此定而不捨故也以此住定乃至貪定之故淺者一劫深者千劫中住定于深定中見佛在蓮華上坐為諸衆生說心地道百法明門也是人等者是菩薩人于深定中興種種供養聽受妙法故淺者一劫住定深者亦千劫住定也時諸佛等者言以是菩薩深心廣遠劫久歲深感動諸佛復于智光三昧中重為摩頂二番加勸俾出定品現身益物也出相等者言此菩薩既受摩頂得大自在故現出定之相進誘之相去向他方利生之相也故不沒等者以發起故能出而不沉沒能進而不退轉能去向而不墜墮不僅如斯也至于最尊最貴頂智三昧法上樂忍亦無住著者如是定愛及于法愛二障俱離故曰永盡無餘也即入一切佛土中修行無量功德品行行皆光明入善權方便教化一切衆生能使得見佛體性常樂我淨即入等者以不住法樂之故即入一切佛剎國土之中現身利物上事諸佛下拔衆苦俱行覺道無量無邊一切功德法品也行行等者行行即品品也言品品功德一一行門皆能啓迪衆生愚癡開發人人智慧光明俾入一切善權種種巧妙方便之中展轉流布教化利益一切衆生亦能使一切衆生得悟諸佛本體性分同一悲智得真常真樂真我真淨四德法門也是人生住是地中行化法門漸漸深妙空華觀智入體性中道一切法門品滿足猶如金剛上日月道品已明斯義是人等者言是菩薩既生是地住是地中已凡所設施度生法門法法倍過于前漸化漸行愈是深妙空𦦨慧華觀諦智道咸入此體性三昧中道理中如是一切雙照法門忍定法門百法門四德法門至此悉皆滿足猶如金剛貴重堅固無比也上日月等者上即此品之上言上日月道品之中已曾詳明此地之義矣第五體性慧照地此地斷一種下乘涅槃障此即所知障中俱生一分厭生死苦趣涅槃樂依彼所起故名之也竝斷二種愚執一純作意背生死愚二純作意向涅槃愚此之三法能障五地斷此愚障方登難勝地菩薩今修菩提分法二智斷通真俗無礙能合難合無差別道便能永斷愚障既斷故名難勝地所證真如名類無差別真如謂此真如於生死及涅槃其類平等無差別故菩薩位寄化樂天王假修三乘等法化導衆生于十波羅蜜中禪波羅蜜最勝其餘非不修行但隨力隨分若佛子菩提薩埵慧照體性地法有十種力生品起一切功德行以一慧方便知善惡二業別行處力品善作惡作業智力品一切欲求願六道生生果欲力品六道性分別不同性力品一切善惡根一一不同根力品邪定正定不定是名定力品一切因果乘是因乘是果至果處乘因道是道力品五眼知一切法見一切受生故天眼力品百劫事一一知宿世力品於一切生煩惱滅一切受無明滅解脫力品是十力品智知自修因果亦知一切衆生因果分別若佛子三句標顯名德位也慧照體性地者謂此菩薩因中修習甚深禪定廣大智慧之力故今果地中乃得證入諸諦相應之慧圓照法界故云慧照體性地別經名難勝地謂由前𦦨慧爍破一切情見其異同之相皆不可得即是諸佛境界無有能勝故名難勝也法有十種力生品等者言此地菩薩證入時便具此十種力生品發起一切最上真實功德行以一念相應慧巧方便教化一切衆生也何謂十種力生品耶一知善惡等者謂此一慧方便能知一切衆生作善業不得善果反別行惡報處之故知作惡業不得惡報反別行善報處之故何也凡造塑佛像刷印經典建會齊僧此修善也或于其中不真實建立三寶假公濟私瞞因昧果天堂未就地獄先成故此修善不得善報反別行惡處報也凡除惡人惡獸破壞外道和合乃至殺一闡提此作惡也于其中間凡是實為惱害衆生乃是殺一救多除害興善正是菩薩大悲所為故此作惡不惡報反別行善處報也如是差別報行一一為衆生說故云別行處力品也二善作等者言此一慧方便能知一切衆生善作業得福報惡作業得禍報種豆不生正報因果決定不錯一一為衆生說故云業智力品也三知一切等者謂此一慧方便能知一切衆生心中所欲所求所願一切欲者言欲供養三寶欲恭敬天地君親師友欲念財色名食睡等一切求者謂求好師友求名聞利養求功名富貴乃至求好子孫眷屬等一切願者謂願生西方成佛度生願生天生人乃至願生地獄六道中生生果如是一一為衆生說故云欲力品也四知六道等者謂此一慧方便善能了知一切六道衆生本分性情分別知見或利或鈍或智或愚或巧或拙一一不同如是差別一一為衆生說故云性力品也五知一切等者謂此一慧方便能善了知一切衆生或一生所種善根惡根或多生所種善根惡根或易受教化或難受教化一一差別不同如是根界差別一一為衆生說故云根力品也六知邪定等者謂此一慧方便善能了知一切外道邪定小乘偏定菩薩正定凡夫不定一一通達為衆生說故云定力品也七一切等者言此一慧方便善能了知一切賢聖大乘正道因果由昔乘如是修行斷障因今方得乘如是慧照證真果也所謂今得至此果處者無他蓋由昔乘如是正因修如是正道力故也一一了達為衆生說是名道力品也八五眼等者五眼即天眼通非礙肉眼閡非通法眼惟觀俗慧眼只緣空佛眼如千日照異體還同是也言此五眼善能了知一切世出世間善惡果報生滅因緣差別等法竝見一切衆生臨命終時受報好醜隨善受生隨惡受生之處一一示諸衆生故云天眼力品也九知百劫等者言此一慧方便能知自己種種宿命百千萬億劫前死此生彼姓族名字苦樂壽夭富貴貧賤竝衆生種種宿命一一了知為衆生說故云宿世力品也十知於一切等者言此一慧方便善能了知于一生二生中乃至一切生中滅盡煩惱而得解脫竝一受生二受生乃至一切受生無明滅乃至老死滅而得解脫如實為衆生說故云解脫力品也是十力等者如是十力品智知自修行因果不錯不謬亦知一切衆生所行所修因果一一分別了知不錯不謬而身心口別用以淨國土為惡國土以惡國土為妙樂國土能轉善作惡轉惡作善色為非色非色為色以男為女以女為男以六道為非六道非六道為六道乃至地水火風非地水火風是人爾時以大方便力從一切衆生而見不可思議下地所不能知覺舉足下足事而身心等者言不但以一慧方便了知十力智知自他因果而已而身而心而口更有無窮差別妙用不可測也以身能現通心能繫念口能說法咸能別用不思議故故云而身心口別用也以淨國等者謂以是三輪妙用力故能以寂光淨土示為五趣雜居能以五趣雜居示為極樂國土如法華三變淨土是能轉善作惡者如無厭足王是能轉惡作善者如廣額屠兒是色為非色非色為色者如放光散華垂蓋湧蓮是以男為女者舍利弗被天女一指轉為女人相者是以女為男者龍女獻珠剎那成佛者是以六道為非六道非六道為六道者六道即凡非六道即聖如面然大士等是乃至地水火風非地水火風者下皆足一句云非地水火風為地水火風如十八神變入地如水履水如地身上出火身下出水身下出火身上出水身為水火擔負乾草入中不燒等是是人爾時等者言上種種自在神用是菩薩爾時以一慧大方便智力用所作任從一切衆生見之而皆使頓入不可思議境界也不特衆生見之不可思議即下地諸菩薩等皆不能知覺此地菩薩舉足下足之事也是人大明智漸漸進分分智光光無量無量不可說不可說法門現在前行是人等者言此菩薩神用下地不知者何蓋此菩薩大慧明智漸漸增進倍倍過前于一智分光明中有無量無量不可說不可說法門一齊現在前行二智乃至十智分分智光智光無量無量不可說不可說法門亦一齊現在前行也第六體性華光地此地斷一種粗相現行障此即所知障中俱生一分執有染淨粗相現行所起故名之也竝斷二種愚執一者現觀察行流轉愚二者相多現行愚此之三法能障六地斷此愚障方登現前地今知一切法無有染淨住無相作意令真如圓滿便能永斷愚障既斷般若現前故名現前地所證真如名無染淨真如謂此真如體性無染淨故菩薩位寄自在天王假修三乘等法化導衆生於十波羅蜜中般若波羅蜜最勝其餘非不修行但隨力隨分若佛子菩提薩埵體性華光地能於一切世界中十神通明智品以示一切衆生種種變化以天眼明智知三世國土中微塵等一切色分分成六道衆生身一一身微塵細色成大色分分知以天耳智知十方三世六道衆生苦樂音聲非非音非非聲一切法聲以天身智知一切色色非色非男非女形於一念中遍十方三世國土劫量大小國土中微塵身以天他心智知三世衆生心中所行十方六道中一切衆生心心所念苦樂善惡等事以天人智知十方三世國土中一切衆生宿世苦樂受命一一知命續百劫若佛子三句標顯名德位也體性華光地者謂此菩薩入此地中大智行華一時開敷光照一切故故名華光地別經名現前地謂由前異同之相既不可得則真如淨性明顯現前故名現前地也能于一切世界等者謂此菩薩住是地中能于十方一切世界之中運用十種神通光明智品以教化示導一切衆生現種種殊勝變化不可思議境界也何謂十種明智品耶一以天眼明智等者即天眼通也言此菩薩得此通故能知過去未來現在三世國土中微塵等一切細色大分段身小分段身皆微塵成人身天身乃至畜生大小分段身皆微塵成各各一一衆生身皆知是機微塵細色成一形體大色如是大分小分色相一一了知而不錯故二以天耳智等者即天耳通也謂得此通故即能聞知十方三世六道衆生或受逼惱而生苦音聲或受安逸而生樂音聲明知苦樂音聲非苦樂音聲非非苦樂音聲乃至世出世一切法聲亦非非聲一一知故三以天身智等者即色身通也謂得此通故即能知一切依報六塵世界外色及正報六根身形內色咸非是色是名為色非是男女形是名男女形而此菩薩于一念中咸皆周遍十方國土三世劫量若大若小竝國土中極微塵細衆生身于一念中一一身咸遍知故四以天他心智等者即他心通也謂得此通故能知過現未三世一切衆生心中所行竝十方天人乃至畜生六道中一切衆生心心所念苦樂果善惡因等事一一知故五以天人智等者即宿命通也謂得此通故即能了知十方三世國土之中一切衆生從一世二世乃至百千萬世宿生苦受樂受等命一一了知及其受命長短相續百劫等事一一了知故以示一切衆生也上五智知世諦緣起無有染相可得下五智知真諦解脫亦無淨相可得也以天解脫智知十方三世衆生解脫斷除一切煩惱若多若少從一地乃至十地滅滅皆盡以天定心智知十方三世國土中衆生心定不定非定非不定起定方法有所攝受三昧百三昧以天覺智知一切衆生已成佛未成佛乃至六道一切人心心亦知十方佛心中所說之法以天念智知百劫千劫大小劫中一切衆生受命命久近以天願智知一切衆生賢聖十地三十心中一一行願若求苦樂若法非法一切求十願百千大願品具足六以天解脫等者即滅盡通也此下衆生字俱指賢聖與上不同謂此菩薩得此通故即能了知十方三世賢聖衆生解脫道隨力隨分斷除一切煩惱愚障若多分若少分從一地少分斷除次第乃至十地多分斷除究竟滅滅皆盡無餘如是種種解脫一一了知故七以天定心智等者即神境通也謂得此通故即能了知十方三世國土內賢聖衆生心中或心入正定不動不搖如是而定或于定中思惟取證供佛聽法如是不定或于定中示現行住坐臥示行一切行事如是而非定或于不定中一切事上一切時間隨意而定如是非不定及諸起定隨方說法利益衆生所有攝受種種三昧乃至百八三昧一切正受禪定一一知故入以天覺智者即言音通也言得此通故即能了知一切賢聖業已斷障證真示現八相蚤成佛道及未成佛道者竝知六道人心心所念所行十方佛心中所念所說教化利生之法一一知故九以天念智者即未來通也言得此通故即能了知百劫千劫大小劫中一切賢聖衆生受佛慧命教化衆生利益一切如是慧命或近則一劫住二劫住或久則十劫住乃至百千萬億劫住世一一知故十以天願智者即無作通也謂得此通故即能了知一切大心衆生賢聖十地行願及三十心中一一所修行門一一所發大願若求苦則示燒身臂指供養諸佛如藥王焚身不輕遭擲阿難願云五濁惡世誓先入等是求樂則如韋提希願生樂土法藏比丘誓願衆生咸生安養等是求法則示說三藏十二部經別傳佛旨求非法則示四韋䭾外道邪論竝此方四書五經道德南華百家異學等言大乘人正法學力之餘學以折伏闡提世智辨聰等俱名非法一切求總結上求下化無所不求十願即普賢十大行願十無盡藏句是百千大願即諸菩薩無邊弘誓願是如是行願品此地菩薩一一圓滿具足一一而知故是人住地中十神通明中現無量身心口別用說地功德百千萬劫不可窮盡而爾所釋迦略開神通明品如觀十二因緣品中說是人住地等者言是菩薩住此華光地中已于十種神通明智中能示現無量神通身輪無量記持心輪無量說法口輪分形別用說是地種種功德行願百千萬劫說之不可窮不可盡而爾所釋迦如來但大槩開發此十神通明智耳在大部內有觀十二因緣品如彼品說無二無別第七體性滿足地此地菩薩斷一種細相現行障此即所知障中俱生一分執有生滅細相現行所起故名之也竝斷二種愚執一者細相現行愚二者純作意求無相愚由有此之三法能障遠行地斷此愚障方登第七地今遠三界近法王位行過二乘善修無相到無相邊功用至極望前過遠故名遠行地便能永斷愚障既斷所證真如名法無差別真如謂此真如能了種種教法皆同真如而無相故菩薩位寄初禪天王假修三乘等法化導衆生於十波羅蜜中願波羅蜜最勝餘非不修但隨力隨分若佛子菩提薩埵滿足體性地入是法中十八聖人智品下地所不共所謂身無漏過口無語罪念無失念離八法一切法中捨常在三昧是入地六品具足復從是智生六足智三界結習畢竟不受故欲具足一切功德一切法門所求滿故進心足一切法事一切劫事一切衆生事以一心中一時知故念心足是二諦相六道衆生一切法故智慧足知十法趣人乃至一切佛無結無習故解脫足見一切衆生知他人自我弟子無漏無諸煩惱習故以智知他身六通足是人入六滿足明智中便起智身隨六道衆生心行口辨說無量法門品示一切衆生故隨一切衆生心行常入三昧而十方大地動虗空化華故能令衆生心行以大明智具足見過去一切劫中佛出世亦是示一切衆生心以無著智見現在十方一切國土中一切佛一切衆生心心所行以神通道智見未來中一切劫一切佛出世一切衆生從是佛受道聽法故若佛子三句標顯名德位也滿足體性地者謂此菩薩因中廣修方便度故果感證此如來一切智行悉皆圓滿具足故名滿足別經名遠行地謂真如之境廣無邊際雖真如現前分證則局若盡其際方為極到故名遠行地也入是法中等者謂入體性法中已得十八聖人智品不與二乘權小所共不惟權小所不共即下地菩薩亦所不共也何名十八聖人智品耶一所謂身無漏過者即身無失也謂此菩薩從無始來常以不殺不盜不淫而修其身一切煩惱淨盡無餘以是身業清淨得大神通故云身無漏過也二口無語罪者即口無失也謂此菩薩從無量劫來常以如來五語隨諸衆生方便說法令得道果是以口業清淨故云口無語罪也三念無失念者即意無失也謂此菩薩從無始來常修戒定慧滅除貪嗔癡自利利他安禪制毒乃得意根清淨故云念無失念也四離八法者即無異想心也八法多種有通教別教圓教等八法總不出教理智斷行位因果言皆有異想而此地永離不與下地共故云離八法也五一切法中捨者即無不知捨心也謂此菩薩從無始來以大般若空慧照察世出世間一切染淨諸法當體全空了無貪念故云一切法中捨也六常在三昧者即無不定心也謂此菩薩從無始來恆不離甚深大定至于隨機設化隱顯利生亦不離此定故云常在三昧也是入地等者言此菩薩具足是六品已又復從是六智相續出生六足智也何名六足智耶一三界結等者即欲無減也謂此菩薩久遠劫來常修空無作無願三解脫入三界同事教化衆生令離諸有結使習氣發菩提心悟無生忍豈有菩薩更受三界結習之理哉以畢竟不受故而得正解脫滿足故云欲具足也二一切功等者即精進無減也言此菩薩于一切賢聖利生功德一切賢聖利生法門凡所精進樂求無不充滿具足故云進心足也三一切法等者即念無減也謂此菩薩恆念一切諸佛聖賢建立一切法事念一切劫量長短大小延促等事念一切衆生因緣生滅拔苦與樂等事以恆念故一心中不勞億度一時而知故云念心足也四是二諦相等者即智慧無減也謂此菩薩能了達真俗二諦有無二相是破除六道衆生一切愚癡般若空法以般若空照真俗有無無二故故云智慧足也五知十發趣等者即解脫無減也謂此菩薩能知十發趣長養金剛賢人十地聖人等妙諸佛出定揚德起智利生示諸衆生同事結習而實無結無習故故云解脫足也六見一切等者即解脫知見無減也謂此菩薩具足天眼天耳他心漏盡神境如意之六通故所以徹見一切賢聖大道衆生竝能了知一切他人自我所化弟子咸得斷除邪見證無漏智遠離百八煩惱微細習氣故也自我則是而所以能了知他人身心中事者何以六通智知他身耳故云六通足也是人等者言是菩薩人入是六滿足大明智慧中已復更具足六種智用何為六智耶一便起智身等者即身業隨智慧行也謂此菩薩便運起六足智能以清淨神通身業現神變相調伏衆生種種心行令發菩提心行菩薩行故名隨一切衆生心行也二口辨說等者即口業隨智慧行也謂此菩薩能以清淨微妙口業樂說辨才說無量法門品隨順開導一切衆生心行令發大心行菩薩行故云隨一切衆生心行也三常入三昧者即意業隨智慧行也謂此菩薩能以清淨瑩明意業常入正受三昧以三昧力故十方世界地搖六震虗空之內天雨四華以是威神力故能使一切衆生發增上勝進心行諸佛行故云能令衆生心行也四以大明等者即過去無礙智也謂此菩薩以大明智具足之故能見過去盡過去際一切劫中諸佛下生成道出世利生亦是開導一切衆生心令入佛智道故故云示一切衆生心也五以無著智等者即現在無礙智也謂此菩薩以無著智滿足故能見現在盡現在際十方一切國土中一切諸佛下生成道出世利生化導一切衆生心心相續行佛智道故故云一切衆生心心所行也六以神通等者即未來無礙智也謂此菩薩以神通道智滿足故能見未來即未來際一切劫中一切佛下生成道出世利生能使一切賢聖衆生從是佛受道聽法展轉化度一切衆生繼佛智道故故云從是佛受道聽法故也住是十八聖人中心心三昧觀三界微塵等色是我故身一切衆生是我父母而今入是地中一切功德一切神光一切佛所行法乃至八地九地中一切法門品我皆已入故於一切佛國土中示現作佛成道轉法輪示入滅度轉化他方過去來今一切國土中住是十八等者謂此菩薩住是十八不共聖人智品中常心心不離正受三昧以三昧智觀觀三界中微塵等細色無針鋒許不是我之故身以三昧智觀復觀三界內一切大小衆生無一不是我已往生生受生父母而今得入是滿足地中已一切諸佛功德一切諸佛神用智光一切諸佛所行巧妙方便法乃至八地九地中一切大明空法門至百千解脫法門八十種好三十二相自在法門因入是地故此等法門我皆已得一齊而入故也于一切國等者言既一切得入故能于十方一切佛國土中示現受生出家苦行成道作佛大轉法輪廣度衆生于此應緣一朝事畢乃復示現入于滅度又轉教化他方亦示過去未來現在一切國土中一般種種示現不可思議事也第八體性佛吼地此地菩薩斷一種加行障此即所知障中俱生一分令無相觀不任運起故名之也竝斷二種愚執一者無相作功用愚二者於相不自在愚此之三法能障八地斷此愚障方登不動地謂此菩薩今入無功用道得無分別智照任運相續報行純熟居無相觀不為諸法煩惱所動便能永斷愚障既斷故名不動地所證真如名不增不減真如謂此真如住無相觀不隨染淨所增減故菩薩位寄二禪天王作小千世界主以一乘法化導衆生於十波羅蜜中力波羅蜜最深餘非不修但隨力隨分若佛子菩提薩埵佛吼體性地入法王位三昧其智如佛佛吼三昧故十品大明空門常現在前華光音入心三昧其空慧者謂內空慧門外空慧門有為空慧門無為空慧門性空慧門無始空慧門第一義空慧門空空慧門空空復空慧門空空復空空慧門如是十空門下地各所不知虗空平等地不可說不可說神通道智以一念智知一切法分分別異而入無量佛國土中一一佛前咨受法轉法度與一切衆生而以法藥施一切衆生為大法師為大導師破壞四魔法身具足化化入佛界若佛子三句標顯名德位也佛吼體性地者謂此菩薩說法無畏如大師吼等無差別故名佛吼地別經名不動地謂真如之理既盡其際全得其體則真常凝靜無能動搖故云不動地也入法王位三昧等者謂此菩薩證入無上自覺聖智法王大樂三昧正受寶位于諸法中如法自在若出若沒心常在定故云入法王位三昧也其智如佛等者言其智慧方便無量攝法廣度有情與佛無二無別何以致然蓋由此菩薩得佛吼三昧之故而致然也十品大明等者謂此菩薩因得佛吼三昧故而十品大明空慧法門無一缺缺常現在前以利衆生而行華智光法音倍勝過前咸入深心三昧正受之中所以能師子吼也其空慧者言云何為十品大明空慧常現在前耶一謂內空慧門者謂此菩薩常以般若智照內自身心四大非有五蘊本空如幻如夢故得此內空慧門常現在前也二外空慧門者謂此菩薩常以智照外一切青青翠竹無非般若黃花盡是真如無得無失故得證此外空慧門常現在前也三有為空慧門者謂此菩薩常以智照一切世諦有為諸法虗假不實都無自性故得證此有為空慧門常現在前也四無為空慧門者謂此菩薩常以智照一切真諦無為諸法體性非空如實相故故得證此無為空慧門常現在前也五性空慧門者謂此菩薩常以智照有為無為二性皆空一切無礙平等平等故得證此性空慧門常現在前也六無始空慧門者謂此菩薩常以智照無始無明住地煩惱本無有根無起無滅故得證無始空慧門常現在前也七第一義空慧門者謂此菩薩常以智照真俗二諦悉同真性無相可得不居二邊不存中道故得證第一義空慧門常現在前也八空空慧門者謂此菩薩常以智照能空第一義空之空及所空之空此二空理亦復不存故得證空空慧門常現在前也九空空復空慧門者謂此菩薩常以智照空能空所之空空亦復皆空故得證空空復空慧門常現在前也十空空復空空慧門者謂此菩薩恆以智照空能所空空之空既空則空無所空言此空無所空之空空亦復空空故得證空空復空空慧門常現在前也如是等者言如是十品空慧門惟此八地所證下地諸菩薩等皆各所不知也虗空平等者言下地各所不知者何蓋此菩薩得證虗空平等地理智中不但十空而已更有不可說不可說威神變通道理智慧而下地諸菩薩猶不能知也以一念等者言以不可說神通道智故而能以一念相應智慧知一切最勝法分分差別殊異觀機逗教而入無量諸佛國土之中承事諸佛一一佛前咨請秉受聽其法要展轉化度無令斷絶而乃傳法度與一切賢聖大心衆生作大醫王而以法藥惠施一切凡夫衆生療去心病為大法師訓誨衆生遠離煩惱為大導師誘引衆生永超苦趣破壞四魔皈依三寶法身具足無缺無餘揚化分身化化不絶咸俾衆生入佛界地也是諸佛數是諸九地十地數中長養法身百千陀羅尼門百千三昧門百千金剛門百千神通門百千解脫門如是百千虗空平等門中而大自在一念一時行劫說非劫非劫說劫非道說道道說非道非六道衆生說六道衆生六道衆生說非六道衆生非佛說佛佛說非佛而入出諸佛體性三昧中反照順照逆照前照後照因照果照空照有照第一中道義諦照是智惟八地所證下地所不及不動不到不出不入不生不滅是諸佛數等者謂此地菩薩既在在示現度生已即是諸佛之數了矣即是諸九地十地上聖數中人但只隨方應化滋養慧命充足法身而已其百千總持陀羅尼門百千正定三昧門百千不壞金剛門百千變化神通門百千方便解脫門如是百千種種法門于虗空平等門中而得大自在于一念中于一時中無少暫憩皆能行故也劫說非劫非劫說劫者梵語劫波此云時分言劫有長短大小時分不同諸天拂石劫地獄芥城劫人間轆轤劫菩薩修行經三阿僧祇斷盡無明之時方得成佛是名為劫如是等劫本非實有名為非劫故云劫說非劫非劫說劫也非道說道等者言此菩薩能照了世間有為邪見非道等法本空無體直下悟見菩提道法故名非道說道又能照了出世間無為聖諦正道等法雖曰正道因邪立正正亦同邪邪正俱非故云道說非道也非六道衆生說六道衆生者聖人即是覺悟凡夫六道衆生說非六道衆生者凡夫即是不覺悟聖人也非佛說佛者魔不異佛佛說非佛者佛亦是魔也政所謂說是說非人不識逆行順行天莫測也而入出等者言此菩薩既墮佛數橫說竪說逆行順行而能入定出定于諸佛體性三昧正受之中得大自在具足十種慧照也何謂為十一反照者謂反照自己分段變易四大五蘊無一是實無一非實無一是虗無一非虗誰為利生誰為利生者二順照者謂隨順衆生之性易可化度不生疲勞慈悲攝受也三逆照者謂違逆衆生之性難調能調善巧方便威神折伏也四前照者盡過去世從凡夫發心以至入此地而照也五後照者從此地以至成佛利生盡未來世而照也六因照者照自他無始不覺之苦因并始覺清淨之樂因也七果照者照自他生死業繫之苦果竝本覺究竟之樂果也八空照者謂空照照真離一切相也九有照者有照照俗即一切法也十第一中道義諦照者謂照真非真照俗非俗二邊不住中道不存離即俱非故云第一中道義諦照也是智等者言如是十種智照惟是八地所證下地菩薩各所不及也何以故謂此菩薩所證真如不動不到以離動到相故不出不入以離出入相故不生不滅以離生滅相故于此智定照與照者同時寂滅故也是地法門品無量無量不可說不可說今以略開地中百千分一毛頭許事羅漢品中已明是地法門者謂此菩薩所證一切法門無量無量不可說不可說之品無有限量非言說之所及者今以略開地中功德百千萬億等分之中如大海中一滴毛頭許事而已如大部內羅漢品中已明斯義第九體性華嚴地此地菩薩斷一種不欲行障此即所知障中俱生法執一分利樂有情事中不欲勤行所起故名之也竝斷二種愚執一者陀羅尼愚二者辨才自在愚此之三法能障九地斷此愚障方登善慧地謂此菩薩今得十種無礙智用現前于諸智中最為殊勝由此智用無礙便能永斷愚障既斷能轉清淨大法之輪是以善用其慧故名善慧地所證真如名智自在真如謂此真如智用自在以四無礙智所依止故菩薩寄位三禪天王作中千世界主以一乘法化導衆生於十波羅蜜中方便波羅蜜最勝餘非不修但隨力隨分若佛子菩提薩埵佛華嚴體性地以佛威儀如來三昧自在王王定出入無時於十方三千世界百億日月百億四天下一時成佛轉法輪乃至滅度一切佛事以一心中一時示現一切衆生一切色身八十種好三十二相自在樂虗空同無量大悲光明相好莊嚴非天非人非六道一切法外而常行六道現無量身無量口無量意說無量法門而能轉魔界入佛界佛界入魔界復轉一切見入佛見佛見入一切見佛性入衆生性衆生性入佛性其地光光光照慧慧照明𦦨明𦦨無畏無量十力十八不共法解脫涅槃無為一道清淨若佛子三句標顯名德位也佛華嚴體性地者謂此菩薩所證境界莊嚴與佛等無差別華即行華嚴即佛果即修萬行因華莊嚴佛果故別經名善慧地謂既得真如之體即發妙用凡所照了悉是真如故名善慧地也以佛威儀等者以用也謂此菩薩能用佛之威儀于動靜間也言有威可畏降伏衆魔制諸外道應折伏者而折伏之有儀可觀開化人天導引羣品應攝受者而攝受之也如來等者如即本覺來即始覺本始不二故名如來又來無所從去無所至無來無去故名如來三昧自在王即百八三昧中三昧王安立三昧于諸三昧能自在安住故謂此菩薩若動靜若去來若坐臥皆以佛威儀入而靜則以三昧王自在安住諸三昧中出而動則以三昧王定隨心出入自在無礙或暫或久無有定時也于十方等者言此菩薩得此自在王定與佛無殊任憑十方法界中以法報化身隨心自在于一切大千世界百億日月百億四天下之中不資餘力一時示現下生出家降魔成道轉大法輪乃至入于涅槃一切佛事皆以一念心中一時示現一切衆生之前現一切色身金相皆具八十種好三十二相其所示現自在受用大樂無比廣大同法界究竟如虗空無以異也而此種種無量大悲種種光明種種相好種種莊嚴示天同天而非天示人同人而非人示六道同六道而非六道迥出一切法外而不捨一切法常行六道之中現無量神通身輪無量辨才口輪無量智慧意輪說無量善巧權實法門也而能轉魔界入佛界者魔王謂世尊曰瞿曇我待一切衆生成佛盡衆生界盡無有衆生名字我乃發菩提心是也佛界入魔界者調達謂阿難曰佛既無入地獄分我豈有出地獄分是也復能轉一切見入佛見者見見之時見非是見也佛見入一切見者見猶離見見不能及也佛性入衆生性者恆順衆生隨流得妙也衆生性入佛性者轉凡成聖點鐵成金也總言此菩薩以佛威儀自在王定顯大神用廣作佛事有如此者自于十方等至此俱發明自在王義其地光者即華嚴地本有具足光明也光光照者即能鑑照之智光並所鑑照之智光光光相照也慧慧照者亦即能明照之空慧竝所明照之空慧慧慧相照也明𦦨明𦦨者上明𦦨即智光之明𦦨下明𦦨乃空慧之明𦦨也言此智光明𦦨與空慧明𦦨𦦨𦦨相續為無盡燈也無畏者即佛四無畏一一切智無所畏二漏盡無所畏三說障道無所畏四盡苦道無所畏也又十無畏備法數中無量者即四無量心也十力十八不共俱解見前解脫即前地俱生我執現行永伏之解脫也涅槃即無餘涅槃也言此地光明不特𦦨𦦨無盡而佛無畏乃至佛涅槃咸皆無為一道清淨也經云智光照無量方便無窮極此之謂也而以一切衆生作父母兄弟為其說法盡一切劫得道果又現一切國土身為一切衆生相視如父如母天魔外道相視如父如母而以一切等者言此菩薩證此地光得佛無畏及佛涅槃悉清淨已而復興慈示卑劣行以十方四生六道一切衆生作父母想而孝順之作兄弟想而敬愛之種種方便為其說法不生疲厭盡一切劫之久必使俱得佛道證佛佛果而後已又現尊勝行于一切國土中示一切身為一切衆生令其相視若父若母天魔外道亦相視如父如母俱作一子想而優愛之亦令其得道得果而後已矣住是地中從生死際起至金剛際以一念心中現如是事而能轉入無量衆生界如是無量略說如海一滴住是地中等者言菩薩住是華嚴地中從凡夫不覺初發心始覺生死輪際起直至究竟覺金剛輪際止于其中間所修所行所斷所證一切差別法門以一念心中即能顯現如是等事而復能轉入無量無邊衆生界中令其解脫生死究竟道果也如是無量佛法門究竟說不能盡此但略說如海一滴毛頭許事耳第十體性入佛界地此地菩薩斷一種未得自在障此即所知障中俱生法執一分法味自在所起能障大法智雲及所起事業不現在前故名之也竝斷二種愚執一者現大神通愚二者微細祕密愚此之三法能障十地斷此愚障方登法雲地菩薩法身圓滿性智清淨空有兩忘極證中道之理便能斷盡愚障既斷故智慧雲彌滿法界雨大法雨充足一切枯槁衆生故名法雲地所證真如名業自在真如一切業惑悉得解脫與真如理而相應故菩薩寄位四禪天王作大千世界主演一乘法而化衆生於十波羅蜜中智波羅蜜最勝餘諸波羅蜜一切功德至此俱得圓滿具足若佛子菩提薩埵入佛界體性地其大慧空空復空空復空如虗空性平等智有如來性十功德品具足空同一相體性無為神虗體一法同法性故名如來應順四諦二諦盡生死輪際法養法身無二是名應供遍覆一切世界中一切事正智聖解脫智知一切法有無一切衆生根故是正遍知明明修行佛果時足故是明行足善逝三世佛法法同先佛法佛去時善善來時善善是名善善是人行是上德入世間中教化衆生使衆生解脫一切結縛故名世間解脫是人一切法上入佛威神形儀如佛大士行處為世間解脫調順一切衆生名為丈夫於天人中教化一切衆生咨受法言故是天人師妙本無二佛性玄覺常常大滿一切衆生禮拜故尊敬故是佛世尊一切世人咨受奉教故是佛地是地中一切聖人之所入處故名佛界地若佛子三句標顯名德位也入佛界體性地者謂此菩薩所證一切理智行願諸功德藏即與十方諸佛所證境界等無差別故名入佛界地別經名法雲地謂菩薩至此十地修行功滿唯務化利衆生大慈如雲普能陰覆故名法雲地也其大慧空空復空者言此佛界即上空空復空空之大慧空也此大慧空至此極之又極空亦復空無空可空也空復空如虗空性者言此大慧空之空復空不同頑虗空無所有斷滅之空乃如虗空性圓融周遍巨細不遺無缺無剩之空性也此即大圓鏡智理聚圓極法身境界平等智有如來性者言此佛界元來平等本具茲智故此平等智中已具備有如來體性了也此即平等性智智聚圓明報身境界十功德品具足者言菩薩證入此地即得十功德號圓滿具足也此即成所作智功德聚圓成化身境界言三身圓顯十號齊彰方得名入佛境界也云何十功德品耶一空同一相者言此大慧空中雖有十號異名其實本無形狀號號皆空同一空相也體性無為者言既號號同空本無異相則此體性無起無止無所作為也神虗體一等者言既法身體性本自無為而報化神機虗靈周遍三身一體運用無分不妨在在示現法即法性法性即法也以如是之故綿通三世而無向背周遍十方而無來往故名如來也二應順四諦等者四諦即無作四諦無生四諦無量四諦二諦即真俗二諦也盡生死即盡無始生死輪際即究竟金剛輪際法即上諸諦法也言入此地菩薩應供非同人天二乘應分段食供此乃應廣化衆生運用四諦法二諦法從初自無始生死終至金剛輪際以如是法隨順滋養法身不一不異利益人天之供故名應供也三遍覆等者言此地菩薩能周遍普覆一切世界之中一切世出世間等事盡能遍知者何蓋具此正智也正智者何聖解脫智也即以正智遍知一切法有有解脫一切法無無亦解脫竝以正智遍知一切凡聖衆生鈍利諸根法法皆空無不解脫故名正遍知也四明明等者明明即慧足修行即福足也言此菩薩自發大心來明明修慧修行植福入此地已始得佛果福慧二嚴一時充滿具足故是名明行足也五善逝者謂此菩薩善能往返三界示現受生出家修行成道說法化度衆生入于涅槃此乃三世諸佛道法佛佛道同古佛儀式法同先佛法也佛去時善善緣畢而去示入涅槃去無所至來時善善應緣而來示生成道來無所從去來吉祥是名善善也六是人行是等者謂是地人能行是佛上上功德以是現身入世間中廣設教化利益衆生俾諸衆生咸得解脫世間一切結使纏縛令入佛道故是名世間解脫也七是人一切等者謂是聖人能于一切法上顯法性理入佛威神現法性身形儀如佛是以大士所行之處覩容意銷在在處處咸得為世間解脫無有過于上者故名無上士也八調順等者調有調理調和調順三義調理身不殺盜淫而體自清淨調和口無諍論常持五語調順意無貪瞋癡而生定慧等也謂此菩薩能如是調順一切法界衆生之身口意遠離十惡令得道果故名為調御丈夫也御如御馬亦順性而調之之義九於天人等者謂此菩薩能于天上人間中在在示現教化導利一切衆生令其咨問聽受佛法言詞深入心通獲大利益故是名天人師也十妙本無二等者妙即妙用本即本體言此菩薩佛性本體玄覺妙用至此果證覺圓于體于用無一無二無為無相大滿常住常常充滿無缺無餘乃名曰佛為一切世出世間賢聖衆生頂禮瞻拜故尊重恭敬故是乃名曰佛世尊也上明十功德品下正明入佛界地一切世人等者言此菩薩十功德具足充滿為一切世出世賢聖人等之所咨秉法言聽受于心奉其教命而為依止故是名佛地也是地中等者言是佛地中境界匪下地境界乃是一切地地聖人之所證入處諸佛境界故名曰入佛界地也爾時坐寶蓮華上一切與授記歡喜法身手摩其頭爾時坐等者爾時即入佛界際當成果之時言此菩薩當爾之時既得究竟圓滿即當坐此寶蓮華之上證入妙覺果海也十方一切諸佛即與此法雲地菩薩授記成佛劫國莊嚴得佛大樂自在歡喜等事同以清淨法身光明網相光手而摩其頭勸轉法輪也此三結讚法門也又有二初本土主伴讚二他方主伴讚同見同學菩薩異口同音讚歎無二同見同一見解即同見真如法身實相理者同學同一師學即同學菩薩道同授灌頂職者言是時同見同學諸菩薩皆悉歡喜異口同音稱揚讚歎其伴咸同無二無別也此本土伴讚也又有百千億世界中一切佛一切菩薩一時雲集請轉不可說法輪虗空藏化導法門又有百千等者言不特諸佛摩頂菩薩讚歎已也更又有百千萬億佛剎之中一切諸佛一切諸菩薩俱皆一時雲集請法雲地菩薩轉不可說不可說廣大法輪竝及虗空藏無窮無盡化導法門令其永遠流布此道使天上人間化化不絶也此他方主伴讚請轉法輪也是地有不可說奇妙法門品奇妙三明三昧門陀羅尼門非下地凡夫心識所知唯佛佛無量身口心意可盡其源如光音天品中說十無畏與佛道同是地有等者言是地菩薩巧說諸法為除如來餘無及者故所以有不可說奇妙廣大法門品奇妙三明智慧法門奇妙三昧正定法門奇妙總持陀羅尼法門非下地菩薩及發心凡夫心識所能知之唯佛與佛無量神通身無量辨才口無量智慧意可盡識其底蘊源頭而知之也此處所說如大部內光音天品之中說十無畏法門正與此入佛界地之道相同了無差別也此讚勝功德也
