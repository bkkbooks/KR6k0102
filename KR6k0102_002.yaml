body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯蜀渝華巖季而關聖可德玉順硃慈雲寺價南慧仙謄録菩薩心地品之下爾時盧舍那佛為此大衆略開百千恆河沙不可説法門中心地如毛頭許爾時者是説十地已竟時也盧舍那者即能説之報佛華言淨滿淨者五住究盡二死永亡以諸患淨盡故即法身也滿者三覺果滿萬行因圓以福慧具足故即報身也二義合言故曰淨滿又云種種光明遍照光明即報身義遍照即法身義又法身毗盧遮那華言遍一切處遍一切亦遍照之義故知法即報報即法法報不分理智冥一二義合言可無疑也為此大衆者即華藏聚會凡聖交參之大衆也略開者顯此心地法門甚深廣大無盡義也百千恆河等者舉喻顯法正明略開之義言前所説三十心十地于百千恆河沙不可説法門中但大略言之耳譬如一毛頭許之微些些子也此二明心地戒三初結顯法門二付授勸轉三授已轉化是過去一切佛已説未來佛當説現在佛今説三世菩薩已學當學今學是過去等引果人同證同説以勸信也三世等者引因人同修同學以勸受也言上所説心地雖如毛頭許之微其功德極大三世諸佛所證證此所説説此三世菩薩所修修此所學學此也我已百劫修行是心地號吾為盧舍那我已等者上句舉因明果下句舉果明因也言既三世諸佛菩薩所證所説所修所學而不異不虗者乃即我今已百劫所修所學所證所説豈復虗乎可見證果本非他因惟在此心地耳此上三段結顯法門也汝諸佛子轉我所説與一切衆生開心地道汝諸佛子者是舍那慈尊告勉千佛轉法化生也轉我等者言轉我所説我已百劫修行心地如是因深號吾為盧舍那如是果極之道我今授汝汝當轉説與一切癡迷衆生令其開悟心地豁通本有光明金剛寶戒之道也時蓮華臺藏世界赫赫天光師子座上盧舍那佛放光光告千華上佛持我心地法門品而去復轉為千百億釋迦及一切衆生時蓮華下舉依報也赫赫天光下舉正報也舍那放光顯能告之勝光告等者顯所告之勝也持我等者正明所告之詞師子座者師子乃獸中王哮吼一聲百獸腦裂表法王坐此座無所怖畏天魔外道見聞喪膽故也盧舍那佛放光光等者言光是佛放告是光告也謂不但正報身善能説法即依報蓮華光明亦能説法告千華上佛也持我心地等者謂盧舍那既告千佛又欲千佛轉相授受故千佛持我心地法門而去復轉相授受千百億釋迦佛千百億釋迦佛付授勸轉而與一切衆生開心地道也次第説我上心地法門品汝等受持讀誦一心而行次第等者是盧舍那佛光告千佛轉告千百億佛叮嚀分囑若轉説是心地法門時不可倒説逆説當從十住十行十向十地次第而説也汝等亦當次第領受守持閲讀背誦專一其心精進力行感化衆生上行下效也此付授勸轉也爾時千華上佛千百億釋迦從蓮華藏世界赫赫師子座起各各辭退舉身放不可思議光光光皆化無量佛一時以無量青黃赤白花供養盧舍那佛受持上所説心地法門品竟爾時者即舍那勸授轉化時也千華等者舍那付授已畢其時當機千佛千百億佛領旨各各辭旋本迹世界説法利生應緣去也舉身等者表顯心地戒光出生無量無邊智慧之佛凡此本佛迹佛迹迹之佛皆從心地戒光中流出此光非可心思言議也光光等者上光即千佛光下光即千百億佛光光光無量不可思議故所化之佛亦無量不可思議也一時等者言千佛億佛無量佛俱同一時以微妙因華從心地中信手拈出青表十住黃表十行赤表十向白表十地還以供養心地所現舍那果佛得法謝法知恩報恩也受持等者此結束三十心十地之文以起後意故云受持心地法門品竟此三受已轉化二初受已謝師二各旋本界此受已謝師也各各從此蓮華藏世界而沒沒已入體性虗空華光三昧還本源世界閻浮提菩提樹下各各等者言千佛億佛無量佛各各從此舍那本佛依報莊嚴蓮華藏世界而隱初隱為沒終隱為之沒已入體性等者正明所隱迹處言有沒處必有入處謂沒已時即入本體法性虗空華光三昧正定之中也還本源世界者千佛億佛皆各從本土放光示衆皆各接生疑之衆俱往本師舍師佛所聽心地戒法令受戒竟故又各還應迹所依本源世界見所隱所顯不離當處故云還本源世界也閻浮提者即娑婆世界中南贍部洲也菩提華言覺道亦名道樹謂凡佛出世皆依此樹成無上道故也此二各旋本界二初入定歸本二出定説法此入定歸本也從體性虗空華光三昧出出已從體等者言既從三昧入必從三昧出有隱有顯也初顯名出顯畢乃名出已也二出定説法二初明橫説法二明竪説法此明橫説法又有二初出定相示二正説法門此初出定相示也方坐金剛千光王座及妙光堂説十世界法門海復從座起至帝釋宮説十住復從座起至𦦨天中説十行復從座起至第四天中説十回向復從座起至化樂天説十禪定復從座起至他化天説十地復至一禪中説十金剛復至二禪中説十忍復至三禪中説十願方坐等者方正也金剛利而堅千光明而廣王乃尊貴之意言佛既于菩提樹下出定已當坐何等樣座而次第説法耶當坐金剛最堅最利千光最明最廣王者最尊最貴之座而説法也華嚴初會菩提場普賢菩薩説華藏世界品如來依正法門即此及妙光堂者堂即普光明殿也華嚴二會普光殿文殊菩薩説十信法門即此下文十住處所説以總在人間為一住處也説十世界法門海者即華藏莊嚴十世界海也法門即十信法門也海言百河千江無所不容百寶千珍無所不出百千法門無一不從信源功德海中流出言十信法門海充遍法界與十華藏莊嚴世界海等也復從座起等者此第二處説十住也帝釋宮即忉利天王所住之內庭也梵語釋提桓因此云能天主梵語忉利此云三十三此天居須彌頂由單修上品十善得生其中主三十三天帝釋二字華梵合言也世尊次于此宮説十住者為令已入十信菩薩得入十住法門也至𦦨天中等者此第三處説十行也𦦨天即𦦨摩天華言時分此天依空而住以蓮華開合而分晝夜故由修上品十善兼坐未到定禪得生其中世尊次于此處説十行者為令已入十住菩薩得入十行之法門也至第四天等者此第四處説十回向也四天即兜率陀天華言知足于五欲知止足故此天亦依空居所修同前世尊于此説十回向者為令已入十行菩薩得入十回向之法門也至化樂天等者此第五處説十禪定也化樂者自化五欲而娛樂也亦依空居所修同前世尊次于此處説十禪定者為令已入十回向菩薩得入十禪定之法門也至他化自在等者此第六處説十地也他化天有二種一者正修十善兼坐未到定禪假此所成自然受樂二者偏修十善假他所化以成己樂即魔王天此二天王皆依空居也世尊次于此處説十地者為令已入十禪菩薩得入十地之法門也復至一禪者此第七處説十金剛也初禪天即離生喜樂地此天已離下界欲惡欣上妙定故世尊次于此處説十金剛者為令已登七地菩薩得證金剛觀智入妙覺果海也復至二禪者此第八處説十忍也二禪即定生喜樂地此天已離初禪之喜攝心在定淡然寧靜而生勝定故世尊次于此處説十忍者為令彼已得真無生忍菩薩修行十忍法門得入妙覺果海也復至三禪者此第九處説十願法門也三禪即離喜妙樂地此天已離初禪二禪喜踴之動泯然入定而得勝妙之樂故世尊次于此天説十願者為令彼已證九地菩薩更得十大願力得入如來妙覺果海故也復至四禪中摩醯首羅天王宮説我本源蓮華藏世界盧舍那佛所説心地法門品復至四禪等者此第十處總説梵網舍那所説心地法門品也前九是漸説次第説此一是頓説説大乘心地故略去六十只説三十心十地耳四禪即捨念清淨地此天捨二禪喜念三禪樂念心無憎愛一念平等清淨無雜住于此禪空明寂靜萬象皆現故世尊次于此處頓説心地者為令彼圓證十地菩薩入妙覺果海也其餘千百億釋迦亦復如是無二無別如賢劫品中説其餘等者謂千釋迦所説既如是其餘千百億釋迦佛亦如是出定如是妙光堂説法復起乃至首羅宮中十處説法如是漸説頓説咸與千釋迦同無二無別也此説如賢劫品説一樣此上二正説法門也明橫説法竟爾時釋迦牟尼佛從初現蓮華藏世界東方來入天宮中説魔受化經已下生南閻浮提迦夷羅國母名摩耶父字白淨吾名悉達七歲出家三十成道號吾為釋迦牟尼佛已上明千釋迦千百億釋迦皆于十方世界説心地法門品此下明一釋迦于一世界中説心地法門品也爾時者從蓮華世界東方而來時也爾時從彼來入兜率天宮中先在此天伏魔以説魔王受化經已次觀下界衆生有業覆障難解脫者有根純熟易解脫者即從此天隱勝現劣下生南閻浮提迦夷羅國淨梵王家為太子也如來降神先現五瑞次顯八相謂從兜率天降皇宮者一相也母名摩耶梵語此云大幻以大幻術而幻出諸佛故以凡十方諸佛示生皆為其母也父字白淨梵語頭檀世尊欲生之時觀淨梵王性行仁賢摩耶夫人五百世菩薩母應當往彼托胎所謂示入胎住胎者二相三相也吾名悉達梵語此云頓吉以太子生時寶藏悉空空而復滿故名頓吉于時太子從摩耶夫人右脅出立蓮華上一手指天一手指地目顧四方周行七步云天上天下唯吾獨尊世出世間此法第一此示出胎者四相也七歲出家者太子具大智慧觀生老病死苦厭世五欲棄金輪王寶位如棄涕唾心思出家往白父王父王不許故于二月七日身放光明普照四天王宮乃至淨居天宮諸天見已到太子所禮足白言菩薩無量劫來所修行滿今正成熟即于午夜逾城出家苦行林中者此五相也所言三十成道號吾為釋迦牟尼佛者此是世尊功行滿足道成德備以顯然燈佛授記不虗示睹明星成道降魔者此六相也此以下二明竪説法二初天上説道二人間説戒於寂滅道場坐金剛華光王座乃至摩醯首羅天王宮其中次第十住處所説於寂滅等者寂滅以理言即清淨寂滅理以事言即真阿練若修行處言佛于此清淨阿練若中坐大道場轉大法輪故也坐金剛等者即敘前于菩提樹下出定坐金剛華光王座及妙光堂至摩醯首羅天王宮于其中間一一次第所説共有十也華嚴七處九會此經十處十會所説二經大同小異所謂示現成道轉大法輪者七相也無八相者未涅槃故也時佛觀諸大梵天王網羅幢因為説無量世界猶如網孔一一世界各各不同別異無量佛教門亦復如是時者即此梵天中説心地戒體法門時也言佛觀彼網羅幢因為喻為説無量世界衆生心行依正差別猶如網孔一一世界各各不同差別殊異亦無量各各不同諸佛教法門庭施設亦復如是吾今來此世界八千返為此娑婆世界坐金剛華光王座乃至摩醯首羅天王宮為是中一切大衆略開心地法門竟吾今等者佛言吾來此娑婆世界坐大寶座説是心地法門利度衆生已非一次已有八千返之多也乃至等者謂此處説法至首羅宮共有十處為是中者為是十處天人賢聖一切衆生之中也略開等者言以上俱是略説心地法門不甚廣多也竟者結束前文之意此以上初天上説道竟復從天王宮下至閻浮提菩提樹下為此地上一切衆生凡夫癡暗之人説我本盧舍那佛心地中初發心中常所誦一戒光明金剛寶戒是一切佛本源一切菩薩本源佛性種子一切衆生皆有佛性一切意識色心是情是心皆入佛性戒中當當常有因故當當常住法身如是十波羅提木叉出於世界是法戒是三世一切衆生頂戴受持吾今當為此大衆重説十無盡藏戒品是一切衆生戒本源自性清淨復從天等者言前從地升天次第説十法門戒體以利天此則從天降下説十重四十八輕戒用以利人也既從天宮降此菩提樹下為何等人説戒用耶乃是為此閻浮大地之上一切有心衆生説也凡夫即不知戒者癡是無明覆心暗是智眼不明言説我本師戒者正謂此等心眼蒙蔽故特與破暗除癡耳又説何法破除説我本師盧舍那佛心地中最初發心時心中常所誦一戒智慧光明堅利金剛具足衆善寶戒此寶戒者即是破暗之明燈即是除癡之慧劒即是一切諸佛根本流源即是一切菩薩根本流源即是上同三世諸佛下同三世衆生佛性種子也故所以説一切癡暗衆生凡有心者皆有佛性本不欠少也一切意等者思量曰意即第七末那識分別曰識即前六轉識所緣曰色即五根六塵集起曰心即第八阿賴耶識此識在衆生名佛性在非衆生名法性此言衆生佛性本來具足蓋由意識色心不了而致然也今以是本師佛力故咸使是情與無情有心衆生咸入佛性本源寶戒之中也常當常等者言此寶戒凡是有情而根鈍者皆當發此入戒正因凡是有心而根利者皆當發此入戒正因是情是心者既皆可入戒自當當常有如是誦戒正因既當當有誦戒修行正因必當當有證入常住法身之正果也如是者承前起後也波羅提木叉梵語此云保解脫謂持此戒者保護三業六根得大解脫也言如是十解脫戒出于世出世間之中者乃是三世諸佛修行成佛正法戒是三世一切衆生本有性戒應當頂禮佩戴領受持守刻刻體認而不當忘也吾今等者言吾今當為此現前四衆八部之大衆重重開演從一戒而開十戒十戒而開四十八戒乃至三千八萬無窮無盡一切戒品無不攝歸于十波羅提木叉一戒中也是一切等者言達戒體必達戒相既了戒相無忘戒體故復的指出道是一切衆生心戒本源自性清淨戒體本不從人得者也此二人間説戒二初凡聖本源二總結戒相初凡聖本源三初差別説戒二頌前起後三正結戒品此初差別説戒也我今盧舍那方坐蓮華臺周匝千華上復現千釋迦一華百億國一國一釋迦各坐菩提樹一持成佛道如是千百億盧舍那本身千百億釋迦各接微塵衆俱來至我所聽我誦佛戒甘露門即開是時千百億還至本道場各坐菩提樹誦我本師戒十重四十八戒如明日月亦如瓔珞珠微塵菩薩衆由是成正覺是盧舍那誦我亦如是誦汝新學菩薩頂戴受持戒受持是戒已轉授諸衆生諦聽我正誦佛法中戒藏波羅提木叉大衆心諦信汝是當成佛我是已成佛常作如是信戒品已具足一切有心者皆應攝佛戒衆生受佛戒即入諸佛位位同大覺已真是諸佛子大衆皆恭敬至心聽我誦我今等者總頌上下開説心地戒法結前起後讚勸受行之大略也我是佛自謂非同凡夫外道二乘人我神我假我之我即乃無我之我八自在我也今者當説時也盧舍那即正報身佛也方坐正方安坐也蓮華臺即佛依報國土也臺在其中周匝周圍交匝也千華上者言此大華臺外周匝有千葉每一葉復有一蓮華也上者每千華中也復現等者言每葉華中復現千釋迦坐于其上也一華等者言一葉華上有百億個國土也一國等者言一國土之中即有一釋迦佛從天降下國國皆然各各示坐菩提樹下咸同一時示成佛果證無上道坐金剛華座説金剛寶戒也如是等者言各示現非無本也如是千百億釋迦以千釋迦為本身千釋迦以盧舍那為本身前乃從體起用此乃攝用歸體也上段總頌大部前九品千百億釋迦五句頌此上卷自爾時釋迦佛身放慧光所照鼓動人天生疑玄主集衆請問光相釋迦接衆至舍那所一釋迦如此接千釋迦千百億釋迦亦如此接故云各接也微塵衆即生疑之衆俱來者謂能接之佛及所接之生俱來華藏聽我舍那常所誦一戒諸佛光明金剛寶戒也甘露者讚此戒有如是德也言生疑衆生生死熱惱一聞此戒當下消滅如甘露之潤枯焦死可復蘇也門即開者言此個甘露戒德法門因此聽衆而即大開張展轉演唱也是時千等四句頌上千釋迦佛與千百億釋迦佛領衆至舍那所聽受戒竟復還各歸本世界菩提場上升天宮十住處説法竟又從天宮降下人間為此地人説我本師初常所誦戒至自性清淨一段文是時即授受心地戒法與千百億釋迦時也還至等者謂既得戒已復還本土寂滅道場中説戒利生也各坐等者謂一釋迦坐菩提樹下轉大法輪其餘百億釋迦各坐菩提樹下亦各轉大法輪也誦我本師戒者表此戒法佛佛授受有本有據非妄流傳也上頌前文下頌後文十重四十八者出戒相也戒如明日月等者言戒之功德得之者如日月照臨空行無礙又如瓔珞珠貴重莊嚴上首也微塵等者應上各接微塵衆言千百億佛所接微塵菩薩衆因得戒益而成無上菩提覺道可謂功不浪施也是盧舍等者承上言謂此戒法由我本師自誦我亦隨誦非自不誦教人誦也汝新學等者此勸自授受人也言微塵菩薩既得戒而成佛汝等新學菩薩應當一心受持是戒已更當轉相授諸衆生廣利有情也諦聽等者此誡聽也言當諦審于耳聽領于心我此誦戒非同外道邪見二乘執偏不圓之戒乃誦諸佛所授大乘實相正戒也佛法等者謂佛所説法藏有三此三藏中之戒藏也波羅等者謂此保解脫戒能聞思修畢竟有大饒益大衆不可只徒耳聞或聞不入心或不審實深信多聞不修行與不聞等也汝是當等者言汝等能如是奉持現前當來決定成佛我久遠劫來能深信力行此戒是已成佛了也得已成佛者何由我常作如是審實深信力行而得心地戒品方能圓滿具足也已成者尚常作如是信況未成佛乎一切有等者此勸受也謂一切有心之人非同木石凡有心者皆當作佛攝入佛性戒中豈小因小果哉衆生受等者言心外無佛心地外無佛地衆生既受諸佛心地戒法豈不即入諸佛位耶位同等者言位既同于大覺已僅能為佛家真佛子必經三祗果滿萬行功圓方能繼佛示生證無上菩提也大衆等者大衆即現前稟受佛戒之四衆八部聖凡清淨大衆皆身生恭敬心竭至誠口無議論咸皆專一而聽我誦常所誦一戒光明金剛寶我也此二頌前起後也爾時釋迦牟尼佛初坐菩提樹下成無上覺初結菩薩波羅提木叉孝順父母師僧三寶孝順至道之法孝名為戒亦名制止佛即口放無量光明是時百萬億大衆諸菩薩十八梵天六欲天子十六大國王合掌至心聽佛誦一切諸佛大乘戒爾時者即從天上復下人間示現成道説戒時釋迦牟尼佛即娑婆教主之佛號也初坐菩提樹下始坐道場之處成無上覺即正遍知覺超諸等覺妙覺之上無有過者也初結等者此示轉法輪之急務也佛之本懷原為衆生拔苦令其離苦得樂是故世尊思惟畢竟以何法令衆生離苦得樂耶故最初先演波羅提木叉保護衆生三業六根得大解脫衆生離苦佛願亦足矣故先結如是大乘戒普度有情非小乘聲聞戒僅自利不能利他比也孝順等者孝孝敬也順承順也父母生身父母也師即得戒和尚法身父母也僧即同學三寶即佛法僧乃慧命父母也言俱皆如父母一般孝敬而莫慢承順而莫違也故所以孝順此波羅提木叉至道之法孝即名為戒也五刑之屬三千罪莫大于不孝豈不孝而得名為戒耶亦名制止者亦是佛順衆生根機大小而裁制禁止也豈可受戒者不承順父母師僧三寶而得制止戒耶故云亦名制止也佛即等者此表心地戒法之瑞應也此經六處放光一釋迦身放慧光二玄主身放金剛白雲色光三舍那身放虗空光四舍那付授放光五佛佛放光光光化佛六口放無量光明説諸菩薩心地戒品正明佛佛親口宣傳畢竟要依心地戒光為修行之勝因然後得證心地戒光之勝果也是時百萬億大衆者總標戒光所攝人天凡聖有緣衆也諸菩薩者內凡外凡地上諸菩薩也十八梵天即色界初禪三天二禪三天三禪三天四禪九天共十八天也六欲天子者即欲界中四王忉利夜摩兜率化樂他化之六天也十六大國王者西域大國共有十六既大國主秉受戒法其餘國王聽受戒法亦可知矣合掌至心二句以明聽受者之虔恭意合掌即身業虔誠至心即意業虔誠口默不言即口業虔誠以是三業虔誠于此大乘心地戒光一聞便省豁然通達此三正結戒品二初標敘結受二説戒相貌初標敘結受二初經家敘説二佛自敘説此初經家敘説也佛告諸菩薩言我今半月半月自誦諸佛法戒汝等一切發心菩薩亦誦乃至十發趣十長養十金剛十地諸菩薩亦誦是故戒光從口出有緣非無因故光光非青黃赤白黑非色非心非有非無非因果法是諸佛之本源行菩薩道之根本是大衆諸佛子之根本是故大衆諸佛子應受持應讀誦應善學諸佛子諦聽若受佛戒者國王王子百官宰相比丘比丘尼十八梵天六欲天子庶民黃門淫男淫女奴婢八部鬼神金剛神畜生乃至變化人但解法師語盡受得戒皆名第一清淨者佛告諸菩薩至十地諸菩薩亦誦一段乃以己勵人也謂我是已成佛尚半月半月自誦諸佛戒法況汝等初發心菩薩者乎黑月三十日白月望十五日對三寶前誦戒者言于此十重四十八輕中自知自揀看清淨不清淨如人自照鏡好醜生欣戚誦戒亦如是此是釋迦如來半月半月立誦諸佛所傳心地戒法萬古弘規誰敢違者既已成一切諸佛尚誦況降茲者耶故汝等初發大心圓戒十信菩薩並入理證真十住菩薩十行十向十地諸菩薩亦當如諸佛一般半月半月誦也是故戒等者言因是諸佛自誦新舊諸菩薩亦誦之故所以心地戒光咸從佛口中流出也既光從口出即是有緣既有是緣必有其因非是無因故出斯光也斯光非屬青黃赤白黑之色塵法非屬四大幻色身法非屬五蘊集因心法非屬外道有無斷常法非屬二乘因果修證法也既非如是等法此戒光是何法耶乃是諸佛元所證無上菩提無餘涅槃之本源法行菩薩道者之根本法也且不獨佛菩薩為然亦是諸現前大衆新發心諸佛子之根本法也是故大衆等者言戒光既是根本所以大衆諸佛子于此心地戒應當領受持守應當閲讀諷誦應當善為學習之也諸佛子諦聽者勸審實而聽聞也若受佛戒等者槩舉能受戒人衆也謂若國王王子百官宰相比丘比丘尼十八梵天六欲天子庶民黃門淫男淫女奴婢八部鬼神天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽衆金剛神畜生乃至變化人但能通達法師語言者不得揀擇謂形雖有異而性本無殊一一盡當得與授菩薩心地戒法而去皆名第一清淨者言此等人未授戒時皆染污而不清淨既得戒後則純清淨而無染污一念回光如同本得故曰皆名第一清淨者也此二佛自敘説也佛告諸佛子言有十重波羅提木叉若受菩薩戒不誦此戒者非菩薩非佛種子我亦如是誦一切菩薩已學一切菩薩當學一切菩薩今學我已略説菩薩波羅提木叉相貌應當學敬心奉持佛告等者承上既受佛戒為成佛因言當誦佛戒為成佛果也告即召告能受之人也有十重等者明所受之法也若受二句明違法之人非菩薩二句定違法之過謂波羅提木叉是菩薩本業是成佛真諦今既不誦是棄本業而無真種本種尚不得云何利益衆生而名菩薩乎故云非菩薩非佛種子也我亦如是誦者舉果人以勸因人誦也一切菩薩等者舉因人以勸誦也謂我乃果中人尚如是誦況因人乎且而三世一切菩薩已學誦當學誦今學誦是已成熟菩薩尚亦如是學誦況汝新學菩薩而不學誦者乎我已略説等者言聲聞戒有限量菩薩戒無限量今于無限量中聊舉一二故云略説言相貌者謂戒體本無相貌不妨有戒可持得持戒相貌毀戒得毀戒相貌所謂心持印呪顧盼雄毅者此也應當學等者謂三世成熟菩薩尚學爾等新菩薩宜急急修持應當學尊重此戒銘刻于心而勿忘承奉持守而勿失也此二説戒相貌二初總説戒相二別説戒相此初總説戒相也下別説戒相二初説重戒相十二説輕戒相四十八第一殺戒佛言佛子若自殺教人殺方便殺讚歎殺見作隨喜乃至呪殺殺因殺緣殺法殺業乃至一切有命者不得故殺是菩薩應起常住慈悲心孝順心方便救護一切衆生而反恣心快意殺生者是菩薩波羅夷罪佛言佛子者呼其人而告之也言為佛子受持佛戒當依戒修不可輕違佛制故也以下倣此若自殺是身殺教人方便讚歎是口殺見作隨喜乃至呪殺是意殺殺因是過去無始習氣不忘集業為因假使百千劫所作業不忘是也殺緣現在怨家聚會為緣因緣會遇時是也殺法亦是現在刀杖網弋斷彼命根為法果報還自受是也殺業由三種和合而成未來殺業之果也乃至等者言情與無情蠕動蜎飛昆蟲草木一切有命者俱不得無故而加傷損況大生命耶如國王宰官殺一救多興善除惡此大慈悲故有開遮但不得故意私心成殺也能如是行持方得名為攝律儀戒無惡不止者是菩薩等者言是受戒菩薩當起常常安住而不忘失之心常常安住慈愛悲憫如保赤子之心常常安住孝敬恆順如父如母之心如是方便如是救護一切衆生方得名為攝善法戒無善不修者如是拔苦與樂方名為饒益有情無生不度者而反恣心等者謂若見衆生苦不行救拔反恣縱其心快逞其意以殺害衆生者豈成持戒菩薩耶是不持守而犯戒者也是菩薩等者言是犯殺菩薩自取其罪當得波羅夷罪也梵語波羅夷此云極惡又云棄罪當墮三惡道故凡持是戒者第一所當慎也第二盜戒若佛子自盜教人盜方便盜呪盜盜因盜緣盜法盜業乃至鬼神有主物劫賊物一切財物一針一草不得故盜而菩薩應生佛性孝順心慈悲心常助一切人生福生樂而反更盜人財物者是菩薩波羅夷罪若佛子意同前身自盜口教人方便意呪過去往因現在緣會方法未來業果諸盜乃至廟堂中供器鬼神物咸是有主施捨之物並劫賊所得之物但凡一切財物俱不得不與而取毋論貴賤大小一針一草亦不得借故不與而取無盜不斷故也而菩薩等者言是菩薩當生孝順心觀一切衆生如父如母應生慈悲心觀一切衆生如子如女常常助勷一切衆生生長福田身受其福生長樂具心得安樂無善不修故也如是助福助樂令一切人離苦得樂方得名為無生不度者而菩薩等者言若見窮苦不行拯救反更盜人財物豈持戒菩薩人耶故結罪同前墮亦同前也可不慎歟第三淫戒若佛子自淫教人淫乃至一切女人不得故淫淫因淫緣淫法淫業乃至畜生女諸天鬼神女及非道行淫而菩薩應生孝順心救度一切衆生淨法與人而反更起一切人淫不擇畜生乃至母女姊妹六親行淫無慈悲心者是菩薩波羅夷罪若佛子自身行淫口説教人淫語乃至一切女人亦不得故起一念淫意並過去淫因現在淫緣淫法集積未來淫業之果作諸纏縛無解脫期乃至畜生女不擇禽獸諸天鬼神女不知正邪及非道行淫不分晝夜時節男女二根大小長幼俱名非道一一不得犯無淫不斷故也而菩薩應生孝順生一切男子是我父一切女人是我母之心如是救護濟度一切衆生教其令斷愛欲根本清淨無染解脫之法與人是菩薩本業無善不修故也如是拔苦與樂方得名為無生不度者而菩薩若不如是教益反更起一切衆生不擇異類貴賤母女姊妹六親及非道行淫無一點慈悲清淨之心者豈持戒菩薩人耶故結罪同前當墮亦同前也可不慎歟第四妄語戒若佛子自妄語教人妄語方便妄語妄語因妄語緣妄語法妄語業乃至不見言見見言不見身心妄語而菩薩常生正語亦生一切衆生正語正見而反更起一切衆生邪語邪見邪業者是菩薩波羅夷罪若佛子自己不真實語言教人方便因緣法業乃至自非聖人而言我是聖人非實得上人法而言我得上人法欺誑愚夫希求名聞利養如是身妄作心妄想口妄説三業不實一切妄語若輕若重咸是持戒菩薩所當斷者無妄不斷故也而菩薩等者言應當常生如來五語如是正語亦令一切衆生常生正語不為凡小邪語所誘常生正見不為外道邪見所惑如是自己真實乃能取信于人令人真實方得名為無善不修者如是自真實令人真實方得名無生不度者而反等者而菩薩若自不正語正見反更起一切衆生不正之言偏邪之見造種種妄業自欺欺人者其罪不小故結罪同前應墮亦同前也除急難解網釋苦方便不犯餘宜慎之第五酤酒戒若佛子自酤酒教人酤酒酤酒因酤酒緣酤酒法酤酒業一切酒不得酤是酒起罪因緣而菩薩應生一切衆生明達之慧而反更生一切衆生顛倒之心者是菩薩波羅夷罪若佛子自酤酒等者酤釀酒以賣之也自酤酒教人酤酒因過去起貪利心而為酤因得米麥而為酤緣得曲蘖醞釀而為酤法三事和合而為酤業醉人之惡果也一切酒等者言不但如上不可造乃至甘蔗葡萄楊梅棗子等俱不可造也蓋酒之為害不小矣四分律云酒有三十六失不孝父母不敬三寶墜車墮馬投河赴火敗國亡家無所不至儒言酒有三德七惡禹惡旨酒唯酒無量不及亂故云是酒乃起罪因緣言無酒不斷故也而持菩薩戒人應當生教化衆生之心開發各各本有智慧令其了達一切愚癡之根不使飲茲狂亂毒藥令人得智無善不修可也如是除癡與慧寧非饒益有情無生不度者乎而反等者言于此方便不能行反更生一切衆生愚癡顛倒之心令其酤飲陷人于極苦地是豈持戒菩薩人所用心乎故結罪當墮俱同前也第六説四衆過戒若佛子口自説出家在家菩薩比丘比丘尼罪過教人説罪過罪過因罪過緣罪過法罪過業而菩薩聞外道惡人及二乘惡人説佛法中非法非律常生慈心教化是惡人輩令生大乘善信而菩薩反更自説佛法中罪過者是菩薩波羅夷罪若佛子口自説者謂謗出自口也出家即出家二衆在家即在家二衆俱是發大乘心受大乘戒者故云菩薩也比丘比丘尼者別開出家二衆乃是從聲聞十戒二百五十戒中漸入大乘者非頓受類故別開也如是四衆俱乃住持三寶弘通法人同為佛子不得自揚家醜説彼罪過亦不得教他人説彼罪過及過去罪過因現在罪過緣與法三合未來成説罪過業之果也以上一一不得犯無惡不斷故也而菩薩等者言持戒菩薩若聞外道惡人顛倒邪見之輩及二乘惡人自利小見之輩不達大乘逆順境界而説諸佛大乘法中非法非律者菩薩聞得應常生慈愍心教化是外道二乘惡人輩反邪歸正捨小就大令生大乘善信無善不修可也如是教益寧非饒益有情無生不度者乎如或不能尚缺慈悲豈有反更自説佛法中罪過者耶若自説及使人説者結罪同前墮亦同前也第七自讚毀他戒若佛子口自讚毀他亦教人自讚毀他毀他因毀他緣毀他法毀他業而菩薩應代一切衆生受加毀辱惡事自向己好事與他人若自揚己德隱他人好事令他人受毀者是菩薩波羅夷罪若佛子口等者言菩薩若自讚自己之長而毀他人之短亦教人讚我有德而毀他人無德及過去無始習氣不除互毀為因現前忌嫉生毀為緣巧毀取信于人為法三事和合成毀他業也如上一一不得犯無惡不斷故也而菩薩等者言持戒菩薩倘見他人有過應代替一切衆生受加毀辱以惡事自向己好事與他人無善不修可也言惡事自向己是不應自讚好事與他人是不應毀他也以如是心行饒益他人方名為無生不度者若自揚己有德隱覆他人好事而反令他人受毀辱者此豈菩薩人用心乎故結罪同前墮亦同前也第八慳惜加毀戒慳者吝也惜者愛也加毀謂無故以罪加人而損惱有情也若佛子自慳教人慳慳因慳緣慳法慳業而菩薩見一切貧窮人來乞者隨前人所須一切給與而菩薩以惡心瞋心乃至不施一錢一針一草有求法者不為説一句一偈一微塵許法而反更罵辱者是菩薩波羅夷罪若佛子自慳等者謂自慳自惜不惠濟人也教人慳使他人吝惜以遮己也慳因以無始來常懷慳心為因慳緣以遮護法財為緣慳法以巧設不捨為法慳業以三事和合作意成當來餓鬼業報之果一一不得犯無惡不斷故也而菩薩等者言持戒菩薩見一切貧窮人無論親疏貴賤來乞求者隨前人意下所須衣食法等一切悉當給與之而勿吝惜無善不修故也如是斷惡修善方名為饒益有情無生不度者而菩薩等者言菩薩若以自私自利之惡心故厭人瑣瑣乞求之瞋心故不但不多施乃至不施一錢一針一草而一毫不與又或有求法者而吝法不與説一句一偈一微塵許法如是之心已失菩薩慈悲道已墮慳吝罪而何況更加罵詈恥辱他人者乎故結罪同前墮亦同前也第九瞋心不受悔戒若佛子自瞋教人瞋瞋因瞋緣瞋法瞋業而菩薩應生一切衆生中善根無諍之事常生慈悲心孝順心而反更於一切衆生中乃至於非衆生中以惡口罵辱加以手打及以刀杖意猶不息前人求悔善言懺謝猶瞋不解者是菩薩波羅夷罪若佛子自瞋等者自瞋是自己瞋恨于人教人瞋是教他人瞋彼以雪己恨瞋因是過去含恨習氣為因瞋緣是現前與所瞋之人為緣瞋法是心起計較令彼受辱為法瞋業是三事和合成當來三塗業報苦果以上一一不得犯無惡不斷故也而菩薩等者言菩薩應當生起一切衆生心地中平等善根根鈍者俾無諍論根利者俾得無諍三昧如是之事又常令生起慈悲之心等視衆生猶如一子常令生起孝順之心等視男女如我父母無善不修故也如是斷惡修善方名為饒益有情無生不度者如或不能而反更于一切衆生之中並于非衆生之中以惡口罵辱而口業不善復加以手打及以刀杖而身業不善意猶不息而意業不善以是三業齊犯罪無容逭也或所瞋前人來求懺悔而以善言懺謝下氣解瞋若乃揚眉怒目猶瞋而不解者是豈行持菩薩戒行人耶故結罪同前墮亦同前也第十謗三寶戒若佛子自謗三寶教人謗三寶謗因謗緣謗法謗業而菩薩見外道及以惡人一言謗佛音聲如三百鉾刺心況口自謗不生信心孝順心而反更助惡人邪見人謗者是菩薩波羅夷罪若佛子自等者自謗三寶是自家見解不端正見人謗即隨謗而妄議非毀也教人謗謂使人訕謗欲同黨也謗因是過去習氣懷謗為因謗緣是湊合非語為緣謗法是巧詞偽謗惑愚為法謗業是三事和合而成三惡道謗業之苦果上一一不得犯無惡不斷故也而菩薩等者言菩薩若見邪見外道及以興訕三寶惡人才聞一言半句謗佛音聲入其耳中就如三百矛鎗刺入我心中一樣其痛有難于忍者聞謗痛心無善不修教生信心無生不度可也況自口自出謗言乎佛為天人師開我迷雲應生信敬心而不生信敬心佛為大慈父拔我離苦應生孝順心而不生孝順心如此已非佛子而反更助惡人并邪見之人以謗三寶以滋快議如其叛逆即如師子身中蟲自食師子身中肉者豈是菩薩持波羅提木叉者耶是菩薩乃犯波羅夷罪當墮三惡道者也可不慎歟總結十重文善學諸仁者是菩薩十波羅提木叉應當學於中不應一一犯如微塵許何況具足犯十戒若有犯者不得現身發菩提心亦失國王位轉輪王位亦失比丘比丘尼位亦失十發趣十長養十金剛十地佛性常住妙果一切皆失墮三惡道中二劫三劫不聞父母三寶名字以是不應一一犯汝等一切諸菩薩今學當學已學如是十戒應當學敬心奉持八萬威儀品當廣明善學諸仁者是佛讚美善持戒諸菩薩為慈愛一切衆生之仁者也是菩薩等者言如是菩薩波羅提木叉別解脫十清淨戒品應當勤學修持于其中間不得一一犯如微塵許以微塵許尚不許犯何況具足犯十戒乎此乃決言其不可犯也若有犯等者言設若是有犯者即現世今生不能得發大向上志求無上菩提道之心不唯不得發大心而若是國王犯失國王位轉輪王犯失轉輪王位比丘犯失比丘位比丘尼犯失比丘尼位既今世出世間福慧之位已失則三賢位十金剛位十聖位亦皆失也一切因位既失而佛性常住妙覺果海位詎可得乎亦一切皆失也墮三等者言一切因果位既失當墮何處耶謂當墮地獄餓鬼畜生道中極苦處也二劫三劫者示極苦處時分長遠也不聞父母三寶名字者示極苦處障重業深也既苦時如是遠苦報如是重故以是當知不應一一犯此戒如微塵許可也汝等一切等者言汝等一切諸菩薩或未學而今方學或即此日正當修學或久已修學者于是十戒應當如所受學敬心奉持乃至終身不可忘失也八萬等者謂此處略説大部中八萬威儀品中已廣明此義佛告諸菩薩言已説十波羅提木叉竟四十八輕今當説佛告諸菩薩等者此吾佛世尊召告現前在會三賢十聖四衆八部等受戒諸菩薩言也已説句結前十重已説竟也四十句起後四十八輕戒今當説也第一不敬師友戒師有開導之恩友有切磋之德所當敬重倘居憍慢一生福種慧芽不得滋長故戒之也若佛子欲受國王位時受轉輪王位時百官受位時應先受菩薩戒一切鬼神救護王身百官之身諸佛歡喜既得戒已生孝順心恭敬心見上座和尚阿闍黎大德同學同見同行者應起承迎禮拜問訊而菩薩反生憍心慢心癡心嗔心不起承迎禮拜一一不如法供養以自賣身國城男女七寶百物而供給之若不爾者犯輕垢罪若佛子欲受等者國王乃各之仁君轉輪王有四金銀銅鐵四輪王也乃即統攝四三二一天下主也百官文武大臣也如是聖君賢臣欲受王位官位之時應當先受菩薩戒以慈悲利濟孝順為懷君聖臣賢自感一切鬼神救護王身百官之身以綿國祚以永爵榮不但鬼神如此即感十方諸佛歡喜護念國界安寧人民快樂也既蒙師友開導切磋而得戒已應當知恩報恩尊重戒師如父母生孝順心而不敢違尊重善友如兄長生恭敬心而不敢慢也見上座等者即當孝順恭敬之意上座即尊長有道有德之美稱和尚梵語此云力生因師力而生法身慧命即戒師也阿闍黎梵語此言軌範即羯磨教授三師七證師也大德謂以上諸師無德人決不能為俱是福慧二備而有大德者見之皆當生孝順如父母之心也同學同一師學者同見同一師訓而得戒理者同行同一清白梵行者謂上諸友俱是三寶法器見之皆當生恭敬如兄長之心也如是師友毋論遠來近來當起身承迎至心頂禮拜跪問訊如法供養方得名為念戒持戒人也而菩薩等者言是菩薩倘或是見師友不唯不敬而反生高倨自尊之憍心生藐視前人之慢心生見賢聖不親候之癡心生厭惡師友嚴訓之瞋心以生如是心已便不起承迎禮拜問訊身口意三業不善乃至飲食衣服臥具湯藥一一皆不次第如法供養也夫供奉師友之法應賣自身之內財國城男女七寶百物之外財營辦所須以供給之詎可不如是供養而反生憍慢等心不起承迎供養者乎菩薩若不如是者是菩薩必犯輕垢罪此罪比前十重減一等非輕細之謂也第二飲酒戒律云飲酒之人墮燒煮地獄五五百世初五百世在鹹糟地獄中二五百世在沸屎三五百世在曲蛆四五百世在蠅蚋五五百世在癡熱無知地獄中業報如此故戒之也若佛子故飲酒而酒生過失無量若自身手過酒器與人飲酒者五百世無手何況自飲亦不得教一切人飲及一切衆生飲酒況自飲酒一切酒不得飲若故自飲教人飲者犯輕垢罪若佛子故飲酒等者律中開有重患醫師言瘥以酒引藥權用不犯無故而飲或借病飲是為故飲而酒過失無量者乃明決不得飲也以酒迷心亂性無量過失從酒而生是以決不得飲也若自身手等者言不但不得自飲生過而已且自身手過酒杯壺器與人飲酒者亦招感五百世無手足之報在何況無故而自飲酒也耶自飲既不得教一切人飲亦不得既一切人不得及一切衆生飲酒亦不得也既教人飲尚不得何況自飲酒一切米麥所作及楊梅棗子葡萄所作酒俱不得此乃反覆丁寧言斷斷乎決不可故飲教人飲也若不遵此戒故自飲教人飲自誤誤人者是菩薩犯輕垢罪第三食肉戒若佛子故食肉一切肉不得食夫食肉者斷大慈悲佛性種子一切衆生見而捨去是故一切菩薩不得食一切衆生肉食肉得無量罪若故食者犯輕垢罪若佛子故食肉者昔佛在世時年逢飢饉草菜不生佛神力故以五指端化五淨肉一時權現以活人實非血肉豈有持戒菩薩而故食衆生肉乎是故一切衆生身肉不得食也夫食肉者斷大慈悲佛性種子言凡有血氣者必有知有知即佛性種子凡有知者必同體若食同體肉是斷大慈悲故云食肉者斷大慈悲佛性種子也一切等者言食肉人衆生見而生怖不遠離不止也如鷗去海翁機鴿搖羅漢影是也以是之故一切受戒菩薩切切不得食一切衆生身肉形異體同其佛性種子亦無差別也食肉得無量罪者如楞嚴經云有無量因緣故不應食肉為一切衆生從本以來常為六親故不淨氣分所生長故衆生聞香悉生恐怖如旃陀羅及談婆等狗見驚吠故乃至空間林中虎狼聞香是故不應食衆生肉若故食者是菩薩犯輕垢罪第四食五辛戒若佛子不得食五辛大蒜茖蔥慈蔥蘭蔥興渠是五種一切食中不得食若故食者犯輕垢罪若佛子不得等者言五辛即五葷非五腥乃一大蒜一名葫即葫蔥是二茖蔥即薤菜是三慈蔥即蔥是四蘭蔥即小蒜是五興渠即蒠蒺此方無此種所言不得食者以此五辛熟食發淫生餐增恚更有五不應食一生過二天遠三鬼近四福消五魔集是五辛一切食中若有一毫相雜于其間即不得食若故食者是菩薩犯輕垢罪第五不教悔罪戒若佛子見一切衆生犯八戒五戒十戒毀禁七逆八難一切犯戒罪應教懺悔而菩薩不教懺悔同住同僧利養而共布薩同一衆住説戒而不舉其罪不教悔過者犯輕垢罪若佛子見等者見一切衆生兼在家受戒言八戒即優婆塞八戒五戒即八戒中前五戒十戒有二一沙彌十淨戒二菩薩十重戒毀即破毀禁即止滅謂如來所立止惡滅罪正戒盡情犯而破壞之也七逆即弒父弒母弒和尚弒阿闍黎破羯磨轉法輪僧惡心出佛身血弒阿羅漢是也賣佛形像菩薩形像及經律即是出佛身血弒比丘僧即是弒阿羅漢八難即淨名疏言界外八難也有餘中三十心為三惡道住無我法即北洲地前法愛如長壽天未有初地十種六智名諸根不具地前智淺如世智辨聰不窮中理如佛前佛後此界外八難持大乘戒有犯當教懺悔不教者亦犯垢罪若見此一切犯戒之人應當生慈悲心教其懺除前愆悔後莫作可也而菩薩不教懺悔寧不自犯得不教悔罪耶況又同住一處同僧飲食利養而又共同布薩同一清淨海衆住坐一同誦説大戒而不舉揀彼僧罪過而不教誡令其懺悔過犯者是菩薩犯輕垢罪第六不供給請法戒若佛子見大乘法師大乘同學同見同行來入僧坊舍宅城邑若百里千里來者即起迎來送去禮拜供養日日三時供養日食三兩金百味飲食牀座醫藥供事法師一切所須盡給與之常請法師三時説法日日三時禮拜不生嗔心患惱之心為法滅身請法不懈若不爾者犯輕垢罪若佛子見等者言大乘法師非是小乘獨善乃是具大信解通達佛理悲智雙運自利利他之法師也大乘同學是同一師學大乘戒律者同見同一見解明了心地戒者同行同行菩薩心地清淨戒行者言若見如是師友來入僧坊舍宅城邑等處無論遠近若百里千里來者而為主菩薩應起至敬之心來必迎去必送至誠禮拜如法供養應當日日三時不令乏少用何供養每日所食可用三兩金以作百味飲食供養敷好牀座臥具供養衣服醫藥四事供事法師凡法師一切所須盡給與之而勿吝惜也常請等者言如是供養豈是求人天小果福報而已耶正為求般若大法以清淨口業請法師日日三時演説妙法俾慧命不絶故也以清淨身業日日三時禮拜以清淨意業不生一念瞋恚憂患煩惱之心不特三業虔誠而已實為大法之人焚身斷臂亦所不惜而請求説法不生疲厭心也若不如是者是菩薩犯輕垢罪第七懈怠不聽法戒若佛子一切處有講法毗尼經律大宅舍中講法處是新學菩薩應持經律卷至法師所聽受咨問若山林樹下僧地房中一切説法處悉至聽受若不至彼聽受者犯輕垢罪若佛子一切等者承前不但師來我所應當供養請法而已即凡有説法之處應當至彼聽受也一切處有等者講法講演大乘毗尼經律滅惡生善之大法毗尼梵語此云調伏謂調三業伏六根除惡增善也經詮性相理律止性業遮業故云毗尼經律也大宅舍中者是佛在世時常受國王大臣請在家中安居説法是為大宅舍中講法處也是新學菩薩見有如是講法之處應自手持經律卷本直到講演法師之所至心諦聽領受教法如有未解咨詢請問而決疑焉若山林等者以遠況近不但居家如此設或在山間林下幽隱僧地孤野房中一切有師説法之處悉皆到彼聽受其教也童子南詢百城遍歷洞山九上投子三登咸可為法詎可憚勞而不往聽耶若不至彼聽受者是始則慢法懈怠終則無惡不造人也是菩薩犯輕垢罪第八背大向小戒若佛子心背大乘常住經律言非佛説而受持二乘聲聞外道惡見一切禁戒邪見經律者犯輕垢罪若佛子心等者背即違背不相向也大乘常住經律即大滿常住金剛寶戒心地無相法品經律言根氣狹劣者畏其難行心便乖違反背大法而不趨向是背大也而反趨向受持二乘聲聞權小之法外道偏邪諸惡邪見禁戒邪見有相經律者是向小也大乘當向不向而反背小乘當背不背而反向者是菩薩所以犯輕垢罪也第九不看病戒若佛子見一切疾病人常應供養如佛無異八福田中看病福田第一福田若父母師僧弟子病諸根不具百種病苦惱皆供養令差而菩薩以瞋恨心不看乃至僧房中城邑曠野山林道路中見病不救濟者犯輕垢罪若佛子見等者謂上自父母師長下自子女徒衆中至兄弟六親外至冤家一切凡有疾病者常當恭敬供養如佛一樣無以異也如巖老躬處癘坊寬公輿歸病者咸可為法蓋八福田中看病為第一福田也八福田者一諸佛二聖人三父四母五和尚六阿闍黎七衆僧八病人此八中惟病為患有能救苦因自得受樂果故看病福田為第一也若是上而父母師長中而衆僧下而弟子有病或諸根殘廢不具足種種四百四病諸苦惱患當毋論上中下一味以平等心悉皆以四事如法供養令病痊愈皆如佛一般無以異也而菩薩等者言菩薩或以父母師長平時督訓心生厭嫌起瞋恨心捨去而不顧者乃至僧坊城邑曠野山林道路之中如是一切病患至疏不相識之人亦應盡心而為救濟況父母師長至親而不看者乎若見病人不作方便救濟而捨去者是菩薩犯輕垢罪也第十畜殺具戒若佛子不得畜一切刀杖弓箭鉾斧鬬戰之具及惡羅網殺生之器一切不得畜而菩薩乃至殺父母尚不加報況殺一切衆生不得畜殺衆生具若故畜者犯輕垢罪若佛子不得等者言為佛弟子者應當畜截魔斬愛之智慧刀勇猛杖大勢弓精進箭忍辱鉾定力斧及張大法羅網以羅三界衆生出愛欲河如是具者可也又德山護生棒石鞏救死弓正當畜也而不應畜一切刀杖弓箭鉾斧鬬戰凶殺之具至于惡羅網殺生之器非佛子所宜有者一切皆不得畜也而菩薩人乃至殺父母之讐應皆報復尚不得加報況殺一切衆生而得加報者乎殺具尚不得畜不使有一念殺機萌動于心況身行之者乎若故畜此不祥殺具者是菩薩犯輕垢罪也如是十戒應當學敬心奉持如是十戒者總結前十戒也應當二句總勸修學此戒應當頂戴敬心奉行持守勿忘勿失也第十一國使戒佛言佛子不得為利養惡心故通國使命軍陳合會興師相伐殺無量衆生而菩薩尚不得入軍中往來況故作國賊若故作者犯輕垢罪佛言佛子等者言為佛子當作佛使命傳佛心印如鄧隱峯飛錫解鬬陳尊者擲鞋解圍能為衆生除煩惱賊息刀兵苦可也若苟求名聞利養圖功受賞惡心籌謀成一家敗一家而為國使命通約戰期等斷不可也軍陳等者言萬二千人為軍師旅成列為陳合戰會兵興舉師衆彼此相伐傷殺無量衆生如是等惡豈菩薩人之所為乎而新菩薩尚不得入軍營之中往來豈容作國使乎決言凶地凶器尚不可近況故作國賊以害衆生乎若故作者是菩薩犯輕垢罪第十二販賣戒若佛子故販賣良人奴婢六畜市易棺材板木盛死之具尚不應自作況教人作故若自作教人作者犯輕垢罪若佛子故販等者以賤為貴曰販出物得財曰賣良人乃好人家之子女也六畜即牛馬豬羊雞犬也棺材板木乃盛死之具也如販賣者是不仁也于慈悲心大有乖損所以不得賣也尚不應等者言自己一人作尚且不可何況教多人作此不仁之事耶若故自作并教人作如是事者是菩薩犯輕垢罪第十三謗毀戒若佛子以惡心故無事謗他良人善人法師師僧國王貴人言犯七逆十重父母兄弟六親中應生孝順心慈悲心而返更加於逆害墮不如意處者犯輕垢罪若佛子等者惡心者明謗雖從口乃意地使之即忌心貪心瞋心故名惡心也無事謗者無疵事而謗他也溫良人善柔人大乘三七法師六和僧侶及受大乘戒之聖主賢臣咸于三寶有大利益應當供養恭敬可也而反無事作是謗言説犯七逆十重且夫師僧國王有父母義良人善人有兄弟義貴人有六親義于其中應生孝順之心慈悲之心讚歎激揚成彼名德令其一一如意而反更加逆情害意壞彼名德墮不如意處者是菩薩犯輕垢罪第十四放火焚燒戒若佛子以惡心故放大火燒山林曠野四月乃至九月放火若燒他人家屋宅城邑僧房田木及鬼神官物一切有主物不得故燒若故燒者犯輕垢罪若佛子以等者惡心者言或忌瞋或逞情皆是不仁念頭放大猛火燒山林曠野多傷蟲類所以四月至九月大而鳥獸卵孳細而昆蟲轉化一夏一秋之間若乃放火其傷損物命寧有窮耶猶不特此或若延燒他人家屋宅城邑並僧房田木鬼神官物凡一切有主物其損更多失德更大毋論物命有損無損皆不得故燒也若故燒者犯輕垢罪第十五僻教戒若佛子自佛弟子及外道惡人六親一切善知識應一一教受持大乘經律教解義理使發菩提心十發趣心十長養心十金剛心於三十心中一一解其次第法用而菩薩以惡心瞋心橫教二乘聲聞經律外道邪見論等犯輕垢罪若佛子自等者自佛弟子是三寶內衆外道惡人是心遊外道之邪見人以邪故名惡人也六親即父母兄弟子女也一切善知識即相知相識中有大乘根性好善友也如是若內若外一切親友應當一一開導令其受持大乘經律訓教信解通達義理使發無上菩提之心並十住十行十回向心于三賢心中一一令其解入先後次第觀想法用信滿入住住滿入行行滿入向一一觀行等如是教誡方名正教利己利人也而為菩薩若以惡心嫉妬輕視人而不教或以瞋心懷恨教未從而棄捨或橫教二乘聲聞經律一切外道邪見論等所謂良材曲使美器惡用遺誤學人斷佛慧命如是僻教實非菩薩用心故結過犯輕垢罪橫僻也第十六為利倒説戒若佛子應好心先學大乘威儀經律廣開解義味見後新學菩薩有從百里千里來求大乘經律應如法為説一切苦行若燒身燒臂燒指若不燒身臂指供養諸佛非出家菩薩乃至餓虎狼獅子一切餓鬼悉應捨身肉手足而供養之然後一一次第為説正法使心開意解而菩薩為利養故為名聞故應答不答倒説經律文字無前無後謗三寶説者犯輕垢罪若佛子應等者言好心者謂先以大乘清淨法行自利利他為心先學大乘菩薩戒制度範圍身心之法廣博開通心地法品解了一一義味方可規模後學自利而後利他也見後等者言我既為先學見後新學大乘法律菩薩有遠從百里千里而來求此大乘經律此實好心當如法次第開導為伊先説一切苦行法云何苦行或燒身燒臂燒指供養諸佛如喜見菩薩燃身藥王菩薩燃臂世尊燃燈咸可為證若不如是燒身臂指供養諸佛者即為著相凡夫身相未空豈成出家菩薩故云非出家菩薩也乃至等者言不但燒身等供養諸佛而應為之乃至見餓虎狼獅子一切餓鬼悉應捨此身肉手足而供養之不揀諸相然後一一次第為説大乘正法甚深理趣使彼心開而無所拘意解而無所縛如是為説是名正説是名好心次第而説而菩薩等者言若菩薩為利養故為名聞故求無所得便生當答不答之心設或答時亦不次第為説當正説而反倒説于大乘經律文字義理前無所起後無所歸上違諸佛意是謗佛中背經律旨是謗法下乖來者求是謗僧如是謗三寶説者是菩薩犯輕垢罪第十七恃勢乞求戒若佛子自為飲食錢財利養名譽故親近國王王子大臣百官恃作形勢乞索打拍牽挽橫取錢財一切求利名為惡求多求教他人求都無慈愍心無孝順心者犯輕垢罪若佛子自等者言自為者何揀非為衆非為求護法是乃為求好飲食錢財利養好名譽以安樂自已故也親近等者言因斯之故相親愛相近鄰而朝夕依依于彼國王王子大臣百官之家以為親厚恃彼豪貴之力做作體態仗勢貪圖乞索不得則行打拍打拍不得則乃牽挽橫逼強取人之錢財不由人願乃至一切貪求名為不善是惡法求名為不良是貪多求若自未得又教他人求如是等求令人生怨生恨都無慈愍之心無孝順之心者也故結過犯輕垢罪第十八無解作師戒若佛子應學十二部經誦戒日日六時持菩薩戒解其義理佛性之性而菩薩不解一句一偈及戒律因緣詐言能解者即為自欺誑亦欺誑他人一一不解一切法不知而為他人作師授戒者犯輕垢罪若佛子應等者應學應當習學般若也般若有三一文字般若十二部經是二觀照般若持菩薩戒是三實相般若解佛性之性是也言佛子必當先學十二部經而起解慧有解慧而不修行恐成狂慧應當誦戒以固定慧基本必須日日六時無少懈怠誦持大乘菩薩心地戒品依法修行菩薩實行既有戒行若不明其指歸不能究竟佛果故當解其義味道理通徹佛性之性之底蘊自明不惑方可明人為人師範也而菩薩等者言菩薩若于十二部經意一句一偈不曉菩薩心地戒律因緣不通反詐言能解了者寧非自欺誑亦欺誑他人也耶可謂大膽犯重無恥之人也于佛性之性一一義理毫無解會教行理果一切法不知而乃妄為人作師承傳授戒法者是菩薩犯輕垢罪第十九兩舌戒若佛子以惡心故見持戒比丘手捉香爐行菩薩行而鬬搆兩頭謗欺賢人無惡不造者犯輕垢罪若佛子以惡心者言見持戒者或與己異為人稱美心生嫉忌障礙等惡心也見持戒比丘者非名字沙門乃有德行賢聖僧寶手捉起信香爐行菩薩真實之行非賢聖僧而何而為菩薩人應成人之美共勷法化可也豈得興鬬搆引唆哄兩頭于中取樂取利以壞自己心術耶欺謗等者言此比丘本是賢聖而起無根之謗以欺之反説無惡不造令彼不安如是謗欺賢人者是菩薩犯輕垢罪第二十不行放救戒若佛子以慈心故行放生業應作是念一切男子是我父一切女人是我母我生生無不從之受生故六道衆生皆是我父母而殺而食者即殺我父母亦殺我故身一切地水是我先身一切火風是我本體故當行放生業生生受生若見世人殺畜生時應方便救護解其苦難常教化講説菩薩戒救度衆生若父母兄弟死亡之日應請法師講菩薩戒經律福資亡者得見諸佛生人天上若不爾者犯輕垢罪若佛子以慈等者言修菩薩萬行以慈為根本有慈者自行仁愛有仁愛者于一切將死苦惱衆生定行救護此即菩薩行慈本業也既行斯業更當作觀堅其放生念頭作何等念耶念一切男子即是我父一切女人即是我母何以知然以我生生無不從之受生故而知之也若乃擴而推之即六道衆生皆是我之父母若今而殺其身而食其肉者豈非殺我多劫多生父母乎亦即是殺我多劫多生之故身何也一切地水是我多生血肉一切火風是我多生本體暖氣如是父母之至親己身之至愛彼此咸同佛與衆生本無差別庸可不急急常行此放生業乎生生等者言不但一生兩生行放生業應當常生生世世受生而來恆行是放生業若見世人殺傷大小畜生之時當善巧方便委曲婉轉以救護之使其離苦得安隱樂如此止救一命之苦不能廣遍救護常應廣設教化講説菩薩戒經救度一切衆生永離諸苦得安隱樂也若父母等者言或父母兄弟氣絶魂消於世無與死亡之日果為孝子賢弟應當恭請大乘法師講演菩薩戒經律以此福利資薦亡者俾其得見十方諸佛罪滅福生生人天上脫三塗苦如是救護是名菩薩報諸佛恩若不爾者是菩薩犯輕垢罪如是十戒應當學敬心奉持如滅罪品中廣明一一戒相如是十戒是結前應當學是勸修敬心奉持是教以恭敬心奉重持守而勿忘勿失也以上十重二十輕戒乃出家菩薩全遮在家菩薩有開有遮凡為師者當深研之下二十八輕亦復如是第二十一瞋打報仇戒佛言佛子不得以瞋報瞋以打報打若殺父母兄弟六親不得加報若國主為他人殺者亦不得加報殺生報生不順孝道尚不畜奴婢打拍罵辱日日起三業口罪無量況故作七逆之罪而出家菩薩無慈心報仇乃至六親中故作報者犯輕垢罪佛言佛子者標名次第十戒十戒而召告之也不得二句正欲菩薩心空境寂人我雙忘不得懷不仁心以瞋打報仇也若殺等者言若父母兄弟六親至親骨肉不得加報若國王之至尊為他人殺者亦不得加報言君臣父子之仇不共戴天是理皆報復而佛教尚不許加報況其餘耶佛何故不許蓋殺生報生使諸衆生生生世世互殺不已菩薩人觀一切男女是我父母而殺之者即殺我父母若如此豈順孝道之理哉尚不得等者言修道人尚不畜奴婢打拍罵辱日日所起打拍身業罵辱口業嗔怒意業此三業中惟口是禍門生過極多況身犯殺父母七逆不孝之罪耶更重可知矣而出家等者言出家菩薩正當冤親平等人我兩忘何得懷報乃似俗類之人我見乎若是出家菩薩以無慈心而為自己報仇乃至為父母兄弟六親作報仇者犯輕垢罪第二十二憍慢不請法戒若佛子初始出家未有所解而自恃聰明有智或恃高貴年宿或恃大姓高門大解大富饒財七寶以此憍慢而不咨受先學法師經律其法師者或小姓年少卑門貧窮下賤諸根不具而實有德一切經律盡解而新學菩薩不得觀法師種姓而不來咨受法師第一義諦者犯輕垢罪若佛子初等者言此佛子自初發心出家離俗之時于第一義諦無我法中義味理趣未曾解了而自恃聰明有智不知此世智辨聰為障正知正見者或恃其名位高貴或恃身當耆年或恃其家大姓高門學識大解資産大富饒財七寶如是所有皆俗所尚俱非修行人之所重而初出家佛子恃此憍慢故而不虗心咨問領受先學法師所説經律所謂飲了毒藥真藥現前而不能下此也其法師者或小姓而非大家年少而非耆宿卑而不高貧而不富賤而不貴諸根不具而無相好是法師雖對世一一不如于出世品位其實有德又其學通一切經律咸悉解了堪為人師而新學菩薩故不得觀此法師種姓卑劣生憍慢心而究竟不來咨問領受法師所演第一義諦者犯輕垢罪第二十三憍慢僻説戒若佛子佛滅度後欲以好心受菩薩戒時於佛菩薩形像前自誓受戒當七日佛前懺悔得見好相便得戒若不得好相時應二七三七乃至一年要得好相得好相已便得佛菩薩形像前受戒若不得好相雖佛像前受戒不得戒若現前先受菩薩戒法師前受戒時不須要見好相何以故是法師師師相授故不須好相是以法師前受戒即得戒以生至重心故便得戒若千里內無能授戒師得佛菩薩形像前自誓受戒而要見好相若法師自倚解經律大乘學戒與國王太子百官以為善友而新學菩薩來問若經義律義輕心惡心慢心不一一好答問者犯輕垢罪若佛子佛等者言佛滅度者揀非佛在世以佛為師今乃佛滅度後即以戒法為師以戒師為佛也欲以好心等者言佛既不在現前無師欲以好心秉受菩薩大戒只得于佛菩薩形像之前而自立誓願即十種大願并四弘誓願復立十三誓即下不發願戒中之誓願也既發願已更當于佛前七日懺悔滅除罪障既滅罪已得見好相即便自知已得戒矣設若一七日中不得好相之時應當二七三七乃至一年之久而必要得好相既得好相已便得于佛菩薩形像前自誓受戒方得戒也若不得好相之時縱然于佛菩薩形像前受戒必不得戒徒有受名而無實得一生虗妄體仍白衣也若佛滅後現前有先受戒菩薩法師當即于是師前秉受戒法之時不須要見好相所以者何以是説者受者二俱現前則非遙受代受及像前受故也是法師原從過去七佛師師相授而來有源有本故不須要見好相是戒師即是過去諸佛住世一般是以法師前受戒即得戒也以求戒弟子于本説戒前生至重心觀戒師如佛故所以即便得戒也若千里等者言若千里之內無能授戒法師欲好心求受戒法可于佛菩薩形像前自誓受戒一得好相已可以得戒而無過若千里內有能授戒法師不從法師而從形像不唯不得戒而且自招憍慢僻説僻受罪也若法師等者言若法師內自恃倚能解經律秉受大乘學戒外又恃倚所交國王太子百官以為善好之友而見新學菩薩遠來請問經義律義時乃以所交自恃倚者而生輕心藐視惡心嫉妬慢心忽略如不一一好好答他來問者是法師得憍慢僻説之過犯輕垢罪第二十四不習學佛戒若佛子有佛經律大乘法正見正性正法身而不能勤學修習而捨七寶反學邪見二乘外道俗典阿毗曇雜論一切書記是斷佛性障道因緣非行菩薩道者若故作者犯輕垢罪若佛子等者言有清淨佛寶可歸有清淨經律大乘法寶可崇有清淨正見正性正法身僧寶可依應當精勤好學修習如是等寶而反不能學習而捨棄如是佛寶經寶律寶大乘法寶正見寶正性寶正法身寶之七寶背覺合塵不學正知正見反學邪知邪見不學大乘法反學小乘法不學經藏律藏論藏反學外道俗典阿毗曇雜論一切書記如此等輩所謂捨却甜挑果沿山摘酸梨誠可愍也是斷等者言是等二乘焦芽外道敗種皆是自迷之人斷佛種性障蔽正道之因緣豈成大乘正性種子真行菩薩正道者耶若不習學佛乃至不學正法身而故作如是者犯輕垢罪第二十五不善知衆戒若佛子佛滅度後為説法主為僧房主為教化主坐禪主行來主應生慈心善和鬬諍善守三寶物莫無度用如自己有而反亂衆鬬諍恣心用三寶物者犯輕垢罪若佛子等者佛滅度後指末世而言也為説法主即主張法道者為僧房主即住持叢林者為教化主即方便教化導利衆生者為坐禪主即通徹禪理能分別了知正定邪定者行來主即善知遠近賓客迎送之事者言佛滅度之後既為如是衆中之主應當生起仁慈愛衆之心善語調和俾無鬬諍未諍者令不起已諍者令息滅也更當善為護守三寶財物不使交互漏失侵損常住也莫無度用者言佛物佛用法物法用僧物僧用莫如自己所有任意濫用如能善和善守是真佛子其或不能而反亂衆鬬諍不調和恣心用三寶物不守護者犯輕垢罪第二十六獨受利養戒若佛子先在僧坊中住若見客菩薩比丘來入僧坊舍宅城邑若國王宅舍中乃至夏坐安居處及大會中先住僧應迎來送去飲食供養房舍臥具繩牀木牀事事給與若無物應賣自身及男女身應割自身肉賣供給所需悉以與之若有檀越來請衆僧客僧有利養分僧坊主應次第差客僧受請而先住僧獨受請而不差客僧者僧坊主得無量罪畜生無異非沙門非釋種姓犯輕垢罪若佛子等者言先在僧坊中住者自然是主宜主盡主道也若或見客菩薩比丘來入僧坊住處或入居士宅舍住處或入城邑住處或入國王舍宅之中乃至結夏坐禪安居之處及大衆中如是住處凡先住僧當盡主道異于尋常見來則迎見去則送湯飲飯食如法供養房舍臥具繩牀木牀凡諸所用事事給與不得吝惜也設若無物不能供養行菩薩行者應當賣自己之身及賣男女等身而為供養不特賣身而已應當割自身肉賣供給所需悉以與之況身外物而不供給生吝惜心耶若有等者言主人無物賣身割肉尚忍為而供養之豈有檀越請齋而不次第差客僧受請歟是故若有來請衆僧者客僧有利養分而先住僧坊主應次第差客僧赴請若獨受齋主請而不差客僧受請者則先住僧坊主人自得無量罪過也畜生等者言下不合人情與畜生無異中無六和故非沙門上乖佛心則非釋迦種姓故獨受者犯輕垢罪也第二十七受別請戒若佛子一切不得受別請利養入己而此利養屬十方僧而別受請即取十方僧物入己八福田中諸佛聖人一一師僧父母病人物自己用故犯輕垢罪若佛子等者言凡一切檀越請僧齋不得私受別請令此利養只入己身不與人共而此利養咸屬十方僧一切有分若先住僧私受別請不與客僧共即如取十方僧物入己私用一樣其罪烏容逭耶八福田者一諸佛果人二聖人因人三和尚四闍黎五衆僧六父七母八病人已上自諸佛至父母七者名為敬田病人一種名為悲田此八者總皆植福修慧之良田也言此八福田中物乃十方僧物公用獲福私用得罪私受別請自己用故所以犯輕垢罪也第二十八別請僧戒若佛子有出家菩薩在家菩薩及一切檀越請僧福田求願之時應入僧坊問知事人今欲請僧求願知事報言次第請者即得十方賢聖僧而世人別請五百羅漢菩薩僧不如僧次一凡夫僧若別請僧者是外道法七佛無別請法不順孝道若故別請僧者犯輕垢罪若佛子等者言有剃髮染衣出家菩薩有受六重二十八輕戒之在家菩薩并及一切好行惠施之檀那或有祈禱或願生天生人生西方來三寶福田中請僧求願之時應入僧坊中問知事人曰我某甲今欲請僧幾名祈禱求願而知事人應當報言汝欲請僧合遵次第請儀以其凡聖難辨不可擇故所以次第者即得十方賢聖僧也若乃世人以分別心要請五百羅漢菩薩僧如是揀名別請不如隨于衆僧次第差請中所請一凡夫僧之功德也所以者何以有住相心故若是別請僧者且是外道之法我佛法中無揀擇心以不著相故而且七佛以來無別請之法蓋別請求法者即是不順孝道謂上違七佛教誡道中乖菩薩平等心下失衆生利益德所以若故別請僧者犯輕垢罪第二十九邪命自活戒若佛子以惡心故為利養販賣男女色自手作食自磨自舂占相男女解夢吉凶是男是女呪術工巧調鷹方法和合百種毒藥千種毒藥蛇毒生金銀毒蠱毒都無慈愍心無孝順心若故作者犯輕垢罪若佛子等者言若佛子不以好心行菩薩道而以惡心故為求財利奉養自己作諸邪命自活之事一販賣男女色離他骨肉玷人門風二自手作食自磨自舂比丘食法淨人授受豈聽自作生活失儀表耶或發心行菩薩行以力供養人庶幾可也三占相男女斷禍福判窮通四解夢吉凶解人夢兆以定吉凶是男是女妄定男女六甲之故五呪術工巧驅遣鬼神種種幻術精工匠作巧手書畫六調鷹方法善調鷹犬能使取物七和合百種毒藥毒藥有百千種茲略出二三蛇毒害人亦害蛇故生金銀毒言和合毒藥乃使銅鐵生金銀故蠱毒諸蟲和合成蠱而為蠱毒毒人及生靈故以上七種違而故作者都無一念視人如子如女之慈愍心無一念視人如父如母之孝順心也若違而故作之者犯輕垢罪第三十不敬好時戒若佛子以惡心故自身謗三寶詐現親附口便説空行在有中為白衣通致男女交會淫色作諸縛著於六齋日年三長齋月作殺生劫盜破齋犯戒者犯輕垢罪若佛子以惡心等者言不以好心行菩薩道而以惡心之故自身謗三寶身業不淨詐現親附意業不淨口便説空行在有中口業不淨如是三業不淨全是惡心通達致意男女交處會合淫聲美色作諸凡夫縛著等事全不解脫真口謗意謗身謗三寶人也於六齋等者言以此之故所以不敬好時也月六齋日年三長齋月此乃好時善日善月儘好作福修善勝于餘時月六齋日者每月初八二十三乃是毗沙門天王分鎮南洲之日十四二十九如月小二十八乃是天王太子十五之與三十乃天王自身也年三長齋月者每年正五九此三月名三善月是帝釋天巡狩之月此天殿中有大寶鏡從年正月則照南贍部洲二月則照西牛賀洲三月則照北具盧洲四月則照東勝神洲五月復照南贍部洲如是三番照察人間善惡凡人舉心動念自然于鏡中顯現分明是故於此日月宜當勸人齋戒放生作諸福德而反于此時作殺生劫盜破齋犯戒者所以犯輕垢罪也如是十戒應當學敬心奉持制戒品中廣明如是十戒總結前文應當學以勸其修敬心奉持令時時恭敬遵奉持守而毋失也大部中有制戒品更是廣明此義第三十一不行救贖戒佛言佛子佛滅度後於惡世中若見外道一切惡人劫賊賣佛菩薩父母形像及賣經律販賣比丘比丘尼亦賣發心菩薩道人或為官使與一切人作奴婢者而菩薩見是事已應生慈悲心方便救護處處教化取物贖佛菩薩形像及比丘比丘尼一切經律若不贖者犯輕垢罪佛滅度後者言佛在世時無此等事佛滅度後于此惡世之中有此等事耳若見不達自心邪見外道常毀三寶一切惡人并抄劫盜賊等賣佛形容菩薩形容佛如父菩薩如母形容而壞佛寶并賣經律而壞法寶及賣比丘比丘尼而壞僧寶不特三寶而已亦賣發心菩薩道俗四衆有道之人或賣與官人之家以為下使或賣與一切人以作奴婢而此菩薩若見有如是苦難事已應生拔苦與樂之慈悲心設種種權巧方便急急救護處處向諸檀越教化取彼財物而贖佛菩薩形像如法供養救護佛寶贖諸經律如法流通救護法寶及贖比丘比丘尼令離苦難安隱修道而護僧寶如是救護方名佛子若見是事不行救贖者犯輕垢罪第三十二損害衆生戒若佛子不得畜刀杖弓箭販賣輕稱小斗因官形勢取人財物害心繫縛破壞成功長養貓狸豬狗若故養者犯輕垢罪若佛子不得等者言佛子當以慈為根本不得畜藏刀杖弓箭傷害生命之惡器不得販賤賣貴使用輕稱小斗明瞞暗騙惱害衆生不得因依官威挾持勢力強求貪取他人財物不得復假宦威以行惡害繫縛其人不得損害衆生已成功業不得畜養貓狸捕鼠惡畜并養豬謀利養狗拿物此皆恩中之仇養生害生失慈悲念非佛子所當為也若故養者犯輕垢罪第三十三邪業覺觀戒若佛子以惡心故觀一切男女等鬬軍陳兵將劫賊等鬬亦不得聽吹貝鼓角琴瑟箏笛箜篌歌呌妓樂之聲不得樗蒲圍棋波羅塞戲彈棋六博拍毱擲石投壺牽道八道行城爪鏡蓍草楊枝鉢盂髑髏而作卜筮不得作盜賊使命一一不得作若故作者犯輕垢罪若佛子以惡等者言初發心菩薩于心念觀照未得純熟恐逐境生情而起惡心故也以此之故放意觀一切男女戲舞等鬬觀一切兩軍相戰兵丁將帥抄劫竊盜等鬬以上乃佛子者之所不應觀者更不得放意聽吹螺貝杖鼓觱角君臣民庶物之五絃琴帝舜所作二十五絃之瑟蒙恬所作十三絃之箏七孔之竹笛并師延所作二十四絃之箜篌如是樂器歌唱呌喊一切妓樂音聲以上乃佛子之所不應聞者更不得樗蒲賭博圍棋共奕波羅塞戲而下象棋彈棊而作粧奩戲六博而打雙陸拍毱而蹴圓毬擲石入窩投壺拋箭牽道走馬八道賣械行城乃西域劇戲爪鏡藥指而光現蓍草卜斷休咎楊枝即報災祥鉢盂照水定是非髑髏呪之説禍福以上作卜筮等乃佛子之所不應為者不得為盜賊之所差使命令乃至畢命必不可為如上一一不得作非佛子所應為者若故作者犯輕垢罪第三十四暫念小乘戒若佛子護持禁戒行住坐臥日夜六時讀誦是戒猶如金剛如帶持浮囊欲渡大海如草繫比丘常生大乘善信自知我是未成之佛諸佛是已成之佛發菩提心念念不去心若起一念二乘外道心者犯輕垢罪若佛子護持等者言大乘菩薩防護堅持禁約五根戒止意地于行住坐臥四威儀中白日夜晚二六時內常常熟讀味義背諷誦持是菩薩戒本猶如金剛能壞一切一切不能壞伊如此堅固念頭又如昔有商人持囊渡海羅剎從乞浮囊其人不與乞一錢乃至一絲亦不與何以故命在浮囊故以喻持戒人欲渡生死苦海設遇愛欲羅剎假求一願終不從之何以故命在戒故是故護戒若此也又如昔有比丘被賊所抄以草繫此比丘比丘持戒不傷生草忽遇王過始得釋脫小乘持戒尚且如此況大乘菩薩乎是故常生大乘善信之人念念自信念念自知決定信知我是未成佛現前當來決定成佛諸佛已得三身圓萬德足五住盡二死亡是已成之佛也發菩提心者即是此決定信知而發此心也以此菩提心堅固之故而自念茲在茲永無忘失決無捨離去志安有退墮二乘之理哉設若有起一念小乘外道等心者即非佛子必犯輕垢罪第三十五不發願戒若佛子常應發一切願孝順父母師僧願得好師同學善知識常教我大乘經律十發趣十長養十金剛十地使我開解如法修行堅持佛戒寧捨身命念念不去心若一切菩薩不發是願者犯輕垢罪若佛子常應等者言佛子發願不難惟恐不恆所以常應發願以是一切衆生煩惱報障無有窮盡故菩薩發一切願亦無盡也一常願孝順父母二常願孝順師僧師即三師僧即七證亦應如同父母一般孝順也三常願得好師指點得好同學輔資四願得好善知識常常開導我通曉大乘經律五願入十住得修空觀六願入十行得修假觀七願入十回向得圓中道觀八願得入十聖地位一切圓修早入佛界九願使我一一開解如法修行而速證佛果十願堅固持守諸佛戒法設遇惡緣寧捨身命至于死地念念不敢去此堅持佛戒之心也若菩薩不發如是等願者犯輕垢罪第三十六不發誓戒若佛子發十大願已持佛禁戒作是願言寧以此身投熾然猛火大坑刀山終不毀犯三世諸佛經律與一切女人作不淨行復作是願寧以熱鐵羅網千重周匝纏身終不以此破戒之身受於信心檀越一切衣服復作是願寧以此口吞熱鐵丸及大流猛火經百千劫終不以此破戒之口食於信心檀越百味飲食復作是願寧以此身臥大猛火羅網熱鐵地上終不以此破戒之身受於信心檀越百種牀座復作是願寧以此身受三百鉾刺身經一劫二劫終不以此破戒之身受於信心檀越百味醫藥復作是願寧以此身投熱鐵鑊經百千劫終不以此破戒之身受於信心檀越千種房舍屋宅園林田地復作是願寧以鐵鎚打碎此身從頭至足令如微塵終不以此破戒之身受於信心檀越恭敬禮拜復作是願寧以百千熱鐵刀鉾挑其兩目終不以此破戒之心視他好色復作是願寧以百千鐵錐劖刺耳根經一劫二劫終不以此破戒之心聽好音聲復作是願寧以百千刃刀割去其鼻終不以此破戒之心貪嗅諸香復作是願寧以百千刃刀割斷其舌終不以此破戒之心食人百味淨食復作是願寧以利斧斬斫其身終不以此破戒之心貪著好觸復作是願願一切衆生成佛菩薩若不發是願者犯輕垢罪若佛子不發等者此承上言既發是十種大願已復能堅守持佛禁戒念念不捨更當作後如是等十三種願言也云何作願耶一作是誓願言以堅之曰寧以此身投熾然猛火至不淨行此一種堅誓不作非梵行也二復作是誓願以堅之曰寧以熱鐵至恭敬禮拜其中一衣服二飲食三床座四醫藥五房屋田園六恭敬禮拜此六種堅誓不虗受供養也八復作是誓願以堅之曰寧以百千至貪著好觸一目二耳三鼻四舌五身此五種堅誓不染污六根也以上十二種自利下一種利他十三復作是誓願以堅之曰願一切衆生成佛者言非獨自為一己清淨解脫而已本為普度有情咸得清淨解脫悉皆成佛故也如是立誓發願是名菩薩若不發此四科十三種誓願者犯輕垢罪第三十七冒難遊行戒若佛子常應二時頭陀冬夏坐禪結夏安居常用楊枝澡豆三衣瓶鉢坐具鍚杖香爐漉水囊手巾刀子火燧鑷子繩牀經律佛像菩薩形像而菩薩行頭陀時及遊方時行來百里千里此十八種物常隨其身頭陀者從正月十五日至三月十五日八月十五日至十月十五日是二時中十八種物常隨其身如鳥二翼若布薩日新學菩薩半月半月布薩誦十重四十八輕若誦戒時於諸佛菩薩形像前誦一人布薩即一人誦若二及三人至百千人亦一人誦誦者高座聽者下座各各披九條七條五條袈裟結夏安居一一如法若頭陀時莫入難處若國難惡王土地高下草木深邃獅子虎狼水火風劫賊道路毒蛇一切難處悉不得入若頭陀行道乃至夏坐安居是諸難處亦不得入若故入者犯輕垢罪若佛子常應等者言常當如是也二時即春秋二時頭陀此云抖擻言抖擻客塵煩惱求無上道也冬夏等者言冬時隆寒夏時酷暑正宜習定坐禪結冬休夏安養居處以精勤佛道也常用等者言楊枝至菩薩形像此十八物是佛子之所常用者不特冬夏安居常用即春秋二時而菩薩行頭陀遠遊他方時往來百里千里之遙此等物亦常隨其身以備用也頭陀者至二翼一段正明二時頭陀常用之事從正二句是明春時八月二句是明秋時是春秋二時中此十八種物常備用隨身就如鳥之二翼一般一任高飛遠舉自無防礙也若布薩等者布薩此云作法辦事亦云相向説罪對佛像前悔其過故言新學菩薩智劣識強應當黑白半月半月布薩常誦十重四十八輕戒倘誦時必定要恭潔己身心于諸佛菩薩形容像貌前誦戒也一人至袈裟等者此明誦戒之儀必要依此法也結夏二句乃珍重之意言二時頭陀尚乃如此至于結冬休夏安居之事一一更是要如法也若頭陀等者重明二時頭陀不得冒難遊行之意言何等為難而莫入耶若國難至毒蛇等諸難一切難處咸不得入也不特無事遊行不得入若頭陀行持佛法仗道而往乃至結冬休夏亦不宜近是諸難處更是不得入也若佛子不聽佛戒而故入者犯輕垢罪一切一是普及之言切是盡際之語以國難至毒蛇等難分為八難恐不足以盡之也第三十八乖尊卑次序戒若佛子應如法次第坐先受戒者在前坐後受戒者在後坐不問老少比丘比丘尼貴人國王王子乃至黃門奴婢皆應先受戒者在前坐後受戒者次第而坐莫如外道癡人若老若少無前無後坐無次第如兵奴之法我佛法中先者先坐後者後坐而菩薩一一不如法次第坐者犯輕垢罪若佛子應如等者言如法者謂依佛訓而坐也謂先戒應當坐前後戒理宜坐後不同在俗老少生年但依先後受戒次第而坐也比丘至奴婢敘明受戒各有類萃羣分皆字即各各義言比丘類有次第比丘尼類亦有次第貴人國王王子乃至黃門奴婢類亦各各咸皆當有先後受戒次第而坐也莫如至之法等者明乖尊卑次序之義正所當戒者言莫如此等外道無智癡人無老少無前後坐無次第就如兵奴法一般也我佛法等者言我佛正法中必定是先戒臘老者先坐後戒臘少者後坐有老少有前後坐有次第一一如法也而菩薩若不一一次第如法坐者犯輕垢罪第三十九不修福慧戒若佛子常應教化一切衆生建立僧房山林園田立作佛塔冬夏安居坐禪處所一切行道處皆應立之而菩薩應為一切衆生講説大乘經律若疾病國難賊難父母兄弟和尚阿闍黎亡滅之日及三七日四五七日乃至七七日亦應講大乘經律一切齋會求福行來治生大火大水焚漂黑風所吹船舫江河大海羅剎之難亦讀誦講説此經律乃至一切罪報三惡八難七逆杻械枷鎖繫縛其身多淫多瞋多愚癡多疾病皆應講此經律而新學菩薩若不爾者犯輕垢罪若佛子常應教化一切至皆應立之此勸修福也言常當教導開化一切有靈衆生使其建樹起院廣治山林園圃田地造立佛塔聚十方僧結制參禪設戒定處施智慧所一切廣行智道之處咸當立之如是真實修福不昧因果以滿自他檀波羅蜜故而菩薩應為至多疾病皆應講此經律此修慧也言菩薩當為一切衆生講演宣説大乘經律不特此也若人疾病時或國家大難賊盜之難父母兄弟和尚阿闍黎死亡之日及一七二七乃至七七之日亦當講演敷宣此大乘經律或一切修齋設會求福利者遊行來往治生産業大火所焚大水所漂黑風吹起船舫江河大海羅剎之難亦應看讀背誦講解敷説此大乘經律乃至一切惡業因果報應三惡八難七遮手杻足械項戴枷鎖五處繫縛多淫恚癡多疾病一一難皆當講演此大乘經律如是真實修慧利益無邊以滿自他般若波羅蜜故而新學菩薩若不如是修福修慧二種莊嚴者犯輕垢罪此八難與頂位八難即淨名疏言界內八難也三惡道北洲根不具佛前佛後世智辨聰無想天是如是九戒應當學敬心奉持梵壇品當説如是九戒結前應當學勸修敬心奉持珍重謹守而勿失也末句言大部內有梵壇品後當詳説也第四十揀擇授戒戒佛言佛子與人授戒時不得揀擇一切國王王子大臣百官比丘比丘尼信男信女淫男淫女十八梵天六欲天子無根二根黃門奴婢一切鬼神盡得受戒應教身所著袈裟皆使壞色與道相應皆染使青黃赤黑紫色一切染衣乃至臥具盡以壞色身所著衣一切染色若一切國土中國人所著衣服比丘皆應與其俗服有異若欲受戒時應問言現身不作七逆罪耶菩薩法師不得與七逆人現身受戒七逆者出佛身血殺父殺母殺和尚殺阿闍黎破羯磨轉法輪僧殺聖人若具七逆即現身不得戒餘一切人盡得受戒出家人法不向國王禮拜不向父母禮拜六親不敬鬼神不禮但解法師語有百里千里來求法者而菩薩法師以惡心嗔心而不即與授一切衆生戒者犯輕垢罪佛言佛子等者言與一切人授戒之時不得生揀擇人之心但一切國王王子至一切鬼神無有受不得戒者不可揀擇咸當與授戒也應教身所至俗服有異者言既與戒當作何形儀當教身著壞色袈裟像個道人與道相應故皆使染五色相雜之色不特袈裟使染壞色即一切禪衣禪裙臥具凡身所衣皆可壞色若一切國土中人所著衣服自是用俗五色各染一色者多我比丘佛子等皆當與他不同俗有俗服僧有僧衣咸應與其有異也若欲至不得戒言上雖不揀而不揀中亦有所當揀者云何當揀耶受戒時應問言汝等現世今生不曾作七逆等罪耶若答云無則不揀也若答云有法師不得與七逆人授戒七逆者一出佛身血二殺父三殺母四殺和尚五殺阿闍黎六破羯磨轉法輪僧七殺聖人若具此七逆即不得戒是所當揀除此之外餘一切人盡得受戒故不得揀也出家人等者言既為佛子逈出世法之外不宜向國王向父母行世間禮拜之事也非見國王父母而生憍也不敬六親不相頻頻往來也不敬鬼神不行諂瀆之事也非向六親鬼神而生慢也言為佛子當超然物表不為世俗之禮所拘忌也但解法師語者但解廣該一切但能通曉法師語言憑他百里之近千里之遙來茲乞求戒法者而菩薩法師應當與授若以惡心嫉妬瞋心恨悔而不即與一切衆生戒者犯輕垢罪第四十一為利作師戒若佛子教化人起信心時菩薩與他人作教誡法師者見欲受戒人應教請二師和尚阿闍黎二師應問言汝有七遮罪否若現身有七遮罪者師不應與授戒若無七遮者得與授戒若有犯十重戒者教懺悔在佛菩薩形像前日夜六時誦十重四十八輕戒苦到禮三世千佛得見好相若一七日二三七日乃至一年要見好相好相者佛來摩頂見光華種種異相便得滅罪若無好相雖懺無益是人現身亦不得戒而得增長受戒益若犯四十八輕戒者對首懺悔罪便得滅不同七遮而教誡師於是法中一一好解若不解大乘經律若輕若重是非之相不解第一義諦習種性長養性性種性不可壞性道種性正覺性其中多少觀行出入十禪支一切行法一一不得此法中意而菩薩為利養為名聞故惡求多求貪利弟子而詐現解一切經律為供養故是自欺詐亦欺詐他人故與人授戒者犯輕垢罪若佛子教化人等者言菩薩欲教導開化一切人起信心之時菩薩與他人作如是教誡與人為開導法師者見欲要受戒人法師應教受戒人先請和尚阿闍黎二師二師應問受戒者言汝有七遮罪否若受戒人現身有七遮罪者師不應與授戒若無七遮者得與授戒此以上明與人授戒不得自專必同二師授也若有犯等者言既受戒已設有犯戒又當云何不可為利作師不明輕重懺悔之儀或濫同七遮捨棄而不教皆不可也設若有犯十重教懺悔時對佛菩薩形像前日六時夜六時常誦十重四十八輕戒發至誠心苦苦懇禱禮拜三世千佛求得好相若一七日見或二三乃至七七日一年畢竟要見好相好相者或行懺處或坐禪處或睡夢中即或感動佛親摩頂或見光華種種奇相以此證知便得知自己罪花凋卸業障消除還復戒體若無如是好相之時徒勤懇禱心不專一無所感動懺亦無益也是人現身亦不得復戒而僅能得增長將來受戒利益耳此明犯十重懺法也若犯四十八等者言四十八輕設或有犯只對十師頭首人前懇禱求哀懺悔其罪過即便滅除此明犯四十八輕懺悔法也不同七遮者言此犯重犯輕俱可懺悔不同七遮之不通懺悔也而教誡師于是一一懺悔法中應當一一好好思惟解了明白諦當方可與人作師也若不解等者言若或與人為師只圖利養故而不解了大乘經律以輕作重以重作輕以是為非以非為是等相亦復不解中道第一義諦實相之理不解初賢十住中習種性中賢十行中長養性上賢十回向中性種性聖位十地中不可壞性等覺中道種性妙覺中正覺性不解如是六性于其三賢十聖二覺中間多少觀行如十住中空觀多假觀少十行中假觀多空觀少十回向中中道觀多空假觀少十地位中自初地至六地前無相觀少有相觀多五地已後七地已前有相觀少無相觀多自八地後并等覺純無相觀妙覺則一切智觀故云多少觀行也出入即出定入定十禪支解見前即四禪中所修觀法言出入此十種觀法十禪定支之中如是一切觀行法門一一不通不曉不得此等法中意味詎可為人師法哉而菩薩等者言不解如是等法之菩薩苟且與人為師者何為利養故名聞故而生惡求多求之心師既唱之徒乃和之師及弟子俱以貪利之故而俱詐現不解言解不通曉經律言通曉經律為衣食供養故自瞞瞞人故與人授戒者犯輕垢罪第四十二為惡人説戒戒若佛子不得為供養故於未受菩薩戒者前若外道惡人前説此千佛大戒邪見人前亦不得説除國王餘一切不得説是惡人輩不受佛戒名為畜生生生不見三寶如木石無心名為外道邪見人輩木頭無異而菩薩於是惡人前説七佛教誡者犯輕垢罪若佛子不得等者言能解法者不得以貪利而濫説也渴而與飲則水之味甘暗而思明則燈之用大是以未受大戒人及外道惡人前皆不得説此千佛大戒不特于此即邪見人更是不得為説也除國王者謂如來曾以佛法僧付囑國王宰臣掌護俾令久住世間滅惡生善使王道佛道並隆凡所行佛事不宜隱諱故除國王也餘一切外道邪見人前不得為説者何謂是一切人乃惡人之輩不受諸佛大乘戒法有眼如盲有耳如聾就如畜生一般無有智慧不通人理應墮三塗生生世世不聞三寶名字又如木石一般不識不生不滅之心金剛不壞之體故所以名為外道邪見人輩與木頭石塊無以異也如龍聽法而悟道蟒聞懺以生天生公説法頑石為之點頭可以人而不如畜與石乎而菩薩若于是諸惡人前説此七佛千佛大戒者犯輕垢罪第四十三無慚受施戒若佛子信心出家受佛正戒故起心毀犯聖戒者不得受一切檀越供養亦不得國王地上行不得飲國王水五千大鬼常遮其前鬼言大賊入房舍城邑宅中鬼復常掃其腳迹一切世人皆罵言佛法中賊一切衆生眼不欲見犯戒之人畜生無異木頭無異若故毀正戒者犯輕垢罪若佛子信心等者言佛子最初發心出家能捨偏邪諸見來受諸佛正大光明寶戒之時其心本正理合受人天供養及其日久歲深懈于持守便生慢心故起不信之心偏邪之念而毀犯諸佛大戒者豈可仍前得受一切國王王子大臣居士長者檀越飲食衣服臥具醫藥種種供養耶亦不得等者言不特不宜受供養已也而亦不得踐國王土在此地上行無他著足處不得飲國王水一滴也難消也五千等者言五根本戒若精而不犯則五千善神為之護祐若懈而有毀則五千惡鬼為之降祅故常遮其前轉福成禍也鬼言大賊至腳迹等者言神惡之之極即蹤迹亦有所不容況其形耶一切世人至不欲見等者言人惡之之極即其形相且不欲眼見況與共行止耶故所以犯戒之人神人咸惡惡其非人人道難容應墮三塗與畜生一般木頭一般無以別也若故捨正信而毀破正戒無慚愧心受人供養者犯輕垢罪第四十四不供養經典戒若佛子常應一心受持讀誦大乘經律剝皮為紙刺血為墨以髓為水析骨為筆書寫佛戒木皮榖紙絹素竹帛亦應悉書持常以七寶無價香華一切雜寶為箱囊盛經律卷若不如法供養者犯輕垢罪若佛子常應等者言佛子恆當專一其心將此大乘經律受而持持而讀讀而誦如法流通此甚深妙法也云何流通耶流通有二一應捨身命剝皮為紙刺血為墨以髓為水折骨為筆一一書寫此大乘經律以流通之也二應捨財寶變易木皮榖紙絹素竹帛亦當書寫受持以流通之也云何供養耶當恆以金銀珊瑚硨磲琥珀玫瑰琉璃七寶無價最貴香華一切雜寶問錯莊嚴為箱為囊盛貯經律卷本以供養之也如是流通供養是真佛子若不如法流通供養者犯輕垢罪第四十五不化衆生戒若佛子常起大悲心若入一切城邑舍宅見一切衆生應唱言汝等衆生盡應受三皈十戒若見牛馬豬羊一切畜生應心念口言汝是畜生發菩提心而菩薩入一切處山林川野皆使一切衆生發菩提心是菩薩若不教化衆生者犯輕垢罪若佛子常起等者言佛子常起大悲拔苦心時倘入一切城邑宅舍之處見諸衆生應當唱言汝等衆生各各具有佛性戒體由汝無始至于今生以不持戒故而輪回諸趣今既覺知前非捨惡從善盡應受持三皈五戒十戒禁止將來永不再起如是惡業也若見牛等者言不但人所當教即牛馬豬羊等之畜生亦當心中作念口中發言汝雖是畜生咸具佛性戒體當發無上菩提覺心毋使再迷故也而菩薩等者言不止近人六畜如此教化即遠而山林川野一切之處凡見一切衆生咸使發無上菩提覺心毋使再迷故也是菩薩見一切衆生若不教化使發心者犯輕垢罪第四十六説法不如法戒若佛子常行教化起大悲心入檀越貴人家一切衆中不得立為白衣説法應在白衣衆前高座上坐法師比丘不得地立為四衆白衣説法若説法時法師高座香華供養四衆聽者下坐如孝順父母敬順師教如事火婆羅門其説法者若不如法説犯輕垢罪若佛子常行等者言佛子恆行菩薩行教化一切衆生起此大悲拔苦心時或入一切好施檀越行捨貴人之家于一切廣衆四衆人中不得立地自輕為白衣人説法當云何説當在白衣衆前高設法座尊重法師法師理宜升座如法而説法師比丘切不得立地自卑為四衆白衣等説法使彼生慢也若果欲為衆説法之時為法師者理宜高座上坐聽法者當陳設香華如法供養三業虔誠法師乃可應機而説也四衆聽者各分其類次第下坐如孝順父母一樣敬師而不慢順師而不違也又如事火婆羅門一般精勤而不怠恭謹而不忽也如是説者聽者人己兩利功不唐捐若其説人不如法為説者犯輕垢罪第四十七非法制限戒若佛子皆以信心受戒者若國王太子百官四部弟子自恃高貴破滅佛法戒律明作制法制我四部弟子不聽出家行道亦復不聽造立形像佛塔經律立統制衆安籍記僧菩薩比丘地立白衣高座廣行非法如兵奴事主而菩薩應受一切人供養而反為官走使非法非律若國王百官好心受佛戒者莫作是破三寶之罪而故作破法者犯輕垢罪若佛子皆以等者言僧俗佛子乍皈三寶皆咸以正信實心受佛大戒者悉佛界內之人非局外人也若國王太子百官四部弟子理宜護助令其入道修行倘自恃位高尊貴生我慢心破壞斷滅佛法戒律明彰作用制限法度制我四部弟子使三寶不得興隆不許出家行道而斷僧寶亦復不聽造立佛菩薩形而斷佛寶不聽修建佛塔印寫經律而斷法寶而更立官屬統轄裁制四衆安排簿籍記載僧名俾一一不得自在也菩薩比丘理應高座而反立地白衣理應立地而反使高座如是顛倒廣行非法不如意事就如兵之事帥奴之事主一般制我四部弟子有不忍見聞者而菩薩比丘理當受國王太子百官一切檀那供養是正理也而反為俗家官家走使如是非法如是非律豈理也哉若國王百官既好心入此法門受佛大戒者切莫作如是等破滅三寶罪過而招未來無盡惡果也若違而故作破法因緣者犯輕垢罪第四十八破法戒若佛子以好心出家而為名聞利養於國王百官前説佛戒者橫與比丘比丘尼菩薩戒弟子作繫縛事如獄囚法兵奴之法如獅子身中蟲自食獅子肉非餘外蟲如是佛子自破佛法非外道天魔能破若受佛戒者應護佛戒如念一子如事父母不可毀破而菩薩聞外道惡人以惡言謗佛戒之聲如三百鉾刺心千刀萬杖打拍其身等無有異寧自入地獄經於百劫而不聞一惡言破佛戒之聲況自破佛戒教人破法因緣亦無孝順之心若故作者犯輕垢罪若佛子以好等者言佛子最初發心出家心未有不正念未有不端是何等好心及其法久生弊漸相染習故亦轉成為名為利人也既貪名利好心即無乃于國王百官之前而説佛戒仗彼威力壓己同行橫與比丘比丘尼出家二衆及菩薩戒弟子在家二衆作諸繫纍纏縛不解脫等事如獄囚法不得離苦如兵奴法不得自便又如獅子身中之蟲自食獅子之肉非餘外蟲能食獅子肉也獅子獸中王何蟲敢近以食獅子肉者還是獅子自己身中蟲自食獅子身中肉非餘外蟲而食之也如是等者正説破法以明獅子喻義言如是佛子自己破滅佛法豈是三寶之外外道天魔能破茲佛法還是佛法中人自破佛法如獅子身中蟲自食獅子肉一般耳若受佛等者言受佛戒人當保護佛戒靠之猶如一子祖宗血脈相關是極要緊事詎可失耶失則無靠也護戒又如父母一樣若毀若破即是不孝其罪可勝言也而菩薩一聞外道惡人説一惡言謗佛戒之音聲即如三百鉾刺心其痛難忍一般千刀萬杖打拍其身其痛難受一樣無以異也寧可承當自入地獄中受百劫千劫長遠極苦不願聞謗佛音聲之苦何況自己破滅佛法及教人破滅佛法因緣也耶此更是不孝順道無孝順之心者也若故作者犯輕垢罪如是九戒應當學敬心奉持如是九戒結前應當學勸修敬心奉持勸敬慎奉行持守而勿失也以上釋四十八輕文竟下總結戒相諸佛子是四十八輕戒汝等受持過去諸菩薩已誦未來諸菩薩當誦現在諸菩薩今誦諸佛子結告其人是四十八句總舉其法以勸受持也過去數句引同行以勸誦也謂四十八輕戒非我獨勸汝等新學誦持乃是過去諸菩薩已誦未來諸菩薩當誦則汝等現在諸菩薩今誦也以上正宗分文竟即人間説戒中二總結戒相也下明流通分三初流通本戒二總結本品三總讚流通諸佛子聽十重四十八輕戒三世諸佛已誦當誦今誦我今亦如是誦汝等一切大衆若國王王子百官比丘比丘尼信男信女受持菩薩戒者應受持讀誦解説書寫佛性常住戒卷流通三世一切衆生化化不絶得見千佛佛佛授手世世不墮惡道八難常生人道天中我今在此樹下略開七佛法戒汝等大衆當一心學波羅提木叉歡喜奉行如無相天王品勸學中一一廣明三千學士時坐聽者聞佛自誦心心頂戴喜躍受持諸佛子聽等者言諸佛子汝等聽我所説十重四十八輕之戒法者實乃三世諸佛相傳而誦過去諸佛已誦未來諸佛當誦現在諸佛今誦是故我今亦隨諸佛亦如是誦也則汝等一切大衆豈可不如是誦耶若國王王子之仁君文武百官之良臣比丘比丘尼之清淨衆信男信女之淨信人凡受持此菩薩十重四十八輕戒法者悉應受領于心持守毋失朝朝習讀日日諷誦解義轉説或書或寫此佛性常住戒卷俾其廣演流通令過現未三世一切衆生展轉化化不令斷絶者何蓋欲使一切衆生得見千佛佛佛授手決定不墮三惡八難之處決定恆于人道天道中生滅罪獲福得大饒益自利利他也我今等者言我釋迦今在此菩提樹下示現成道轉大法輪此乃聊且略為開闡過去七佛所傳妙善戒法汝等大衆應當專一斯心習學此波羅提木叉保解脫戒以是勸汝歡喜奉行勿自怠耳此但略説如大部內無相天王品勸學中方乃一一廣明此義也三千學士即在會諸菩薩總該天龍八部道俗而言時坐中聽者聞佛自誦十重四十八輕戒法悉皆心心頂戴其言喜躍受持善護勿失也此初流通本戒也爾時釋迦牟尼佛説上蓮華臺藏世界盧舍那佛心地法門品中十無盡戒法品竟千百億釋迦亦如是説從摩醯首羅天王宮至此道樹下住處説法品為一切菩薩不可説大衆受持讀誦解説其義亦如是千百億世界蓮華藏世界微塵世界一切佛心藏地藏戒藏無量行願藏因果佛性常住藏如是一切佛説無量一切法藏竟千百億世界中一切衆生受持歡喜奉行若廣開心地相相如佛華光王七行品中説爾時者即上囑付大衆聽受心地戒法之時也言釋迦娑婆教主化身如來説上蓮華臺藏世界盧舍那佛所傳心地法門品中十無盡藏戒法品如是行布圓融一一事理已説究竟而千百億釋迦化佛亦悉如娑婆教主所説不異也然而咸從摩醯首羅天王宮中至此菩提樹下及諸住處所説法品而為一切菩薩及不可説之大衆如是大衆各各受持讀誦各各解了傳説其中義味亦如娑婆大衆受持解説不異也不特此也即千百億世界中佛乃至微塵世界中佛此之一切諸佛所説三十心藏十地藏十重四十八輕戒藏賢聖所行無量行藏無量願藏百劫修行因藏成等正覺果藏一切衆生本覺佛性之常住藏如上八種俱言藏者言此八藏廣博包含圓融遍攝如是一切諸佛所説此心地等無量一切法藏究竟而百千億世界之中一切衆生受持歡喜一一奉行亦如此界衆生等無有異也如是本佛迹佛迹迹之佛説法度生大略如此若廣開心地一一相相之義則又在大部之中如佛華光王七行品中詳其所説一一心地相及無量行願相無不備足矣此二總結本品也明人忍慧強能持如是法未成佛道間安獲五種利一者十方佛愍念常守護二者命終時正見心歡喜三者生生處為諸菩薩友四者功德聚戒度悉成就五者今後世性戒福慧滿此是諸佛子智者善思量明人等者此乃讚獎持戒利益之義言明人即超越凡夫之類乃有忍力慧力二種強力之德能護戒體者所以能持如是法也此人當來決定成佛且未成佛道間先已安然自獲五種殊勝利益何名五利一者謂有忍慧持戒人即感十方諸佛愍念加護使其進道無魔得紹佛種故二者有忍慧持戒人臨命終時得正知見心生歡喜遠離惡境故三者有忍慧持戒人生生世世同行同住恆為菩薩益友遠離惡黨故四者有忍慧持戒人無量功德品聚一切戒度悉能成就無一法不充足故五者有忍慧持戒人從今向後自性戒體福慧圓滿稱兩足尊故前四因後一果此五種利是持戒諸佛子有忍慧強力智者應當善為思惟籌量體會而修行之也計我著相者不能信是法滅壽取證者亦非下種處欲長菩提苗光明照世間應當靜觀察諸法真實相不生亦不滅不常復不斷不一亦不異不來亦不去如是一心中方便勤莊嚴菩薩所應作應當次第學於學於無學勿生分別想是名第一道亦名摩訶衍一切戲論惡悉從是處滅諸佛薩婆若悉由是處出計我等者言計我之外道著相之凡夫如是等人不能信是無持而持無受而受清淨戒法不特凡外不能即耽空滅壽守寂取證諸聲聞二乘人亦非是下菩提種處所謂焦芽敗種不善思量故皆無分設或欲要長養菩提根苗而使智光慧明照察世間者應當于此心地戒中靜觀靜察諸法之中真而無妄實相戒體之理此個實相戒體不屬緣生亦不屬緣滅不同凡夫生滅不屬于常亦不屬于斷不同外道斷常類殊難合而不一同體難分而不異迎之莫知所從而本不來追之莫知所至而本不去不同二乘修證等法也如是實相戒體一心之中應當起種種巧妙慧方便勤修種種萬行福莊嚴如是福慧二嚴非凡外二乘所能作乃是發大乘心受大乘戒諸菩薩之所應作也更應當次第如法修學研窮斷惑有法可學不生分別之想心研窮惑盡無法可學亦不生分別之想心既不分有亦不別無是則名為中道第一義諦之道亦名摩訶衍之大乘法也如此則一切凡外小乘戲論惡法入茲一道摩訶衍大治之中不鎔而化咸皆滅盡無餘諸佛智慧神通三昧薩婆若妙果咸從此一道摩訶衍大法之中豁然顯現無少欠缺也此心地戒法能善思量其即滅罪生善得大利益有如此者是故諸佛子宜發大勇猛於諸佛淨戒護持如明珠過去諸菩薩已於是中學未來者當學現在者今學此是佛行處聖主所稱歎我已隨順説福德無量聚回以施衆生共向一切智願聞是法者疾得成佛道是故等者言既滅惡生善有如是益所以諸佛子等宜當發大心奮勇猛力于諸佛清淨戒法善為保護持守猶如明珠一般貴重莫令損污方是真佛子持心地中光明金剛寶戒也過去等者言此大戒經乃過去諸菩薩已證果者已于是中學而未來諸菩薩未證果者當于是中學此現在諸菩薩者今于是中學此實是三世諸佛之所行處本師舍那聖主之所稱揚讚歎也我已等者言我亦隨順諸佛所説稱揚心地戒中廣大福無量聚廣大德無量聚也應當回向布施三世一切衆生令向一切法界如如妙智更願凡聞如是大乘妙善戒者咸得疾速證真早成佛道圓滿果海也此三總讚流通也三十七輕中八難若國難等者言若國中有此八難惡王不信三寶是一土地高下遷變不常是二草木深邃師子虎狼惡獸難是三水有漂沒之難是四火有焚燒之難是五風有鼓擊之難是六劫賊有謀財奪命之難是七道路毒蛇惡蟲難是八一切難等者言上八難此但略言耳若廣則多一切難處悉不可入也
